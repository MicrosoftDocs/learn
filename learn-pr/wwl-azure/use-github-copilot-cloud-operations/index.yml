title: Use GitHub Copilot for cloud operations
summary: Learn how to use GitHub Copilot to accelerate Infrastructure as Code authoring, apply effective prompt engineering techniques for Bicep templates, and generate and translate Azure CLI and PowerShell scripts.
abstract: |
  By the end of this module, you're able to:
  - Explain what Infrastructure as Code is and how GitHub Copilot changes the IaC authoring workflow.
  - Apply prompt engineering techniques to generate and refine Bicep templates using GitHub Copilot.
  - Generate, enhance, and translate Azure CLI and Azure PowerShell scripts using GitHub Copilot.
prerequisites: |
  - Basic understanding of GitHub and version control
  - Familiarity with Azure cloud services and Azure resource types
  - Access to GitHub Copilot
  - Visual Studio Code installed with the GitHub Copilot extension
