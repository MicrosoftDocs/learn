durationInMinutes: 3
quiz:
  title: ""
  questions:
  - content: "A cloud engineer needs to manage the long-lived state of Azure Virtual Networks, subnets, and NSGs across multiple environments, ensuring that resources are created if missing and updated when configuration drifts. Which Infrastructure as Code approach is best suited for this scenario?"
    choices:
    - content: "Declarative IaC using Azure Bicep templates."
      isCorrect: true
      explanation: "Declarative tools like Bicep describe the desired end state. Azure Resource Manager handles drift correction: creating resources that don't exist, updating those that differ, and leaving correctly configured resources unchanged."
    - content: "Imperative IaC using Azure CLI bash scripts."
      isCorrect: false
      explanation: "CLI scripts describe steps, not desired state. You're responsible for managing idempotency, ordering, and drift detection yourself. Declarative tools handle this automatically."
    - content: "A combination of both approaches written in a single file."
      isCorrect: false
      explanation: "Bicep and CLI can't be combined in a single file. While both tools are used together in practice, state management for long-lived infrastructure resources is best handled by declarative tools like Bicep."
  - content: "A cloud engineer uses GitHub Copilot to generate a Bicep template for an Azure Key Vault. The generated template has public network access enabled and includes a hardcoded subscription ID. Which prompt element was most likely missing from the original prompt?"
    choices:
    - content: "Context: the engineer didn't specify the target environment or region."
      isCorrect: false
      explanation: "Missing context affects values like region and environment name, but doesn't directly cause public network access to be left open or subscription IDs to be hardcoded."
    - content: "Output format: the engineer didn't specify whether to use a full file or a snippet."
      isCorrect: false
      explanation: "Output format controls the structure of the response, not the security settings or whether values are hardcoded."
    - content: "Constraints: the engineer didn't specify what Copilot should avoid."
      isCorrect: true
      explanation: "Constraints tell Copilot what not to do. Without explicit constraints such as 'disable public network access' and 'don't hardcode subscription IDs', Copilot may produce insecure or environment-specific defaults."
  - content: "A cloud engineer builds a Bicep template for a hub-spoke virtual network topology using GitHub Copilot. After reviewing the output, the engineer wants to add NSG rules, diagnostic settings, and parameterization with decorators. What is the recommended approach?"
    choices:
    - content: "Write one large prompt that includes all three additions simultaneously."
      isCorrect: false
      explanation: "Large prompts with many requirements at once tend to produce output with gaps and missing cross-resource references. Validating each layer before adding the next produces better results."
    - content: "Start a new Copilot Chat session for each addition."
      isCorrect: false
      explanation: "Starting a new session loses the context of the existing template. Follow-up prompts in the same session allow Copilot to build on the validated output from the previous step."
    - content: "Use iterative refinement by submitting separate follow-up prompts for each addition and validating the output at each step."
      isCorrect: true
      explanation: "Iterative refinement builds the template in layers. Each step is reviewed before adding the next, which produces more accurate output and makes it easier to catch issues early."
  - content: "A DevOps team has Azure CLI bash scripts that need to run on Windows Server hosts managed by an IT operations team that uses PowerShell. What is the most effective way to use GitHub Copilot for this conversion?"
    choices:
    - content: "Run the bash scripts through Windows Subsystem for Linux on the Windows hosts."
      isCorrect: false
      explanation: "WSL avoids the need for conversion but doesn't address the operations team's preference for PowerShell or their existing automation workflows."
    - content: "Use the translation pattern prompt and ask Copilot to translate the CLI script to PowerShell, preserving all logic and not adding extra features."
      isCorrect: true
      explanation: "The translation pattern ('Translate this CLI script to PowerShell, preserve all logic, don't add features') produces idiomatic PowerShell output that closely mirrors the original script. The 'don't add features' instruction prevents Copilot from introducing unreviewed additions."
    - content: "Manually rewrite each script using PowerShell cmdlet documentation, then ask Copilot to review the result."
      isCorrect: false
      explanation: "Manual rewriting is time-consuming and error-prone. GitHub Copilot can perform the translation directly, producing idiomatic PowerShell rather than requiring you to map each CLI command yourself."
  - content: "A cloud engineer wants GitHub Copilot to review a completed Bicep template and identify security risks, missing properties, and deprecated API versions, while adopting the perspective of a senior security engineer. Which prompting technique should the engineer use?"
    choices:
    - content: "Zero-shot prompting: ask Copilot to generate a new secure version of the template."
      isCorrect: false
      explanation: "Zero-shot prompting is used to generate resources from scratch, not to perform a structured review of existing code."
    - content: "Few-shot prompting: provide an example of a correctly reviewed template before asking Copilot to review the new one."
      isCorrect: false
      explanation: "Few-shot prompting helps Copilot match an existing pattern or style. While it can be useful, role-based prompting is more directly suited to a structured security review."
    - content: "Role-based prompting: instruct Copilot to act as a senior Azure security engineer before reviewing the template."
      isCorrect: true
      explanation: "Role-based prompting shifts Copilot's output from 'here's code that works' to 'here's code that's secure and follows the principle of least privilege'. Assigning a security-focused role produces more thorough and targeted review output."
