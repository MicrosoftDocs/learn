title: Secure remote and hybrid connectivity using VPN gateways and Microsoft Entra Private Access
summary: Harden Azure VPN gateway security and deploy Microsoft Entra Private Access to replace broad VPN access with identity-aware, per-application access that enforces Zero Trust connectivity principles.
abstract: |
  After completing this module, you'll be able to:
  - Identify security risks in VPN gateway configurations for site-to-site and point-to-site connections
  - Configure VPN gateway settings to reduce attack surface through stronger authentication and encryption
  - Deploy Microsoft Entra Private Access to enforce Zero Trust application-level access for remote users
prerequisites: |
  - Familiarity with Azure virtual networks and basic network connectivity concepts
  - Understanding of VPN concepts such as tunnels, authentication, and encryption
  - Familiarity with Microsoft Entra ID and Conditional Access at a conceptual level
