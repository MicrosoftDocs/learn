title: Centralize and enforce traffic inspection using Azure Firewall
summary: Deploy Azure Firewall to centralize traffic inspection and enforce filtering policies across your Azure environment. Azure Firewall includes threat-intelligence-based blocking and Secured Virtual Hub deployment for hub-spoke and branch traffic.
abstract: |
  After completing this module, you'll be able to:
  - Determine when Azure Firewall is required to address threats that Network Security Group (NSG) filtering can't mitigate
  - Configure Azure Firewall rule collections and Firewall Policy to control and inspect network traffic
  - Deploy Azure Firewall to a Virtual WAN hub to centralize inspection for hub-spoke and branch traffic
prerequisites: |
  - Familiarity with Azure virtual networks and network security groups
  - Understanding of firewall concepts such as rules, policies, and rule processing order
  - Basic understanding of Azure Virtual WAN concepts at a conceptual level
