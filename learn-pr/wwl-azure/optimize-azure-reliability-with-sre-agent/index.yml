title: Optimize Azure reliability by using Azure SRE Agent
summary: This module introduces SRE (Site Reliability Engineering) fundamentals in Azure, explains Azure SRE Agent architecture and deployment, and shows how to apply governed agentic operations to reduce MTTR and improve reliability outcomes.
abstract: |
  By the end of this module, you're able to:
  - Explain core SRE (Site Reliability Engineering) principles and their relevance in Azure cloud operations.
  - Describe how Azure SRE Agent supports incident triage, diagnosis, and remediation workflows.
  - Understand architecture, setup requirements, and practical adoption patterns.
  - Evaluate common use cases and apply governance controls for safe execution.
prerequisites: |
  - Basic familiarity with Azure resources and resource groups.
  - Basic understanding of cloud monitoring and incident response concepts.
  - Experience using the Azure portal.
