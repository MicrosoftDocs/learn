uid: learn.wwl.deploy-azure-kubernetes-service-cluster
metadata:
  title: Deploy an Azure Kubernetes Service Cluster
  description: This module covers the deployment of a managed Kubernetes cluster in Azure using Azure Kubernetes Service (AKS).
  ms.date: 04/25/2026
  author: Orin-Thomas
  ms.author: orthomas
  ms.topic: module
  ms.service: azure-kubernetes-service
title: Deploy an Azure Kubernetes Service cluster
summary: In this module, you learn how to create and configure an Azure Kubernetes Service (AKS) cluster, plan hub-spoke network topology and IP addressing, integrate Microsoft Entra ID for cluster access, and review scaling options and the recommended baseline infrastructure architecture.
abstract: |
  After completing this module, you'll be able to:
  * Create an Azure Kubernetes Service cluster.
  * Configure Azure Kubernetes Service components.
  * Connect to an Azure Kubernetes Service cluster.
  * Configure Microsoft Entra ID integration.
  * Plan virtual network topology and IP addressing for an AKS cluster.
  * Review node and pod scaling options for an AKS cluster.
prerequisites: |
  - An Azure subscription
  - Basic familiarity with Kubernetes concepts
