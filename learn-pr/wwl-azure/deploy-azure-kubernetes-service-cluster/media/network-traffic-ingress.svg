<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"><title id="title">Network traffic flow for ingress and egress</title><desc id="desc">The diagram shows user-initiated ingress traffic flowing from the public internet through Application Gateway (WAF), an AKS-managed internal load balancer, and into Azure Kubernetes Service. It also shows cluster-initiated egress traffic flowing from AKS through Azure Firewall in a peered hub virtual network to the public internet, with dashed arrows for response traffic.</desc>
  <defs>
    <marker id="arrow-green" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M 1 1 L 11 6 L 1 11 Z" fill="#107C10" />
    </marker>
    <marker id="arrow-orange" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M 1 1 L 11 6 L 1 11 Z" fill="#D83B01" />
    </marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 1 1 L 9 5 L 1 9 Z" fill="#605E5C" />
    </marker>
  </defs>
  <rect width="1200" height="760" fill="#FFFFFF" />
  <g font-family="Segoe UI, Arial, sans-serif" fill="#1F1F1F">
    <g id="network-boundaries">
      <rect x="270" y="55" width="840" height="260" rx="18" fill="#FFFFFF" stroke="#5B6B7A" stroke-width="2" stroke-dasharray="10 8" />
      <text x="1075" y="88" text-anchor="end" font-size="20" font-weight="600">Spoke VNet</text>
      <rect x="420" y="405" width="500" height="160" rx="18" fill="#FFFFFF" stroke="#5B6B7A" stroke-width="2" stroke-dasharray="10 8" />
      <text x="890" y="438" text-anchor="end" font-size="20" font-weight="600">Hub VNet</text>
      <line x1="675" y1="325" x2="675" y2="398" stroke="#605E5C" stroke-width="3" marker-start="url(#arrow-gray)" marker-end="url(#arrow-gray)" />
      <text x="698" y="345" font-size="16" font-weight="600">VNet peering</text>
    </g>

    <g id="public-internet">
      <rect x="50" y="150" width="160" height="85" rx="24" fill="#F6F8FA" stroke="#8A8886" stroke-width="2" />
      <text x="130" y="186" text-anchor="middle" font-size="18" font-weight="600">Public</text>
      <text x="130" y="211" text-anchor="middle" font-size="18" font-weight="600">internet</text>
    </g>

    <g id="spoke-subnets">
      <rect x="310" y="140" width="190" height="110" rx="12" fill="#E8F1FB" stroke="#2B6EA6" stroke-width="2" />
      <text x="405" y="166" text-anchor="middle" font-size="15" fill="#345">Subnet</text>
      <text x="405" y="197" text-anchor="middle" font-size="17" font-weight="600">Application Gateway</text>
      <text x="405" y="221" text-anchor="middle" font-size="17" font-weight="600">(WAF)</text>

      <rect x="565" y="140" width="220" height="110" rx="12" fill="#E8F1FB" stroke="#2B6EA6" stroke-width="2" />
      <text x="675" y="166" text-anchor="middle" font-size="15" fill="#345">Subnet</text>
      <text x="675" y="197" text-anchor="middle" font-size="17" font-weight="600">Internal load balancer</text>
      <text x="675" y="221" text-anchor="middle" font-size="17" font-weight="600">(AKS-managed)</text>

      <rect x="850" y="140" width="210" height="110" rx="12" fill="#E8F1FB" stroke="#2B6EA6" stroke-width="2" />
      <text x="955" y="166" text-anchor="middle" font-size="15" fill="#345">Subnet</text>
      <text x="955" y="197" text-anchor="middle" font-size="17" font-weight="600">Azure Kubernetes</text>
      <text x="955" y="221" text-anchor="middle" font-size="17" font-weight="600">Service</text>
    </g>

    <g id="hub-subnet">
      <rect x="570" y="450" width="210" height="70" rx="12" fill="#E8F1FB" stroke="#2B6EA6" stroke-width="2" />
      <text x="675" y="480" text-anchor="middle" font-size="15" fill="#345">Subnet</text>
      <text x="675" y="505" text-anchor="middle" font-size="18" font-weight="600">Azure Firewall</text>
    </g>

    <g id="user-initiated-flow" fill="none" stroke="#107C10" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
      <line x1="210" y1="176" x2="310" y2="176" marker-end="url(#arrow-green)" />
      <line x1="500" y1="176" x2="565" y2="176" marker-end="url(#arrow-green)" />
      <line x1="785" y1="176" x2="850" y2="176" marker-end="url(#arrow-green)" />
      <line x1="850" y1="218" x2="785" y2="218" stroke-dasharray="10 8" marker-end="url(#arrow-green)" />
      <line x1="565" y1="218" x2="500" y2="218" stroke-dasharray="10 8" marker-end="url(#arrow-green)" />
      <line x1="310" y1="218" x2="210" y2="218" stroke-dasharray="10 8" marker-end="url(#arrow-green)" />
    </g>

    <g id="cluster-initiated-flow" fill="none" stroke="#D83B01" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
      <path d="M 955 250 L 955 365 L 675 365 L 675 450" marker-end="url(#arrow-orange)" />
      <path d="M 570 486 L 130 486 L 130 235" marker-end="url(#arrow-orange)" />
      <path d="M 150 235 L 150 512 L 570 512" stroke-dasharray="10 8" marker-end="url(#arrow-orange)" />
      <path d="M 675 450 L 675 386 L 930 386 L 930 250" stroke-dasharray="10 8" marker-end="url(#arrow-orange)" />
    </g>

    <g id="legend" font-size="16">
      <rect x="50" y="610" width="375" height="140" rx="12" fill="#FFFFFF" stroke="#D0D7DE" stroke-width="2" />
      <text x="70" y="638" font-size="18" font-weight="600">Legend</text>
      <line x1="70" y1="660" x2="125" y2="660" stroke="#107C10" stroke-width="4" />
      <text x="140" y="665">Request — User initiated</text>
      <line x1="70" y1="684" x2="125" y2="684" stroke="#107C10" stroke-width="4" stroke-dasharray="10 7" />
      <text x="140" y="689">Response</text>
      <line x1="70" y1="708" x2="125" y2="708" stroke="#D83B01" stroke-width="4" />
      <text x="140" y="713">Request — Cluster initiated</text>
      <line x1="70" y1="732" x2="125" y2="732" stroke="#D83B01" stroke-width="4" stroke-dasharray="10 7" />
      <text x="140" y="737">Response</text>
    </g>
  </g>
</svg>
