content: |
  [!include[](includes/10-knowledge-check.md)]
quiz:
  title: "Check your knowledge"
  questions:
  - content: "In the Azure Kubernetes Service (AKS) autoscaling pattern covered in this module, which pair handles both pod and node scaling?"
    choices:
    - content: "Cluster autoscaler only"
      isCorrect: false
      explanation: "Incorrect. In this module's autoscaling pattern, cluster autoscaler scales the number of nodes in a node pool but doesn't scale pod replicas; HPA handles pod scaling."
    - content: "Manual `kubectl scale` and `az aks scale` only"
      isCorrect: false
      explanation: "Incorrect. Manual scaling is reactive and requires monitoring; AKS provides autoscalers that respond to load automatically."
    - content: "Horizontal Pod Autoscaler (HPA) for pods plus cluster autoscaler for nodes"
      isCorrect: true
      explanation: "Correct. HPA scales pod replicas based on observed metrics, and cluster autoscaler adds or removes nodes when pods become unschedulable. Together they scale both layers automatically."
  - content: "Which AKS networking mode assigns pod IPs from a private overlay CIDR, reducing VNet IP exhaustion?"
    choices:
    - content: "Azure CNI Overlay"
      isCorrect: true
      explanation: "Correct. Azure CNI Overlay assigns pod IPs from a private, non-VNet overlay CIDR while node IPs come from the VNet subnet, reducing VNet IP exhaustion."
    - content: "Azure CNI Pod Subnet (dynamic IP allocation)"
      isCorrect: false
      explanation: "Incorrect. Azure CNI Pod Subnet with dynamic IP allocation still assigns pod IPs from VNet address space, even though it allocates them more efficiently than the legacy Azure CNI Node Subnet."
    - content: "Kubenet"
      isCorrect: false
      explanation: "Incorrect. Kubenet conserves VNet IPs, but it isn't Azure CNI Overlay and doesn't assign pod IPs using the Azure CNI private overlay CIDR mode."
    - content: "Bring your own CNI"
      isCorrect: false
      explanation: "Incorrect. Bring your own CNI depends on the installed plugin and isn't the AKS Azure CNI Overlay mode described here."
  - content: "When you plan the spoke virtual network address space for an AKS cluster that uses **Azure CNI Overlay**, which IP allocations must come from the VNet subnets?"
    choices:
    - content: "Pod IPs and node IPs"
      isCorrect: false
      explanation: "Incorrect. With Azure CNI Overlay, pods receive IPs from a separate overlay pod CIDR — they don't consume VNet subnet IPs."
    - content: "Only pod IPs"
      isCorrect: false
      explanation: "Incorrect. The opposite is true: with Azure CNI Overlay, pod IPs come from a separate overlay CIDR, while node IPs and other entities still come from the VNet subnets."
    - content: "Node IPs, internal load balancers, Application Gateway instance IPs (and any private frontend IP) in their dedicated subnet, Private Link endpoints, and the API Server VNet Integration subnet"
      isCorrect: true
      explanation: "Correct. With Azure CNI Overlay, only entities that need a VNet IP — node IPs, internal load balancers, Application Gateway instance IPs (one per instance, plus an extra address if a private frontend IP is configured), Private Link endpoints, and the delegated API server subnet — are sized from the VNet subnets. Public Application Gateway frontend IPs are standalone Azure public IP resources, not subnet IPs. Pods come from a separate overlay CIDR."
  - content: "What is the **subnet-level** benefit of placing Private Link endpoints in a dedicated subnet within the spoke virtual network?"
    choices:
    - content: "It allows applying granular network security group rules at the subnet level."
      isCorrect: true
      explanation: "Correct. A dedicated subnet allows NSG rules scoped to those endpoints — but only after explicitly enabling network policies on the subnet. Set `privateEndpointNetworkPolicies` to `Enabled` (which enables both NSG and route-table policy evaluation) or to the granular `NetworkSecurityGroupEnabled` (NSG-only) so NSG rules apply to private endpoints; otherwise NSG rules aren't enforced on private endpoints by default. For more information, see [Manage network policies for private endpoints](/azure/private-link/disable-private-endpoint-network-policy)."
    - content: "It removes the need for Azure Private Link service connections."
      isCorrect: false
      explanation: "Incorrect. The Private Link service connection is still required regardless of which subnet hosts the endpoint."
    - content: "It guarantees that traffic never traverses the hub virtual network."
      isCorrect: false
      explanation: "Incorrect. Whether traffic traverses the hub depends on routing and topology, not on the choice of subnet within the spoke."
