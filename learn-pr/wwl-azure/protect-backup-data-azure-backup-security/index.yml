title: Protect backup data with Azure Backup security features
summary: Protect Azure Backup data against ransomware, accidental deletion, and rogue administrators. Configure enhanced soft delete, vault immutability, Multi-User Authorization with Resource Guard, and RBAC controls to achieve an Excellent security posture rating across Recovery Services vaults.
abstract: |
  After completing this module, you can:
    - Configure soft delete and vault immutability to protect backup recovery points from deletion
    - Implement Multi-User Authorization using Resource Guard to prevent unauthorized critical backup operations
prerequisites: |
  - Working knowledge of Azure Backup including Recovery Services vaults and backup policies
  - Understanding of Azure role-based access control (RBAC) and resource hierarchy
  - Familiarity with ransomware threats and their challenges on backup infrastructure
