title: Manage Azure Boards by using GitHub Copilot integration
summary: This module explains how to connect Azure Boards and GitHub, prepare high-quality work items, and use GitHub Copilot capabilities to accelerate delivery while preserving governance and traceability in Azure DevOps.
abstract: |
  By the end of this module, you're able to:

  - Describe the Azure Boards and GitHub Copilot integration model
  - Configure the connection between Azure Boards and GitHub repositories
  - Prepare work items so GitHub Copilot can act on clear requirements
  - Delegate and supervise work through pull requests with human review
  - Apply governance, security, and adoption practices for AI-assisted planning
prerequisites: |
  - Familiarity with Azure DevOps Boards basics
  - Familiarity with GitHub repositories and pull requests
  - Access to an Azure DevOps project and a GitHub repository
