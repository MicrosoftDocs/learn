title: Transition from traditional ops to agentic DevOps workflows
summary: Learn how to evolve traditional cloud administration and DevOps tasks into agentic AI workflows using agent instructions, skills, and multi-agent orchestration.
abstract: |
  After completing this module, you'll be able to:
  - Describe the evolution from manual operations through scripted automation and AI-assisted prompts to agentic workflows
  - Explain how multi-agent orchestration and the conductor pattern automate infrastructure operations
  - Identify the four building blocks of agentic workflows — agents, skills, instructions, and prompts
  - Design multi-agent pipelines for common ops tasks using artifact-based communication
prerequisites: |
  - Basic understanding of cloud administration concepts
  - Familiarity with Azure CLI or infrastructure-as-code tools like Bicep or Terraform
  - Experience using AI assistants such as GitHub Copilot
