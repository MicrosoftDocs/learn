title: Introduction to agentic DevOps using Microsoft tools on Azure
summary: Describe where agentic approaches improve DevOps outcomes in Azure environments. Evaluate role-aligned use cases, autonomy boundaries, and human-in-the-loop patterns across Microsoft DevOps toolchains.
abstract: |
  After completing this module, you'll be able to:

  - Define agentic DevOps in a Microsoft and Azure context.
  - Identify high-value DevOps tasks that benefit from agentic support.
  - Distinguish assistant, semi-autonomous, and autonomous operating modes.
  - Explain human oversight requirements for production-facing operations.
prerequisites: |
  - Experience designing and managing CI/CD pipelines in Azure Pipelines or GitHub Actions
  - Familiarity with Infrastructure as Code using Bicep or similar tooling
  - Working knowledge of Azure resource governance, monitoring, and incident response
  - Familiarity with GitHub Copilot in Visual Studio Code
