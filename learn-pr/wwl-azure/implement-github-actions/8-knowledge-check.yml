### YamlMime:ModuleUnit
uid: learn.wwl.implement-github-actions.knowledge-check
title: Module assessment
metadata:
  title: Module assessment
  description: "Knowledge check"
  ms.date: 07/23/2026
  author: jeffkoms
  ms.author: jeffko
  ms.topic: unit
  module_assessment: true
durationInMinutes: 5
quiz:
  title: "Check your knowledge"
  questions:
  - content: "What is the role of a runner in GitHub Actions?"
    choices:
    - content: "A runner is a custom application for the GitHub Actions platform that performs a complex but frequently repeated task."
      isCorrect: false
      explanation: "Incorrect. This description refers to an action, not a runner."
    - content: "A runner is a server that stores your workflows."
      isCorrect: false
      explanation: "Incorrect. A runner doesn't store workflows, it executes them when they're triggered."
    - content: "A runner is a server that runs your workflows when they're triggered."
      isCorrect: true
      explanation: "Correct. Each runner can run a single job at a time and executes workflows when they're triggered."
  - content: "What takes precedence if a variable with the same name exists at multiple levels?"
    choices:
    - content: "The variable at the highest level."
      isCorrect: false
      explanation: "Incorrect. Organization-level variables have lower precedence than repository- and environment-level variables."
    - content: "The variable at the lowest level."
      isCorrect: true
      explanation: "Correct. Environment-level variables override repository-level variables, and repository-level variables override organization-level variables."
    - content: "The variable at the middle level."
      isCorrect: false
      explanation: "Incorrect. Repository-level variables override organization-level variables, but environment-level variables take precedence over repository-level variables."
  - content: "What is the recommended practice when granting permissions to credentials used by a GitHub Actions workflow?"
    choices:
    - content: "Grant full access to all credentials for ease of use."
      isCorrect: false
      explanation: "Incorrect. Granting full access can lead to security risks and isn't recommended."
    - content: "Use personal credentials as much as possible."
      isCorrect: false
      explanation: "Incorrect. It's recommended to use deploy keys or a service account instead of personal credentials."
    - content: "Grant the minimum permissions possible."
      isCorrect: true
      explanation: "Correct. It's recommended to grant the minimum permissions possible to limit access and maintain security."
  - content: "A workflow must authenticate to a cloud provider without maintaining long-lived cloud credentials. Which approach should the developer use?"
    choices:
    - content: "Configure OpenID Connect to request short-lived, scoped access tokens."
      isCorrect: true
      explanation: "Correct. OpenID Connect provides short-lived tokens and avoids storing long-lived cloud credentials as GitHub secrets."
    - content: "Store a cloud administrator password as a repository variable."
      isCorrect: false
      explanation: "Incorrect. Repository variables aren't designed for sensitive values, and an administrator password grants excessive permissions."
    - content: "Store a classic personal access token with every available scope."
      isCorrect: false
      explanation: "Incorrect. A GitHub personal access token doesn't replace cloud authentication, and granting every scope violates least privilege."
  - content: "A workflow uses a third-party action and requires an immutable reference. Which reference prevents the action code from changing without a workflow update?"
    choices:
    - content: "Reference the action's default branch."
      isCorrect: false
      explanation: "Incorrect. A branch can move to a different commit, so it isn't an immutable reference."
    - content: "Reference the action by its full commit SHA."
      isCorrect: true
      explanation: "Correct. A full commit SHA is the only immutable reference for a GitHub Action. You should verify that the commit belongs to the action's repository."
    - content: "Reference the action by a major version tag."
      isCorrect: false
      explanation: "Incorrect. A major version tag is commonly used for trusted actions, but a maintainer can move or delete it, so the tag isn't immutable."
