quiz:
  title: "Check your knowledge"
  questions:
  - content: "Which action should you take to protect on-premises Windows Server computers with Defender for Servers?"
    choices:
    - content: "Connect the servers to Azure Arc and enable a Defender for Servers plan for the associated subscription."
      isCorrect: true
      explanation: "That's correct. Non-Azure servers should be onboarded as Azure Arc-enabled servers and protected with Defender for Servers."
    - content: "Install the Log Analytics agent and upgrade the Log Analytics workspace to the Standard pricing tier."
      isCorrect: false
      explanation: "That's incorrect. The Log Analytics agent retired in November 2024, and Standard pricing tier guidance no longer applies."
    - content: "Add the servers directly to a Microsoft Sentinel workspace."
      isCorrect: false
      explanation: "That's incorrect. Microsoft Sentinel can collect and analyze security data, but Defender for Servers protection for non-Azure machines requires Azure Arc onboarding."
  - content: "Which Defender for Servers capabilities replace Log Analytics agent-based collection for most server protection features?"
    choices:
    - content: "Microsoft Defender for Endpoint integration and agentless machine scanning."
      isCorrect: true
      explanation: "That's correct. Defender for Servers now relies on Defender for Endpoint integration and agentless scanning for most server protection capabilities."
    - content: "Azure Monitor workbooks and Azure Service Health."
      isCorrect: false
      explanation: "That's incorrect. These services don't replace Defender for Servers protection features."
    - content: "Microsoft Sentinel analytics rules and Log Analytics workspace keys."
      isCorrect: false
      explanation: "That's incorrect. Microsoft Sentinel analytics rules don't replace endpoint protection, and workspace-key based MMA onboarding is retired."
  - content: "You want to review vulnerabilities discovered on protected VMs by Microsoft Defender Vulnerability Management. Where should you look in Defender for Cloud?"
    choices:
    - content: "On the **Recommendations** page, select **Machines should have vulnerability findings resolved**."
      isCorrect: true
      explanation: "That's correct. Defender for Cloud lists vulnerability findings from configured scanners under this recommendation."
    - content: "On the **Recommendations** page, select **Enable the built-in vulnerability assessment solution on virtual machines (powered by Qualys)**."
      isCorrect: false
      explanation: "That's incorrect. The built-in scanner now uses Microsoft Defender Vulnerability Management; Qualys is a supported BYOL partner option."
    - content: "On the **Regulatory compliance** page, select **PCI DSS v4.0.1**."
      isCorrect: false
      explanation: "That's incorrect. Regulatory compliance standards summarize compliance posture; vulnerability findings are reviewed from recommendations or from Vulnerability Management in the Defender portal."