durationInMinutes: 3
quiz:
  title: "Check your knowledge"
  questions:
  - content: "Which of these statements best describes autoscaling?"
    choices:
    - content: "Autoscaling requires an administrator to actively monitor the workload on a system."
      isCorrect: false
      explanation: "Incorrect. Autoscaling is an automated process that doesn't require manual intervention."
    - content: "Autoscaling is a scale out/scale in solution."
      isCorrect: true
      explanation: "Correct. The system can scale out when specified resource metrics indicate increasing usage, and scale in when these metrics drop."
    - content: "Scaling up/scale down provides better availability than autoscaling."
      isCorrect: false
      explanation: "Incorrect. Autoscaling increases availability by adding more instances of services. If one of these instances fails, the others should still be available."
  - content: "An autoscale condition contains two scale-out rules and two scale-in rules that monitor different metrics. Under what circumstances does autoscale perform a scale-in action?"
    choices:
    - content: "When any single scale-in rule's threshold is crossed."
      isCorrect: false
      explanation: "Incorrect. That logic applies to scale-out actions, which run if any scale-out rule is met. Scale-in is more conservative."
    - content: "When all of the scale-in rules' thresholds are crossed."
      isCorrect: true
      explanation: "Correct. To avoid scaling in prematurely, autoscale requires every scale-in rule in the condition to be met before reducing instance count."
    - content: "Only when both scale-out rules stop being met for a full cool-down period."
      isCorrect: false
      explanation: "Incorrect. Scale-in decisions are driven by the scale-in rules in the condition, not by the inverse of the scale-out rules."
  - content: "Which Azure App Service pricing tiers support the platform-managed automatic scaling feature?"
    choices:
    - content: "The Basic tier and higher."
      isCorrect: false
      explanation: "Incorrect. The Basic tier supports manual scale-out only. Rule-based autoscaling requires Standard or higher, and automatic scaling has a stricter requirement."
    - content: "The Standard tier and higher."
      isCorrect: false
      explanation: "Incorrect. The Standard tier supports rule-based autoscaling, but automatic scaling is a separate feature available only on Premium plans."
    - content: "The Premium v2, v3, and v4 tiers."
      isCorrect: true
      explanation: "Correct. Automatic scaling, which handles scale-out decisions based on incoming HTTP traffic, is available on Premium v2, v3, and v4 plans."
  - content: "Why does Azure recommend choosing different thresholds for scale-out and scale-in rules rather than using the same value for both?"
    choices:
    - content: "To prevent 'flapping', where the service repeatedly scales out and back in around a single threshold."
      isCorrect: true
      explanation: "Correct. When thresholds are too close, autoscale's flapping protection often skips scale-in actions because reducing instances would immediately trigger another scale-out."
    - content: "Because Azure Monitor rejects autoscale rules that share the same threshold value."
      isCorrect: false
      explanation: "Incorrect. The platform accepts identical thresholds; the recommendation is about avoiding poor scaling behavior, not a platform restriction."
    - content: "To shorten the cool-down period between consecutive scaling actions."
      isCorrect: false
      explanation: "Incorrect. The cool-down period is configured separately on each scale action and isn't affected by threshold spacing."
