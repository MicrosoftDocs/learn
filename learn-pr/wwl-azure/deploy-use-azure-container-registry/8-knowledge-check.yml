content: |
  [!include[](includes/8-knowledge-check.md)]
quiz:
  title: "Check your knowledge"
  questions:
  - content: "After creating an Azure container registry in the Azure portal, which value should a user include in Docker image tags when they push and pull images from the registry?"
    choices:
    - content: "The registry's login server, which is a fully qualified name that ends with azurecr.io."
      isCorrect: true
      explanation: "Correct. The registry login server is used in Docker image tags when pushing and pulling images from an Azure container registry."
    - content: "The Azure resource group name that contains the registry."
      isCorrect: false
      explanation: "Incorrect. The resource group organizes Azure resources, but Docker image tags use the registry login server."
    - content: "The Azure subscription ID used to create the registry."
      isCorrect: false
      explanation: "Incorrect. The subscription ID identifies the Azure subscription, but Docker image tags use the registry login server."
  - content: "A user wants to create a private registry service for building, storing, and managing container images and related artifacts. They want to use the Azure portal to create an Azure Container Registry instance. What is the purpose of creating an Azure Container Registry instance?"
    choices:
    - content: "To create a private registry service for building, storing, and managing container images and related artifacts."
      isCorrect: true
      explanation: "Correct. Azure Container Registry is a private registry service for building, storing, and managing container images and related artifacts."
    - content: "To create a public registry service for building, storing, and managing container images and related artifacts."
      isCorrect: false
      explanation: "Incorrect. Azure Container Registry provides a private registry service."
    - content: "To create a virtual machine instance with the Azure portal."
      isCorrect: false
      explanation: "Incorrect. The user wants to create a container registry instance, not a virtual machine instance."
