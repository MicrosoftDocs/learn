durationInMinutes: 5
quiz:
  title: "Check your knowledge"
  questions:
  - content: "What is the purpose of parameters in Azure Load Testing?"
    choices:
    - content: "To hard-code values in the test script."
      isCorrect: false
      explanation: "Incorrect. Parameters make the test plan configurable instead of hard-coding values."
    - content: "To make the test plan configurable instead of hard-coding values in the test script."
      isCorrect: true
      explanation: "Correct. Parameters provide values that JMeter or Locust test scripts can retrieve at run time."
    - content: "To split the CSV input data evenly across all engine instances."
      isCorrect: false
      explanation: "Incorrect. Splitting CSV input data is a separate feature, not related to parameters."
  - content: "What is the purpose of the `engineInstances` key in a load test configuration?"
    choices:
    - content: "It specifies the number of virtual users in the test script."
      isCorrect: false
      explanation: "Incorrect. The `engineInstances` key doesn't specify the number of virtual users in the test script."
    - content: "It determines the load pattern in the test script."
      isCorrect: false
      explanation: "Incorrect. The `engineInstances` key doesn't determine the load pattern in the test script."
    - content: "It specifies the number of parallel test engine instances for running the test plan."
      isCorrect: true
      explanation: "Correct. The `engineInstances` key specifies the number of parallel test engine instances that run the test plan."
  - content: "What is the purpose of defining fail criteria in Azure Load Testing?"
    choices:
    - content: "To define performance and quality expectations for your application under load."
      isCorrect: true
      explanation: "Correct. Fail criteria in Azure Load Testing let you define performance and quality expectations for your application under load."
    - content: "To add test engine instances automatically when a metric exceeds a threshold."
      isCorrect: false
      explanation: "Incorrect. Fail criteria determine the test result; they don't scale the number of test engine instances."
    - content: "To trigger a load test to start when the error rate surpasses a given threshold."
      isCorrect: false
      explanation: "Incorrect. Fail criteria don't start a load test. They define performance and quality expectations for an application under load."
  - content: "What is the purpose of using secrets in Azure Load Testing?"
    choices:
    - content: "To securely pass sensitive information such as web service credentials to the load test engine without hard-coding them in the test script."
      isCorrect: true
      explanation: "Correct. Azure Load Testing uses secrets to pass sensitive information securely to the load test engine."
    - content: "To hard-code sensitive information in the test script."
      isCorrect: false
      explanation: "Incorrect. Secrets avoid hard-coding sensitive information in JMeter or Locust test scripts."
    - content: "To store nonsensitive information and make it available as environment variables in the load test engine."
      isCorrect: false
      explanation: "Incorrect. Secrets store sensitive information, while environment variables carry nonsensitive information."
  - content: "A GitHub-hosted workflow must run an Azure load test without storing a client secret. Which authentication configuration meets this requirement?"
    choices:
    - content: "Store a service principal client secret in the repository and pass it directly to the load test script."
      isCorrect: false
      explanation: "Incorrect. This configuration stores a long-lived client secret and exposes it to the test script unnecessarily."
    - content: "Configure a federated identity credential, grant `id-token: write`, and use Azure Login with the client, tenant, and subscription IDs."
      isCorrect: true
      explanation: "Correct. OpenID Connect exchanges GitHub's short-lived token for an Azure access token without storing a client secret."
    - content: "Assign the Load Test Contributor role to the GitHub repository without configuring a Microsoft Entra identity."
      isCorrect: false
      explanation: "Incorrect. Azure RBAC role assignments require a Microsoft Entra security principal, such as an application or managed identity."
