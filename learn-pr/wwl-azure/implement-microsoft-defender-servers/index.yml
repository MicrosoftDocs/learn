title: Implement Microsoft Defender for Servers
summary: Onboard Azure virtual machines and Arc-connected hybrid servers to Microsoft Defender for Servers. Select Plan 1 or Plan 2 based on capability requirements, configure vulnerability scanning using agentless and agent-based Defender Vulnerability Management. Then integrate Microsoft Defender for Endpoint, and manage agentless scanning capabilities for software inventory, secrets, malware detection, and File Integrity Monitoring.
abstract: |
  After completing this module, you can:
    - Select Defender for Servers Plan 1 or Plan 2 based on required capabilities, and onboard Azure VMs and Arc-connected servers
    - Configure vulnerability scanning using agentless and agent-based Defender Vulnerability Management
    - Manage the Microsoft Defender for Endpoint integration and configure agentless scanning and File Integrity Monitoring
prerequisites: |
  - Familiarity with Microsoft Defender for Cloud at a foundational level
  - Understanding of Azure role-based access control (RBAC) and Azure Policy fundamentals
  - Familiarity with Azure Arc-enabled servers
