title: Deploy applications to Azure Kubernetes Service
summary: Provision an Azure Kubernetes Service (AKS) cluster, enforce pod configuration with Azure Policy, evaluate AKS storage options, configure persistent storage with StorageClasses and PersistentVolumeClaims, and create and update Kubernetes Deployments.
abstract: |
  After completing this module, you'll be able to:
  -   Provision an AKS cluster.
  -   Install the Azure Policy add-on for Azure Kubernetes Service.
  -   Assign an Azure Policy initiative to an Azure Kubernetes Service cluster.
  -   Validate the effect of Azure Policy.
  -   Select storage options for AKS containerized workloads.
  -   Configure persistent storage for pods by using StorageClasses and PersistentVolumeClaims.
  -   Describe why Kubernetes Deployments are preferred over individual pods, and create and update a Deployment in AKS.
prerequisites: |
  An Azure subscription with access to Azure Cloud Shell is required to complete the hands-on exercises. Your account must have permission to create AKS clusters and resources, register resource providers such as `Microsoft.PolicyInsights`, enable AKS add-ons, and create Azure Policy assignments. For policy assignment operations, use an account assigned the Owner or Resource Policy Contributor role at the assignment scope.
