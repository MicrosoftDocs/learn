title: Plan and implement Azure Bastion
summary: Plan and deploy Azure Bastion to provide secure, browser-based RDP and SSH access to virtual machines without exposing public IP addresses or management ports. Select the appropriate SKU based on scale and feature requirements, deploy and configure Bastion in an Azure virtual network, and connect to VMs using both portal and native client methods.
abstract: |
  After completing this module, you can:
    - Select the appropriate Azure Bastion SKU based on scale, feature, and cost requirements
    - Deploy and configure Azure Bastion in an Azure virtual network
    - Connect to Azure virtual machines through Azure Bastion using portal and native client methods
    - Configure advanced Bastion features including native client support, shareable links, and session recording
prerequisites: |
  - Working knowledge of Azure Virtual Machines, including deploying and managing VMs
  - Understanding of Azure Virtual Network concepts including subnets and public IP addresses
  - Familiarity with RDP and SSH remote access concepts
