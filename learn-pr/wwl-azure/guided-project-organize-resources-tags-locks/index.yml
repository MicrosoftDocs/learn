title: Guided project - Organize and protect resources with tags and locks
summary: |
  This guided project helps you organize Azure resources with tags and protect them from accidental deletion with locks.

  [!INCLUDE [](../../includes/wwl/guided-project-notes.md)]
abstract: |
  Upon completion of this module, you'll be able to:

  -   Create resources and apply tags for organization and cost tracking

  -   Apply a delete lock to prevent accidental resource removal

  -   Test that the lock blocks deletion and then remove the lock

  -   Clean up all resources to avoid charges
