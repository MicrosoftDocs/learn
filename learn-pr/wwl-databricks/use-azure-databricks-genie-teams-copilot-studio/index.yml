title: Use Azure Databricks Genie in Microsoft Teams and Copilot Studio
summary: Chat with Azure Databricks Genie Spaces in Microsoft Teams, or build a Copilot Studio agent grounded in one. Evaluate the tradeoffs between the two integration paths, apply effective prompting to get reliable answers, configure the permissions that govern data access, and build a Copilot Studio agent that surfaces a Genie Space in Microsoft Teams.
abstract: |
  By the end of this module, you'll be able to:
  - Describe what Azure Databricks Genie and Genie Spaces are and how they provide governed conversational data access.
  - Explain how Unity Catalog enforces consistent data permissions across every Genie surface.
  - Compare the Databricks app and a Copilot Studio agent as integration paths for accessing Genie in Microsoft Teams, including their constraints.
  - Use the Databricks app in Microsoft Teams to query a Genie Space and validate the response.
  - Identify the Unity Catalog and Genie Space permissions required to share a space with Microsoft 365 consumers.
  - Build a Copilot Studio agent that uses a Genie Space as an MCP tool and publish it to Microsoft Teams.
prerequisites: |
  - Familiarity with Microsoft Teams (using apps, messages, channels).
  - Basic awareness of what a database or data warehouse is.
  - Familiarity with Azure Databricks workspaces and Unity Catalog concepts.
  - Basic Copilot Studio familiarity.
