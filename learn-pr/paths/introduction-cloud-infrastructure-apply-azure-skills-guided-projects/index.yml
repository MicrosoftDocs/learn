summary: |
  New to the cloud? Introduction to Cloud Infrastructure is a series that teaches you basic cloud concepts, provides a streamlined overview of many Azure services, and guides you with hands-on exercises to deploy your first services for free. Complete all of the learning paths in the series if you're preparing for Exam AZ-900: Microsoft Azure Fundamentals.
  This learning path in the series, **Introduction to Cloud Infrastructure: Apply Azure skills in guided projects**, provides hands-on, real-world practice through guided projects. Complete as many or as few projects as you like to strengthen your Azure skills. The other learning paths in the series are [**Part 1: Describe cloud concepts**](/training/paths/microsoft-azure-fundamentals-describe-cloud-concepts/), [**Part 2: Describe Azure architecture and services**](/training/paths/azure-fundamentals-describe-azure-architecture-services/), and [**Part 3: Describe Azure management and governance**](/training/paths/describe-azure-management-governance/).
