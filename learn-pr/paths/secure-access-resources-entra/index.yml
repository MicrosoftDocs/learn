uid: learn.wwl.secure-access-resources-entra
metadata:
  title: Secure Access to Resources by Using Microsoft Entra
  description: Learn to design and implement strong authentication controls, apply Just-in-Time privileged access strategies, and extend identity-based security to AI-powered applications using Microsoft Entra.
  ms.date: 05/17/2026
  author: r-c-stewart
  ms.author: roberts
