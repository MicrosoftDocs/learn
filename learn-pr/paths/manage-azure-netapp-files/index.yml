title: Managing Azure NetApp Files
summary: |
  Azure NetApp Files provides enterprise-grade file storage for business-critical workloads on Azure. This learning path equips you with the foundational knowledge and hands-on skills needed to register, set up, and manage Azure NetApp Files resources.
  
  Through this learning path, you'll complete essential setup tasks including registering Azure NetApp Files for your subscription, creating NetApp accounts, configuring networking prerequisites, and requesting region access when needed.
prerequisites: |
  - An active Azure subscription
  - Basic understanding of Azure portal navigation
  - Familiarity with Azure networking concepts
