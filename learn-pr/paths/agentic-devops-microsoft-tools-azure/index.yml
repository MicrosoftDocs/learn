title: Apply agentic DevOps practices using Microsoft tools on Azure
summary: |
  Experienced DevOps engineers operating in Azure environments increasingly encounter AI-assisted and agent-driven capabilities across the Microsoft toolchain. Knowing when to apply those capabilities — and how to do it safely — is now a core engineering competency.

  This learning path builds a practical framework for evaluating, selecting, and operationalizing agentic approaches in Microsoft DevOps environments. You start by establishing a shared vocabulary for agentic DevOps and mapping high-value opportunities in your day-to-day work. You then compare Microsoft agentic solution families — GitHub Copilot, Azure Copilot agents, Azure DevOps AI features, and MCP-enabled extensibility — against concrete task profiles. Finally, you implement governance, observability, and adoption controls to operationalize agentic DevOps in production-grade Azure environments.

prerequisites: |
  - Experience designing and managing CI/CD pipelines in Azure Pipelines or GitHub Actions
  - Familiarity with Infrastructure as Code using Bicep or similar tooling
  - Working knowledge of Azure resource governance, monitoring, and incident response
  - Familiarity with GitHub Copilot in Visual Studio Code
