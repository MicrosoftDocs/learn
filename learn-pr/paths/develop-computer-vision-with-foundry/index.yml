prerequisites: |
  Before starting this module, you should be familiar with fundamental AI concepts and services in Azure. Consider completing the [Get started with artificial intelligence](/training/paths/get-started-with-artificial-intelligence-on-azure) learning path first.
summary: |
  Generative AI enables powerful computer vision capabilities, from creating images and videos to extracting insights from visual content. This learning path helps you understand how to generate images, create videos from prompts, and analyze images using Content Understanding in Microsoft Foundry. By the end of this learning path, you will have the skills to build computer vision solutions that generate and analyze visual content on Azure.
