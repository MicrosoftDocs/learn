title: "Optimize DevOps with AI agents on Azure"
summary: |
  This learning path shows how to integrate AI-powered agents into your Azure DevOps workflows. You'll learn to manage Azure Boards with GitHub Copilot, operate Azure DevOps through the MCP Server using natural language, and improve Azure reliability with the SRE Agent.
prerequisites: |
  -   Foundational knowledge of generative AI and agentic AI.
  -   Basic knowledge of Azure DevOps concepts including boards, repos, and pipelines.
  -   Experience using Visual Studio Code.
  -   Familiarity with GitHub Copilot fundamentals.
