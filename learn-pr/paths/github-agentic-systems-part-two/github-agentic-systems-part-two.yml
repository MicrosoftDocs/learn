  description: This is part two of two part learning series to support our new certification, Developing in Agentic AI Systems. In this learning path you will learn how to design, deploy, and manage agentic AI systems within the software development lifecycle by integrating, orchestrating, and governing autonomous agents using GitHub to ensure safe, reliable, and scalable delivery.
