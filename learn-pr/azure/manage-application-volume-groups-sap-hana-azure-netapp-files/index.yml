title: Manage application volume groups for SAP HANA in Azure NetApp Files
summary: Manage application volume groups for SAP HANA in Azure NetApp Files by deploying SAP HANA hosts, adding volumes to multiple-host systems, configuring replication, and managing volumes.
abstract: |
  By completing this module, you're able to:
  - Deploy the first application volume group for SAP HANA
  - Add volumes for an SAP HANA system using application volume groups
  - Configure HANA System Replication for high availability
  - Use cross-region replication for SAP HANA disaster recovery
  - Manage volumes in an application volume group for SAP HANA
prerequisites: |
  - Manage volume capacity and performance for Azure NetApp Files
