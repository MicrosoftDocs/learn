metadata:
  title: Manage volume access for Azure NetApp Files
  description: Learn how to manage access to a volume in Azure NetApp Files by configuring export policies, Unix permissions, and ACLs for NFS and dual-protocol volumes. Understand how to manage SMB share ACLs and configure network features for a volume.
