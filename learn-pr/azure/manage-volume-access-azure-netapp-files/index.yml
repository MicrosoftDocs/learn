title: Manage volume access for Azure NetApp Files
summary: Manage access to Azure NetApp Files volumes by configuring export policies, Unix permissions, ACLs, and network features.
abstract: |
  By completing this module, you'll be able to:
  - Configure export policies and Unix permissions for NFS and dual-protocol volumes
  - Manage access control lists (ACLs) for NFS and SMB volumes
  - Configure Virtual WAN for Azure NetApp Files
prerequisites: |
  - Manage dual-protocol volumes in Azure NetApp Files
