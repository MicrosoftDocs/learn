title: Register and set up Azure NetApp Files
summary: Register Azure NetApp Files for your subscription and configure the core networking and account prerequisites needed before creating production volumes.
abstract: |
  By the end of this module, you'll be able to:
  - Register the Microsoft.NetApp resource provider.
  - Create an Azure NetApp Files account.
  - Delegate a subnet for Azure NetApp Files volumes.
  - Request Azure NetApp Files region access when needed.
prerequisites: |
  - An active Azure subscription.
  - Basic familiarity with Azure portal navigation.
