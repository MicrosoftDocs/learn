quiz:
  questions:
    - content: "When resizing a volume in Azure NetApp Files, what happens to the data stored within the pool or volume?"
      choices:
        - content: "The data remains unaffected during the resize process."
          isCorrect: true
          explanation: "Correct. When resizing a capacity pool or a volume in Azure NetApp Files, the data stored within the pool or volume remains unaffected. The resize operation only adjusts the capacity allocation without impacting on the existing data."
        - content: "The data is automatically migrated to a larger capacity pool or volume."
          isCorrect: false
          explanation: "Incorrect. When resizing a capacity pool or a volume in Azure NetApp Files, the data isn't automatically migrated to a larger capacity pool or volume. The resize operation only adjusts the capacity allocation without moving or migrating the data."
        - content: "The data is deleted and needs to be reuploaded after the resize."
          isCorrect: false
          explanation: "Incorrect. When resizing a capacity pool or a volume in Azure NetApp Files, the data isn't deleted during the resize process. The data remains intact and accessible throughout the resizing process."
        - content: "The data is temporarily inaccessible until the resize is complete."
          isCorrect: false
          explanation: "Incorrect. When resizing a capacity pool or a volume in Azure NetApp Files, the data remains accessible during the resize process. The resize operation doesn't cause any downtime or temporary inaccessibility to the data stored within the pool or volume."
    - content: "When managing Azure NetApp Files storage with cool access, which of the following statements is true?"
      choices:
        - content: "Cool access provides high-performance storage with low latency."
          isCorrect: false
          explanation: "Incorrect. Cool access in Azure NetApp Files is designed for infrequently accessed data with cost optimization, rather than high-performance storage with low latency. If high-performance storage is required, the standard access tier is more suitable."
        - content: "Cool access is suitable for infrequently accessed data with low cost."
          isCorrect: true
          explanation: "Correct. Cool access in Azure NetApp Files is ideal for storing data that is accessed infrequently but still requires availability. It provides a lower-cost storage option compared to the standard access tier, making it suitable for scenarios where cost optimization is important."
        - content: "Cool access provides unlimited storage capacity."
          isCorrect: false
          explanation: "Incorrect. Cool access, like other access tiers in Azure NetApp Files, doesn't provide unlimited storage capacity. The storage capacity is determined by the chosen service level and the subscription limits."
        - content: "Cool access is only available in specific Azure regions."
          isCorrect: false
          explanation: "Incorrect. Cool access is available in multiple Azure regions and can be selected based on the region availability and requirements. It isn't limited to specific regions."
    - content: "In a cross-region replication (CRR) or cross-zone replication (CZR) relationship, how are quota rules handled?"
      choices:
        - content: "Quota rules created, updated, or deleted on the source volume are automatically synced to the destination volume."
          isCorrect: true
          explanation: "Correct. In a CRR or CZR relationship, quota rules are synced from the source volume to the destination volume. Any quota rules created, updated, or deleted on the source volume automatically apply to the destination volume."
        - content: "Quota rules must be manually recreated on the destination volume after replication starts."
          isCorrect: false
          explanation: "Incorrect. Quota rules are automatically synced from the source to the destination volume. Manual recreation isn't required while the replication relationship is active."
        - content: "Quota rules can be updated only on the destination volume during replication"
          isCorrect: false
          explanation: "Incorrect. In a CRR or CZR relationship, quota rules can't be created, updated, or deleted on the destination volume until the replication relationship is deleted."
        - content: "Quota rules aren't supported when a volume is part of a CRR or CZR relationship."
          isCorrect: false
          explanation: "Incorrect. Quota rules are supported in CRR and CZR relationships, and they're synced from the source volume to the destination volume."