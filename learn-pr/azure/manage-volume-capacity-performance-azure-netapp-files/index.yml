title: Manage volume capacity and performance for Azure NetApp Files
summary: Learn different ways to monitor capacity utilization and manage performance-related volume settings in Azure NetApp Files.
abstract: |
  By completing this module, you'll be able to:
  - Monitor the capacity of a volume
  - Resize a capacity pool or a volume
  - Dynamically change the service level of a volume
  - Manage default and individual user and group quotas for a volume
  - Manage storage with cool access
prerequisites: |
  - Mount Azure NetApp Files volumes
