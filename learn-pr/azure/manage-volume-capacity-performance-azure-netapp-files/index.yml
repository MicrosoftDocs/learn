  title: Manage volume capacity and performance for Azure NetApp Files
  description: Learn how to monitor volume capacity, resize capacity pools and volumes, change volume service levels, manage quota rules, and use cool access in Azure NetApp Files.
  ms.date: 06/10/2026
  author: rmishras
