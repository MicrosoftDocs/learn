title: Design semantic models for scale in Microsoft Fabric
summary: "Design semantic models for scale in Microsoft Fabric. Choose the right storage mode, design star schema relationships for clarity and performance, create scalable calculation patterns, and configure settings that support large datasets and concurrent consumption."
abstract: |
  By the end of this module, you'll be able to:
    - Choose a storage mode based on data freshness, performance, and source location.
    - Design star schema relationships for clarity and performance in a semantic model.
    - Design calculations that stay performant and maintainable as data volumes and team size grow.
    - Configure semantic model settings that support large-scale consumption.
prerequisites: |
  - Understanding of data modeling concepts, including star schema, fact tables, and dimension tables.
  - Experience with Microsoft Fabric and Power BI.
