<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="Segoe UI, sans-serif" font-size="13">
  <title>Contoso Corporation — Four Analytical Workloads</title>
  <desc>Diagram showing Contoso's four analytical workloads: data engineering, business intelligence, real-time monitoring, and machine learning.</desc>

  <!-- Background -->
  <rect width="800" height="400" fill="#FAFAFA" rx="4"/>

  <!-- Center node -->
  <rect x="230" y="160" width="340" height="64" rx="12" fill="#0078D4"/>
  <text x="400" y="185" text-anchor="middle" fill="#FFF" font-size="15" font-weight="600">Contoso Corporation</text>
  <text x="400" y="205" text-anchor="middle" fill="#DCEEFB" font-size="12">500 Retail Stores</text>

  <!-- Connector lines (thin gray, no arrowheads) -->
  <line x1="290" y1="160" x2="170" y2="105" stroke="#B0B0B0" stroke-width="1.5"/>
  <line x1="510" y1="160" x2="630" y2="105" stroke="#B0B0B0" stroke-width="1.5"/>
  <line x1="290" y1="224" x2="170" y2="295" stroke="#B0B0B0" stroke-width="1.5"/>
  <line x1="510" y1="224" x2="630" y2="295" stroke="#B0B0B0" stroke-width="1.5"/>

  <!-- Top-left: Data Engineering (teal) -->
  <rect x="42" y="50" width="256" height="56" rx="10" fill="#008080"/>
  <text x="170" y="73" text-anchor="middle" fill="#FFF" font-size="13" font-weight="600">Data Engineering</text>
  <text x="170" y="92" text-anchor="middle" fill="#D0F0F0" font-size="11">Ingest &amp; transform 5 TB daily</text>

  <!-- Top-right: Business Intelligence (purple) -->
  <rect x="502" y="50" width="256" height="56" rx="10" fill="#6B2FA0"/>
  <text x="630" y="73" text-anchor="middle" fill="#FFF" font-size="13" font-weight="600">Business Intelligence</text>
  <text x="630" y="92" text-anchor="middle" fill="#E0D0F0" font-size="11">Executive dashboards &amp; reports</text>

  <!-- Bottom-left: Real-Time Monitoring (orange) -->
  <rect x="42" y="290" width="256" height="56" rx="10" fill="#D97A00"/>
  <text x="170" y="313" text-anchor="middle" fill="#FFF" font-size="13" font-weight="600">Real-Time Monitoring</text>
  <text x="170" y="332" text-anchor="middle" fill="#FFF0D0" font-size="11">POS events across 500 stores</text>

  <!-- Bottom-right: Machine Learning (green) -->
  <rect x="502" y="290" width="256" height="56" rx="10" fill="#107C10"/>
  <text x="630" y="313" text-anchor="middle" fill="#FFF" font-size="13" font-weight="600">Machine Learning</text>
  <text x="630" y="332" text-anchor="middle" fill="#D0F0D0" font-size="11">Churn prediction &amp; recommendations</text>
</svg>