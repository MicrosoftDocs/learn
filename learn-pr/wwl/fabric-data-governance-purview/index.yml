title: Govern data in Microsoft Fabric with Purview
summary: "Explore the governance capabilities built into Microsoft Fabric, learn which advanced controls require a Microsoft Purview license, and use the OneLake catalog Govern tab to assess and improve your governance posture."
abstract: |
  By the end of this module, you are able to:
    - Identify built-in governance capabilities included with a Microsoft Fabric license.
    - Distinguish between governance features included with Fabric and those that require a Microsoft Purview license.
    - Describe how Purview-powered capabilities—including sensitivity labels, data loss prevention, and audit—work within Fabric.
    - Use the OneLake catalog Govern tab to assess your governance posture and act on recommended improvements.
prerequisites: |
  - Familiarity with the Microsoft Fabric user interface and core concepts.
