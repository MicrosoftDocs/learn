### YamlMime:ModuleUnit
uid: learn.fabric-data-governance-purview.knowledge-check
title: Module assessment
metadata:
  title: Module Assessment
  description: "Test your knowledge of Microsoft Fabric data governance and Microsoft Purview capabilities."
  ms.date: 06/12/2026
  author: theresa-i
  ms.author: theresai
  ms.topic: unit
  module_assessment: true
durationInMinutes: 3
content: |
quiz:
  questions:
  - content: "Which of the following capabilities is included with a Microsoft Fabric license and doesn't require an additional Microsoft Purview license?"
    choices:
    - content: "Data Loss Prevention (DLP) policies."
      isCorrect: false
      explanation: "Incorrect. DLP policies require a Microsoft Purview license to configure and enforce."
    - content: "Item endorsement."
      isCorrect: true
      explanation: "Correct. Endorsement is a built-in Fabric feature included with your Fabric license. Sensitivity labels and DLP policies both require a Microsoft Purview license."
    - content: "Sensitivity labels."
      isCorrect: false
      explanation: "Incorrect. Sensitivity labels in Microsoft Fabric require Microsoft Purview Information Protection, which needs another Purview license."
  - content: "Where do DLP policy restrictions surface for Fabric users?"
    choices:
    - content: "In the Microsoft Purview portal."
      isCorrect: false
      explanation: "Incorrect. DLP policies are configured in the Purview Microsoft Purview portal, but Fabric users see their effects inside Fabric—not in the Microsoft Purview portal."
    - content: "As policy tips or access restrictions on Fabric items."
      isCorrect: true
      explanation: "Correct. When a DLP policy triggers, Fabric users see a policy tip warning or an access restriction on the affected item, directly inside Fabric."
    - content: "In the Fabric Admin portal."
      isCorrect: false
      explanation: "Incorrect. The Fabric Admin portal is used for tenant configuration, not for displaying DLP policy tips to end users."
  - content: "Which section of the OneLake catalog Govern tab shows sensitivity label coverage and DLP policy evaluation?"
    choices:
    - content: "Manage your data estate."
      isCorrect: false
      explanation: "Incorrect. This section provides an inventory view of your Fabric data estate organized by capacities and domains."
    - content: "Protect, secure & comply."
      isCorrect: true
      explanation: "Correct. This section shows sensitivity label coverage and DLP policy evaluation across your tenant, helping you identify labeling gaps and policy violations."
    - content: "Discover, trust, and reuse."
      isCorrect: false
      explanation: "Incorrect. This section surfaces insights about item endorsement, data freshness, and curation state."
    
  
