title: Get started with data warehouses in Microsoft Fabric
summary: Understand what a Fabric data warehouse is, why it provides full T-SQL transactional capabilities, and how to create, query, and transform data for analytics.
abstract: |
  In this module, you learn how to:

  -   Describe data warehouse concepts and dimensional modeling fundamentals.

  -   Create tables, load data, and understand ingestion methods in a Fabric warehouse.

  -   Query and transform data using T-SQL and the visual query editor.

  -   Model warehouse data for reporting and downstream consumption.

  -   Secure and monitor a data warehouse.
prerequisites: You should be familiar with the Microsoft Fabric interface, relational database concepts, SQL fundamentals, and basic dimensional modeling concepts such as fact and dimension tables.
