quiz:
  title: "Check your knowledge"
  questions:
  - content: "What is the primary purpose of the monitoring hub in Microsoft Fabric?"
    choices:
    - content: "To create and schedule data pipelines and dataflows."
      isCorrect: false
      explanation: "Incorrect. The monitoring hub is used for viewing activity status and investigating failures, not for creating or scheduling activities."
    - content: "To provide a centralized view of recent activity status across a workspace, including the ability to view details and historical runs."
      isCorrect: true
      explanation: "Correct. The monitoring hub aggregates activity data from across a workspace and lets you view status, details, and historical runs in one place."
    - content: "To automatically send alerts when a data pipeline fails."
      isCorrect: false
      explanation: "Incorrect. Automatic alerting is a function of Activator. The monitoring hub displays activity status but requires you to check it manually (unless you configure schedule failure notifications)."
  - content: "A dataflow that usually finishes in 4 minutes suddenly takes 20 minutes but still shows a Succeeded status. What should you do?"
    choices:
    - content: "Ignore it because the status is Succeeded."
      isCorrect: false
      explanation: "Incorrect. A significant increase in duration can indicate a data volume spike, resource contention, or other emerging issue — even when the activity succeeds."
    - content: "Investigate the cause by viewing activity details and comparing against historical runs to identify what changed."
      isCorrect: true
      explanation: "Correct. Comparing current duration against historical run data helps you identify when a change was introduced and diagnose the root cause before it becomes a failure."
    - content: "Delete and recreate the dataflow."
      isCorrect: false
      explanation: "Incorrect. Recreating the dataflow doesn't address the underlying cause and could introduce additional problems."
  - content: "Which action available in Activator enables automated remediation of a Fabric job failure — not just notification?"
    choices:
    - content: "Send an email."
      isCorrect: false
      explanation: "Incorrect. Sending an email notifies someone about the failure but doesn't take any remediation action automatically."
    - content: "Post a message to a Microsoft Teams channel."
      isCorrect: false
      explanation: "Incorrect. Posting to Teams is a notification action. It alerts your team but doesn't fix or respond to the underlying failure."
    - content: "Run a Fabric activity."
      isCorrect: true
      explanation: "Correct. Running a Fabric activity — such as a notebook or pipeline — lets Activator automatically respond to the failure, for example by executing a cleanup or retry job."