title: Govern analytics data in Microsoft Fabric
summary: Implement Fabric-native governance practices including data classification, sensitivity labels, endorsement, and documentation. Ensure data assets are trustworthy and governed for both human and AI consumption.
abstract: |
  By the end of this module, you're able to:
  - Apply data classification and sensitivity labels to Fabric items.
  - Use endorsement (promoted, certified, and master data) as a governance mechanism.
  - Implement documentation practices for data discoverability.
  - Describe how governance controls affect AI agent data consumption.
  - Use OneLake catalog features for data estate management.
prerequisites: |
  - Experience working with Microsoft Fabric workspaces.
  - Familiarity with security concepts in Microsoft Fabric.
