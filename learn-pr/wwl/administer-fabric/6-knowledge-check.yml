uid: learn.wwl.administer-fabric.knowledge-check
title: Module assessment
metadata:
  title: Module assessment
  ai_generated_module_assessment: false
  description: "Knowledge check"
  ms.date: 05/27/2026
  author: theresai
  ms.author: theresai
