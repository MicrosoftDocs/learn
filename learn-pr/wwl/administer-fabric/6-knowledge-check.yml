  module_assessment: true
durationInMinutes: 3
quiz:
  questions:
  - content: "A Fabric capacity is approaching its CU limit during business hours and users report slow report refreshes. What should the admin do first?"
    choices:
    - content: "Pause the capacity to reset the overload and relieve throttling."
      isCorrect: false
      explanation: "Incorrect. Pausing a capacity makes all content on it unavailable to users. This isn't the right response for a production capacity under high load."
    - content: "Scale up the capacity to a larger SKU to provide more compute."
      isCorrect: true
      explanation: "Correct. When CU consumption approaches the capacity limit and users are affected, scaling up increases the available compute. The admin can scale back down after the high-demand period ends."
    - content: "Move the affected workspaces to a new tenant to isolate the workload."
      isCorrect: false
      explanation: "Incorrect. Moving workspaces to a new tenant isn't a valid response to capacity utilization issues. Scaling up or scaling out to a second capacity are the appropriate options."
  - content: "A user with a Fabric Free license needs to view Power BI reports in a workspace on an F64 capacity. What is the minimum configuration required?"
    choices:
    - content: "The user needs a Power BI Pro license to view Power BI content."
      isCorrect: false
      explanation: "Incorrect. On F64 or larger capacities, users with a Fabric Free license can view Power BI content if they have at least a viewer role on the workspace."
    - content: "The user needs a viewer role on the workspace."
      isCorrect: true
      explanation: "Correct. On F64 or larger capacities, a Fabric Free license combined with a viewer role on the workspace is sufficient to view Power BI reports."
    - content: "The user needs a Power BI Premium Per User license to access Power BI reports."
      isCorrect: false
      explanation: "Incorrect. PPU is a per-user license, not required for viewing Power BI content on F64 or larger capacities. A Fabric Free license with a viewer role is sufficient."
  - content: "A Fabric admin needs to restrict one group of users from exporting data to Excel while allowing everyone else to continue using the feature. What is the most efficient approach?"
    choices:
    - content: "Remove the Export to Excel permission from each user's workspace role individually."
      isCorrect: false
      explanation: "Incorrect. Workspace roles don't control the Export to Excel feature. Managing permissions user by user is also inefficient."
    - content: "Disable the Export to Excel tenant setting for the entire organization."
      isCorrect: false
      explanation: "Incorrect. Disabling the setting for the entire organization would block all users from exporting to Excel, not just the targeted group."
    - content: "Add the restricted users to a security group and configure the Export to Excel tenant setting to be enabled for all users except that group."
      isCorrect: true
      explanation: "Correct. Tenant settings support enabling a feature for everyone except specific security groups. This approach restricts only the targeted users while leaving the feature available for the rest of the organization."
  - content: "A department lead needs to manage workspaces within a single domain, enforce domain-level policies, and coordinate with workspace admins. The lead doesn't need access to tenant-wide settings or other domains. What role should the Fabric admin assign?"
    choices:
    - content: "Fabric admin"
      isCorrect: false
      explanation: "Incorrect. The Fabric admin role grants full control over the entire tenant, including all capacities, domains, and tenant settings. This is far more access than needed."
    - content: "Domain admin"
      isCorrect: true
      explanation: "Correct. A domain admin can manage workspaces within their domain, enforce domain-specific policies, and work with workspace admins, all without access to tenant-wide settings or other domains."
    - content: "Workspace admin for each workspace in the domain"
      isCorrect: false
      explanation: "Incorrect. Workspace admins manage a single workspace's access and items. This role doesn't provide domain-level authority to manage policies or assign workspaces across the domain."
