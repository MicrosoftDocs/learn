title: Organize a Fabric lakehouse using medallion architecture design
summary: Explore the potential of the medallion architecture design in Microsoft Fabric. Organize and transform your data across Bronze, Silver, and Gold layers of a lakehouse for optimized analytics.
abstract: |
  In this module, you'll learn how to:
  - Describe the medallion architecture pattern and why it's used in lakehouse analytics.
  - Identify the key decisions when planning a medallion architecture in Fabric.
  - Describe how gold layer data is served for querying and reporting.
  - Describe best practices for securing and governing medallion layers.
prerequisites: |
  Before starting this module, you should be familiar with Microsoft Fabric lakehouses and have a basic understanding of SQL.
