<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 380" font-family="Segoe UI, sans-serif">
  <!-- transparent background -->

  <!-- Table container -->
  <rect x="80" y="15" width="300" height="350" rx="8" fill="#f5f5f5" stroke="#cccccc" stroke-width="1.5"/>

  <!-- Table header -->
  <rect x="80" y="15" width="300" height="38" rx="8" fill="#0078D4"/>
  <rect x="80" y="38" width="300" height="15" fill="#0078D4"/>
  <text x="230" y="42" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="bold">Fact_Sales</text>

  <!-- Section 1: Dimension Keys -->
  <rect x="80" y="60" width="6" height="110" fill="#0099BC"/>
  <text x="105" y="82" fill="#0099BC" font-size="11" font-weight="bold">DIMENSION KEYS</text>
  <line x1="100" y1="90" x2="365" y2="90" stroke="#e0e0e0" stroke-width="1"/>
  <text x="105" y="112" fill="#333333" font-size="13">ProductKey (FK)</text>
  <text x="105" y="132" fill="#333333" font-size="13">CustomerKey (FK)</text>
  <text x="105" y="152" fill="#333333" font-size="13">DateKey (FK)</text>

  <!-- Divider -->
  <line x1="95" y1="172" x2="365" y2="172" stroke="#cccccc" stroke-width="1"/>

  <!-- Section 2: Measures -->
  <rect x="80" y="178" width="6" height="100" fill="#8661C5"/>
  <text x="105" y="200" fill="#8661C5" font-size="11" font-weight="bold">MEASURES</text>
  <line x1="100" y1="208" x2="365" y2="208" stroke="#e0e0e0" stroke-width="1"/>
  <text x="105" y="230" fill="#333333" font-size="13">Revenue</text>
  <text x="105" y="250" fill="#333333" font-size="13">Quantity</text>
  <text x="105" y="270" fill="#333333" font-size="13">DiscountAmount</text>

  <!-- Divider -->
  <line x1="95" y1="285" x2="365" y2="285" stroke="#cccccc" stroke-width="1"/>

  <!-- Section 3: Degenerate Dimensions -->
  <rect x="80" y="290" width="6" height="70" fill="#D83B01"/>
  <text x="105" y="312" fill="#D83B01" font-size="11" font-weight="bold">DEGENERATE DIMENSIONS</text>
  <line x1="100" y1="320" x2="365" y2="320" stroke="#e0e0e0" stroke-width="1"/>
  <text x="105" y="342" fill="#333333" font-size="13">OrderNumber</text>
</svg>