<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 250" font-family="Segoe UI, sans-serif">
  <!-- transparent background -->

  <!-- ===== Dim_Date (left) ===== -->
  <rect x="30" y="75" width="180" height="100" rx="8" fill="#0099BC"/>
  <text x="120" y="130" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="bold">Dim_Date</text>

  <!-- ===== Fact_Orders (right) ===== -->
  <rect x="420" y="55" width="200" height="140" rx="8" fill="#0078D4"/>
  <text x="520" y="85" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="bold">Fact_Orders</text>
  <line x1="435" y1="95" x2="605" y2="95" stroke="#ffffff" stroke-opacity="0.3"/>
  <text x="445" y="118" fill="#ffffff" font-size="12">OrderDateKey (FK)</text>
  <text x="445" y="142" fill="#ffffff" font-size="12">ShipDateKey (FK)</text>
  <text x="445" y="166" fill="#ffffff" font-size="12">DeliveryDateKey (FK)</text>

  <!-- ===== Three horizontal connection lines ===== -->
  <!-- Order Date -->
  <line x1="210" y1="112" x2="420" y2="112" stroke="#0078D4" stroke-width="2"/>
  <rect x="280" y="100" width="80" height="22" rx="11" fill="#0078D4"/>
  <text x="320" y="115" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="bold">Order Date</text>

  <!-- Ship Date -->
  <line x1="210" y1="136" x2="420" y2="136" stroke="#8661C5" stroke-width="2"/>
  <rect x="280" y="124" width="80" height="22" rx="11" fill="#8661C5"/>
  <text x="320" y="139" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="bold">Ship Date</text>

  <!-- Delivery Date -->
  <line x1="210" y1="160" x2="420" y2="160" stroke="#D83B01" stroke-width="2"/>
  <rect x="272" y="148" width="96" height="22" rx="11" fill="#D83B01"/>
  <text x="320" y="163" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="bold">Delivery Date</text>
</svg>