### YamlMime:ModuleUnit
uid: learn.wwl.optimize-semantic-model-performance.knowledge-check
title: Knowledge check
metadata:
  title: Knowledge Check
  description: "Knowledge check for optimizing semantic model performance."
  ms.date: 04/06/2026
  author: angierudduck
  ms.author: anrudduc
  ms.topic: unit
  module_assessment: true
durationInMinutes: 3
content: |
quiz:
  questions:
  - content: "A report author notices that a table visual takes longer to load than other visuals on the same page. In Performance analyzer, the DAX query time is 4,200 ms while the visual display time is 150 ms. What should the report author investigate first?"
    choices:
    - content: "The rendering performance of the table visual"
      isCorrect: false
      explanation: "Incorrect. The visual display time is only 150 ms, which indicates rendering is fast. The bottleneck is the DAX query, not the visual itself."
    - content: "The measures or filter patterns used by the visual's DAX query"
      isCorrect: true
      explanation: "Correct. A DAX query time of 4,200 ms compared to 150 ms of visual display time clearly points to the query as the bottleneck. Copy the query from Performance analyzer and analyze it in DAX query view to identify expensive patterns."
    - content: "The network connection between the client and the Power BI service"
      isCorrect: false
      explanation: "Incorrect. Network latency appears in the Other timing category, not the DAX query category. The high DAX query time indicates the issue is in the measure or data model."
  - content: "A measure calculates the same CALCULATE expression three times within its formula. What DAX optimization technique most directly addresses this inefficiency?"
    choices:
    - content: "Replace iterator functions with aggregation functions"
      isCorrect: false
      explanation: "Incorrect. Iterator replacement applies when SUMX, AVERAGEX, or similar functions are used unnecessarily. Repeated CALCULATE expressions are best handled by storing the result in a variable."
    - content: "Use a VAR to store the CALCULATE result and reference it in the RETURN expression"
      isCorrect: true
      explanation: "Correct. Variables (VAR/RETURN) evaluate an expression once and store the result. Referencing the variable multiple times avoids recalculating the same CALCULATE expression, which can significantly reduce query time."
    - content: "Move the calculation to a Power Query computed column"
      isCorrect: false
      explanation: "Incorrect. Moving to Power Query is appropriate for static transformations that don't change between refreshes. A measure with context-dependent CALCULATE expressions needs to stay in DAX. Use variables to avoid redundant evaluation."
  - content: "A semantic model contains a column that stores order timestamps to the millisecond, but reports only group data by date. Which cardinality reduction technique is most appropriate?"
    choices:
    - content: "Remove the column entirely from the model"
      isCorrect: false
      explanation: "Incorrect. Removing the column is only appropriate if it isn't used anywhere in the model. If the timestamp is used in relationships, measures, or row-level security, removing it breaks the model."
    - content: "Convert the column data type from datetime to text"
      isCorrect: false
      explanation: "Incorrect. Converting to text increases cardinality and worsens performance. Text columns use hash encoding, which is less efficient than the value encoding used for date types."
    - content: "Truncate the column to date precision in Power Query before loading"
      isCorrect: true
      explanation: "Correct. Truncating from datetime (millions of unique values) to date (a few thousand) reduces cardinality significantly while preserving the day-level granularity that reports require."
  - content: "An organization has a DirectQuery model with a large fact table containing billions of rows. Reports frequently query the data at the monthly and regional level. What approach helps accelerate these summary-level queries?"
    choices:
    - content: "Implement aggregations that store summarized data at the monthly and regional level"
      isCorrect: true
      explanation: "Correct. Aggregations store summary data in an Import-mode table. When a query matches the aggregation's grain (monthly, regional), the result returns from memory instead of querying the external data source."
    - content: "Add FILTER expressions to each measure to limit the data scanned"
      isCorrect: false
      explanation: "Incorrect. Adding FILTER expressions to measures doesn't reduce the data the source scans for summary queries. The source still processes the full table for each query. Aggregations address this by computing and storing results in advance."
    - content: "Convert all dimension tables to DirectQuery storage mode"
      isCorrect: false
      explanation: "Incorrect. Converting dimension tables to DirectQuery slows queries further by requiring round-trips for dimension lookups. Add aggregations and set dimension tables to Dual or Import mode instead."
  - content: "A report page with 25 visuals loads slowly. Performance analyzer shows that individual DAX query times are under 200 ms per visual, but the total page load exceeds 10 seconds. What is the most likely cause?"
    choices:
    - content: "The individual measures need DAX optimization"
      isCorrect: false
      explanation: "Incorrect. Individual DAX query times under 200 ms indicate that each measure runs efficiently. The problem isn't in individual query performance."
    - content: "The sheer number of visuals is generating too many sequential queries"
      isCorrect: true
      explanation: "Correct. With 25 visuals each sending separate queries, the cumulative load time adds up even when individual queries are fast. Visuals typically execute sequentially on a single UI thread. Reduce the number of visuals per page or use drillthrough pages to improve load time."
    - content: "The semantic model has high-cardinality columns that need to be reduced"
      isCorrect: false
      explanation: "Incorrect. High cardinality increases individual query times, but each query is fast, at under 200 ms. The bottleneck is the total number of queries, not the speed of each one."
