abstract: |
  By the end of this module, you'll be able to:
  - Create reusable Power BI assets
  - Manage Power BI content in version control
  - Manage semantic models with the XMLA endpoint
  - Deploy content through stages
  - Maintain and monitor semantic models
prerequisites: |
  - Experience with Power BI Desktop and the Power BI service
  - Understanding of semantic model concepts
  - Familiarity with Python and Fabric notebooks, including DataFrames
  - Foundational Git workflow knowledge (fork, branch, commit, sync, merge, pull request)
