summary: Lakehouses in Microsoft Fabric combine data lake storage flexibility with data warehouse analytical capabilities. Learn how to create a lakehouse, ingest and transform data, and query data with SQL and Spark.
abstract: |
  In this module, you learn how to:

  -   Describe core features and capabilities of lakehouses in Microsoft Fabric.
  -   Create a lakehouse.
  -   Ingest and transform data in a lakehouse.
  -   Query and analyze lakehouse data with SQL and Spark.
prerequisites: Before starting this module, you should understand fundamental data storage and analytics concepts.
