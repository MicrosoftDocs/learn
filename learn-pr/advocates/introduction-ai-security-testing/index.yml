summary: Learn about AI red teaming, the three categories of AI security testing, and how to plan and execute red teaming exercises for LLMs and AI-enabled applications.
abstract:  |
  After completing this module, you're able to:
  - Describe what AI red teaming is and how it differs from traditional security testing
  - Identify the three categories of AI red teaming and the skills each requires
  - Plan an AI red teaming exercise, including team composition and testing methodology
  - Describe how automated red teaming tools complement manual testing
prerequisites:   |
  To get the best learning experience from this module, you should have knowledge and experience of:
  - Fundamental security concepts (for example, authentication, access control, encryption)
  - Fundamental AI concepts (for example, models, training, inference)
  - The types of AI attacks covered in the [Fundamentals of AI security](/training/modules/fundamentals-of-ai-security/) module
  - The security controls covered in the [AI security controls](/training/modules/ai-security-controls/) module
