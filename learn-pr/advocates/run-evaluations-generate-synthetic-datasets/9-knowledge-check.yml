content: |
  [!include[](includes/9-knowledge-check.md)]
quiz:
  title: Knowledge check
  questions:
  - content: Which function lets you evaluate a dataset by optionally sending each query to a target application and then scoring the resulting query and response?
    choices:
    - content: ContentSafetyEvaluator.
      isCorrect: false
      explanation: "Incorrect: ContentSafetyEvaluator is a composite evaluator that runs the violence, sexual, self-harm, and hate-and-unfairness safety evaluators together. It doesn't drive the dataset/target evaluation flow."
    - content: model_config.
      isCorrect: false
      explanation: "Incorrect: model_config holds the Azure OpenAI configuration that AI-assisted quality evaluators use as their judge model. It's a parameter you pass to an evaluator, not the function that runs the evaluation."
    - content: evaluate.
      isCorrect: true
      explanation: "Correct: The evaluate() function can score an existing dataset, or—when you provide a target callable—send each row to the application first and then evaluate the resulting query/response pairs."
    - content: Simulator.
      isCorrect: false
      explanation: "Incorrect: Simulator is a preview class for generating synthetic conversations, not for scoring datasets."
  - content: Which composite evaluator in the Azure AI Evaluation SDK combines the ViolenceEvaluator, SelfHarmEvaluator, HateUnfairnessEvaluator, and SexualEvaluator?
    choices:
    - content: ContentSafetyEvaluator.
      isCorrect: true
      explanation: 'Correct: ContentSafetyEvaluator is a composite evaluator that runs ViolenceEvaluator, SelfHarmEvaluator, HateUnfairnessEvaluator, and SexualEvaluator together and returns the combined safety metrics for a single query and response pair.'
    - content: QAEvaluator.
      isCorrect: false
      explanation: "Incorrect: QAEvaluator is a composite quality evaluator that combines GroundednessEvaluator, RelevanceEvaluator, CoherenceEvaluator, FluencyEvaluator, SimilarityEvaluator, and F1ScoreEvaluator—it doesn't include any of the risk and safety evaluators."
    - content: RiskEvaluator.
      isCorrect: false
      explanation: "Incorrect: RiskEvaluator isn't an evaluator in the Azure AI Evaluation SDK."
    - content: ContentHarmEvaluator.
      isCorrect: false
      explanation: "Incorrect: ContentHarmEvaluator isn't an evaluator in the Azure AI Evaluation SDK."
  - content: To log evaluation results to your Microsoft Foundry project, which parameter must be included in the evaluate function?
    choices:
    - content: result.studio_url.
      isCorrect: false
      explanation: "Incorrect: result.studio_url is a property on the value returned by evaluate() that links to the logged run in the portal. It surfaces the result; it doesn't configure project logging."
    - content: evaluator_config.
      isCorrect: false
      explanation: "Incorrect: evaluator_config maps evaluator names to per-evaluator settings such as column mappings; it doesn't enable project logging."
    - content: target.
      isCorrect: false
      explanation: "Incorrect: target is the application callable that evaluate() sends each row to before scoring; it doesn't enable project logging."
    - content: azure_ai_project.
      isCorrect: true
      explanation: "Correct: Pass azure_ai_project to evaluate() to log the run to a Microsoft Foundry project. This project-scoping value is separate from the model_config that AI-assisted quality evaluators use as their judge model."
