title: "Troubleshoot and optimize IIS performance"
summary: "Learn how to troubleshoot IIS problems with logs, tracing, and performance counters, then apply tuning changes to improve reliability and throughput."
abstract: |
  - Collect and interpret IIS request logs, HTTP.sys logs, and Failed Request Tracing output.
  - Diagnose common error conditions and identify CPU, memory, and queue bottlenecks.
  - Tune recycling, caching, compression, and connection settings for production workloads.
prerequisites: |
  - Basic understanding of Windows Server administration.
  - Familiarity with IIS sites and application pools.
