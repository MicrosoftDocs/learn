title: Pitch your product prototype
summary: Write a compelling and technically credible pitch deck for your Azure-based product prototype that resonates with your audience and accurately explains your solution.
abstract: |
 In this module, you will:
 - Construct a mission statement for a product prototype.
 - Evaluate your audience's requirements.
 - Tailor your message to investors, customers, and reviewers.
 - Explain how your prototype works, what still needs validation, and which parts depend on Azure services, your own data, and future roadmap items.
 - Explain how you acquire customers for your prototype and how your product will make money.
 - Create a reliable demonstration strategy for a product prototype.
 - Create a call to action for your audience.
prerequisites: |
 - You should have a broad understanding of product management and roadmaps.
 - You should have given some thought to your proposed revenue model.
 - You should have given some thought to your company's exit strategy.
 - You should understand the current capabilities, limitations, dependencies, and validation needs of the services used in your prototype.
