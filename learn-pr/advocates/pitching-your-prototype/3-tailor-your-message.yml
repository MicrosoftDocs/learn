metadata:
  title: Tailor the message for your audience
  description: This unit teaches you how to tailor the message for investors, customers, and reviewers.
  author: czhu89
  ms.date: 04/20/2026
  ms.author: cazh
  ms.topic: unit
durationInMinutes: 10
content: |
  [!include[](includes/3-tailor-the-message.md)]
quiz:
  title: Check your knowledge
  questions:
  - content: "What should you know about an investor you're pitching to?"
    choices:
    - content: "What company they come from."
      isCorrect: false
      explanation: "Provides limited useful information about their interests."
    - content: "Their background, job history, their previous investment history, and their investment thesis."
      isCorrect: true
      explanation: "Clear and useful information about the investor that lets you shape your pitch to their interests."
    - content: "How they take their coffee."
      isCorrect: false
      explanation: "Not useful."
  - content: "What should you know about a customer you're pitching to?"
    choices:
    - content: "Where their stores are located."
      isCorrect: false
      explanation: "This information is of limited use."
    - content: "What products they sell."
      isCorrect: false
      explanation: "Provides limited useful information about the company."
    - content: "Their products, markets, current competitors, and their business model."
      isCorrect: true
      explanation: "Clear and useful information about the customer that lets you shape your pitch to their needs."
  - content: "What should you prepare for a technical or legal reviewer?"
    choices:
    - content: "A simple architecture explanation, representative test results, privacy and retention decisions, and the human review path."
      isCorrect: true
      explanation: "Reviewers need to understand how the system works, how it was evaluated, and how risks are managed."
    - content: "Only the market size and revenue projections."
      isCorrect: false
      explanation: "Those details matter to investors, but reviewers also need technical and governance information."
    - content: "Only the names of the Azure services you plan to use."
      isCorrect: false
      explanation: "Service names alone don't explain data flow, evaluation, privacy controls, or human oversight."

