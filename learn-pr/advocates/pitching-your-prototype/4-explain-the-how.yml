quiz:
  title: Check your knowledge
  questions:
  - content: "What are the most crucial things to mention when you explain how to acquire customers?"
    choices:
    - content: "Market size, marketing channels and techniques."
      isCorrect: true
      explanation: "When you explain how to acquire customers, you should mention market size, marketing channels, and techniques."
    - content: "Market size, corporate identity, and industry analysis."
      isCorrect: false
      explanation: "Corporate identity and industry analysis can support broader positioning, but customer acquisition should focus on market size, marketing channels, and techniques."
    - content: "Marketing channels, business models, and techniques."
      isCorrect: false
      explanation: "Marketing channels and techniques are relevant to acquiring customers, but business models belong to the revenue model discussion, not customer acquisition."

