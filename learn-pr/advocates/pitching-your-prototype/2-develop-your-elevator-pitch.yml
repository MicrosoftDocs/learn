  [!include[](includes/2-develop-your-elevator-pitch.md)]
quiz:
  title: Check your knowledge
  questions:
  - content: "Which of these statements is the most technically credible elevator pitch?"
    choices:
    - content: "We're building a cool product that changes the world!"
      isCorrect: false
      explanation: "This is too vague and doesn't explain the workflow or the user value."
    - content: "Fabrikam is building an Azure-based app that analyzes fashion photos, detects visible brand logos, and searches a curated catalog so shoppers can find similar items faster."
      isCorrect: true
      explanation: "This pitch explains the user value and the workflow without overstating what the AI does."
    - content: "At Fabrikam, we strive to build an amazing online fashion platform."
      isCorrect: false
      explanation: "This statement is generic and doesn't make the solution or problem concrete."

