content: |
  [!include[](includes/9-knowledge-check.md)]
quiz:
  title: Knowledge check
  questions:
  - content: What should the chatbot do when the retrieved product data doesn't contain the answer?
    choices:
    - content: Say it can't find the answer in the product catalog and avoid guessing.
      isCorrect: true
      explanation: "Correct: The system message in this module explicitly tells the chatbot to rely on retrieved Contoso product data and to say it can't find the answer when the catalog doesn't contain it."
    - content: Use general model knowledge to provide the most likely answer.
      isCorrect: false
      explanation: "Incorrect: That would undermine grounding and can introduce hallucinations."
    - content: Switch to general camping advice even if the question is product-specific.
      isCorrect: false
      explanation: "Incorrect: Product-specific questions should stay grounded in the Contoso product data rather than drifting into unrelated advice."
    - content: Invent a reasonable price or feature so the response stays helpful.
      isCorrect: false
      explanation: "Incorrect: The module teaches the chatbot to avoid inventing details when the retrieved sources don't contain the answer."
  - content: For Azure OpenAI model deployments, what is the threshold level for the default content filter?
    choices:
    - content: High.
      isCorrect: false
      explanation: 'Incorrect: High is a valid custom threshold, but it isn''t the default.'
    - content: Medium.
      isCorrect: true
      explanation: "Correct: The default content filter blocks content classified at medium or high severity in the four core harm categories (hate, sexual, violence, and self-harm) for both prompts and completions."
    - content: Low.
      isCorrect: false
      explanation: "Incorrect: Low is a stricter custom threshold, not the default."
    - content: No detection.
      isCorrect: false
      explanation: "Incorrect: Turning filters partially or fully off requires approval, and 'No detection' isn't the default behavior."
  - content: After you select two or more automated evaluation runs, which action opens the comparison view?
    choices:
    - content: Compare.
      isCorrect: true
      explanation: "Correct: After you select two or more runs, select Compare to open the comparison view and optionally set a baseline."
    - content: Dashboard.
      isCorrect: false
      explanation: "Incorrect: The comparison is started with the Compare action, not a separate Dashboard command."
    - content: Export.
      isCorrect: false
      explanation: "Incorrect: Exporting data doesn't open the comparison experience."
    - content: Fine-tune.
      isCorrect: false
      explanation: "Incorrect: Fine-tuning changes a model; it doesn't compare evaluation runs."
