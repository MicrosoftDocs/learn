title: Introduction to using Managed Identity to authenticate to Azure OpenAI in Microsoft Foundry Models with .NET
summary: Learn how to use managed identity to authenticate .NET applications to Azure OpenAI in Microsoft Foundry Models
abstract: |
 After completing this module, you'll be able to:
  - Describe the different RBAC roles for use in Azure OpenAI in Microsoft Foundry Models and understand how to configure role assignments
  - Understand the differences between using API keys and managed identities within Azure OpenAI in Microsoft Foundry Models
  - Understand how to configure keyless authentication to Azure OpenAI in Microsoft Foundry Models for local development for .NET applications
  - Understand how to configure keyless authentication to Azure OpenAI in Microsoft Foundry Models for Azure-hosted environments for .NET applications
prerequisites: |
  To get the best learning experience from this module, you should have knowledge and experience of:
  - .NET programming
  - Azure OpenAI
  - Azure RBAC roles
  - Azure Managed Identity
