quiz:
  title: Check your knowledge
  questions:

  - content: 'Which can you use to manage a group of identical, load balanced VMs?'
    choices:
    - content: 'Load balancer'
      isCorrect: false
      explanation: "A load balancer can sit in front of those VMs, but it doesn't manage them."
    - content: 'virtual hard disks (VHDs)'
      isCorrect: false
      explanation: "VHDs are attached to those VMs, but they don't manage them."
    - content: 'virtual machine scale sets'
      isCorrect: true
      explanation: 'Correct.'

  - content: 'Which of the following product offerings is a simple REST-based queue interface built on top of Azure Storage?'
    choices:
    - content: 'Azure Service Bus Queues'
      isCorrect: false
      explanation: 'Azure Service Bus Queues is a more advanced queueing offering.'
    - content: 'Azure Storage Queues'
      isCorrect: true
      explanation: 'Correct.'
    - content: 'SignalR'
      isCorrect: false
      explanation: 'SignalR is an open-source library that simplifies adding real-time web functionality to apps.'

  - content: "If after scaling up or implementing read replicas, your database resources still don't meet the needs of your system, what is the next option?"
    choices:
    - content: 'in-memory caching'
      isCorrect: false
      explanation: "In-memory caching can improve performance, but it doesn't increase your database resources."
    - content: 'decoupling'
      isCorrect: false
      explanation: 'Decoupling is a change that can help with differing resource needs between different dependent services.'
    - content: 'sharding'
      isCorrect: true
      explanation: 'Correct. Sharding distributes data across multiple independent databases, enabling you to scale beyond the constraints of an individual database.'
  
