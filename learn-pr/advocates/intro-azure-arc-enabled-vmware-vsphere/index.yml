title: Introduction to Azure Arc-enabled VMware vSphere
summary: Azure Arc-enabled VMware vSphere is an Azure Arc service that helps you simplify management of hybrid IT estate distributed across VMware vSphere and Azure. It does so by extending the Azure control plane to VMware vSphere infrastructure. The technology enables the use of Azure for VM management and Azure services to enable security, governance, monitoring and patching across VMware vSphere on-premises private clouds, and Azure VMware Solution (AVS) private clouds.
abstract: |
  In this module you'll learn:
  -	About functionality that Arc-enabling VMware vSphere and Azure VMware Solution brings to virtual machines hosted in your organization's hybrid IT estate.
  -	How to Arc-enable VMware vSphere and Azure VMware Solution
  -	Understand operations functionality that Arc-enabling VMware vSphere and Azure VMware solution enables including Microsoft Defender for Cloud and Extended Security Updates.
prerequisites: |
  To get the best learning experience from this module, you should have knowledge and experience of:
  - VMware vSphere concepts and operations
  -	Microsoft Azure and cloud services
  - Azure Arc concepts and capabilities
