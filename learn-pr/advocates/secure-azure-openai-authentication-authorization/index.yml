title: Secure authentication and authorization for Azure OpenAI in Microsoft Foundry
summary: Learn how to compare key-based authentication with Microsoft Entra ID authentication for Azure OpenAI in Microsoft Foundry, use managed identities as Microsoft Entra credentials, assign least-privilege Foundry RBAC roles, and disable local authentication after migration when appropriate.
abstract: |
  After completing this module, you'll be able to:
  - Compare key-based authentication with Microsoft Entra ID authentication for Azure OpenAI in Microsoft Foundry.
  - Describe how managed identities, service principals, and user credentials work with Microsoft Entra ID authentication.
  - Choose least-privilege Foundry RBAC roles for users, apps, and managed identities.
  - Explain when to disable local authentication after validating Microsoft Entra ID access.
prerequisites: |
  To get the best learning experience from this module, you should have knowledge and experience of:
  - Fundamental security concepts
  - Fundamental AI concepts
