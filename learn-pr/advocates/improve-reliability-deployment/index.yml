summary: Modern deployment practices catch many problems before they reach production. This module explores the practices that improve your reliability.
abstract: |
  In this module, you will:
  - Learn what software deployment is and the different kinds of deployments organizations use.
  - Discover the benefits of moving from an "epic deployment" model to continuous integration, delivery, and deployment.
  - Explore continuous integration, delivery, and deployment, and the foundations they share.
  - Examine pipelines and how Azure Pipelines and GitHub Actions implement them on Azure.
  - Compare deployment strategies including rolling, blue-green, canary, ring-based, and feature-flag releases.
  - Apply best practices that minimize risk when rolling out new or updated software.
