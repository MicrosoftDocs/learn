title: AI security controls
summary: Learn about the security controls you can implement to protect AI systems from threats, including supply chain security, content filtering, data security, metaprompts, grounding, application security, and ongoing monitoring.
abstract: |
  After completing this module, you're able to:
  - Evaluate open-source AI libraries for security risks
  - Describe content filtering and data security controls for AI systems
  - Design metaprompts and grounding strategies as security controls
  - Apply application security best practices to AI-enabled applications
  - Describe monitoring strategies for detecting AI-specific threats
prerequisites:  |
  To get the best learning experience from this module, you should have knowledge and experience of:
  - Fundamental security concepts (for example, authentication, access control, encryption)
  - Fundamental AI concepts (for example, models, training, inference)
  - Completion of the [Fundamentals of AI security](/training/modules/fundamentals-of-ai-security/) module or equivalent knowledge
