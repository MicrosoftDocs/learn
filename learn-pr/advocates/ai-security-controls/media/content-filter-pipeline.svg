<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -25 960 345" role="img" aria-labelledby="title3 desc3">
  <title id="title3">Content Filter Pipeline</title>
  <desc id="desc3">Diagram showing the input and output content filtering pipeline: user prompt passes through input filter, then AI model, then output filter, with blocked paths for rejected or filtered content</desc>
  <defs>
    <marker id="arr3" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#424242"/>
    </marker>
  </defs>
  <rect x="0" y="-25" width="960" height="345" fill="#FFFFFF"/>

  <!-- Box 1: User Prompt -->
  <rect x="15" y="120" width="110" height="50" rx="8" fill="#FFFFFF" stroke="#0078D4" stroke-width="2"/>
  <text x="70" y="150" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="14" font-weight="600" fill="#1A1A1A">User Prompt</text>

  <!-- Arrow to Input Filter -->
  <line x1="125" y1="145" x2="158" y2="145" stroke="#424242" stroke-width="1.5" marker-end="url(#arr3)"/>

  <!-- Box 2: Input Filter -->
  <rect x="168" y="110" width="155" height="70" rx="8" fill="#FFFFFF" stroke="#0078D4" stroke-width="2"/>
  <text x="245" y="137" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="14" font-weight="600" fill="#1A1A1A">Input Filter</text>
  <text x="245" y="154" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#424242">Prompt injection,</text>
  <text x="245" y="168" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#424242">jailbreak, harmful content</text>

  <!-- Blocked path: up to Rejected -->
  <line x1="245" y1="110" x2="245" y2="52" stroke="#A4262C" stroke-width="1.5" marker-end="url(#arr3)"/>
  <text x="270" y="85" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#A4262C">Blocked</text>
  <rect x="185" y="15" width="120" height="38" rx="8" fill="#FDE7E9" stroke="#A4262C" stroke-width="2"/>
  <text x="245" y="39" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="14" font-weight="600" fill="#1A1A1A">Rejected</text>

  <!-- Passed path: right to AI Model -->
  <line x1="323" y1="145" x2="368" y2="145" stroke="#424242" stroke-width="1.5" marker-end="url(#arr3)"/>
  <text x="345" y="138" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#107C10">Passed</text>

  <!-- Box 3: AI Model (emphasized) -->
  <rect x="378" y="117" width="130" height="56" rx="8" fill="#0078D4" stroke="#005A9E" stroke-width="2"/>
  <text x="443" y="150" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">AI Model</text>

  <!-- Arrow to Output Filter -->
  <line x1="508" y1="145" x2="543" y2="145" stroke="#424242" stroke-width="1.5" marker-end="url(#arr3)"/>

  <!-- Box 4: Output Filter -->
  <rect x="553" y="110" width="155" height="70" rx="8" fill="#FFFFFF" stroke="#0078D4" stroke-width="2"/>
  <text x="630" y="137" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="14" font-weight="600" fill="#1A1A1A">Output Filter</text>
  <text x="630" y="154" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#424242">Harmful content,</text>
  <text x="630" y="168" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#424242">policy, copyright</text>

  <!-- Blocked path: down to Filtered -->
  <line x1="630" y1="180" x2="630" y2="238" stroke="#A4262C" stroke-width="1.5" marker-end="url(#arr3)"/>
  <text x="660" y="215" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#A4262C">Blocked</text>
  <rect x="565" y="248" width="130" height="38" rx="8" fill="#FDE7E9" stroke="#A4262C" stroke-width="2"/>
  <text x="630" y="272" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="14" font-weight="600" fill="#1A1A1A">Filtered</text>

  <!-- Passed path: right to Response -->
  <line x1="708" y1="145" x2="758" y2="145" stroke="#424242" stroke-width="1.5" marker-end="url(#arr3)"/>
  <text x="733" y="138" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#107C10">Passed</text>

  <!-- Box 5: Response to User -->
  <rect x="768" y="118" width="138" height="54" rx="8" fill="#DFF6DD" stroke="#107C10" stroke-width="2"/>
  <text x="837" y="140" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="14" font-weight="600" fill="#1A1A1A">Response</text>
  <text x="837" y="157" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="14" font-weight="600" fill="#1A1A1A">to User</text>
</svg>