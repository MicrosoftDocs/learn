### YamlMime:ModuleUnit
uid: learn.fundamentals-of-ai-security.knowledge-check
title: Module assessment
metadata:
  title: Module assessment
  description: Check your understanding of fundamental AI security concepts including attack techniques, architecture layers, and mitigations.
  ms.date: 04/24/2026
  author: ceperezb
  ms.author: ceperezb
  ms.topic: unit
  module_assessment: true
durationInMinutes: 5
content: Choose the best response for each question. 
quiz:
  questions:
    - content: "What is one of the main challenges of securing AI systems compared to traditional software?"
      choices:
        - content: "The nondeterministic nature of generative AI systems"
          isCorrect: true
          explanation: "Because AI systems are nondeterministic, the same input doesn't always produce the same output. Traditional security controls often assume predictable input-output behavior, which makes applying those controls to AI systems more challenging."
        - content: "AI is fundamentally insecure and can't be protected"
          isCorrect: false
          explanation: "AI isn't fundamentally insecure. While securing AI systems presents unique challenges, organizations can apply layered security controls to reduce risk."
        - content: "AI is too new to have any security frameworks"
          isCorrect: false
          explanation: "Several well-established frameworks exist for AI security, including OWASP Top 10 for LLM Applications, MITRE ATLAS, and NIST AI RMF."
    - content: "Which jailbreak technique involves sending an AI model a series of progressively escalating prompts across multiple conversation turns?"
      choices:
        - content: "DAN (Do Anything Now)"
          isCorrect: false
          explanation: "DAN works by adding instructions to a single prompt that tell the model to role-play as an unrestricted AI. It doesn't use multiple turns."
        - content: "Encoding attack"
          isCorrect: false
          explanation: "Encoding attacks convert malicious instructions into encoded formats. They don't rely on multiple conversation turns."
        - content: "Crescendo"
          isCorrect: true
          explanation: "Crescendo attacks use multiple conversation turns to gradually shift the topic toward harmful content, so no single prompt appears malicious."
    - content: "Which is the middle layer of the three AI architecture layers?"
      choices:
        - content: "AI Usage layer"
          isCorrect: false
          explanation: "The AI Usage layer is the top of the stack, closest to human users. It describes how AI capabilities are consumed."
        - content: "AI Platform layer"
          isCorrect: false
          explanation: "The AI Platform layer is the bottom of the stack. It provides the AI model capabilities to applications."
        - content: "AI Application layer"
          isCorrect: true
          explanation: "The AI Application layer sits between the Usage and Platform layers. It accesses AI capabilities and provides the service or interface that users consume."
    - content: "What makes indirect prompt injection (XPIA) dangerous compared to direct prompt injection?"
      choices:
        - content: "It requires more technical skill to execute"
          isCorrect: false
          explanation: "Indirect prompt injection doesn't necessarily require more skill. What makes it dangerous is that the malicious instructions are hidden in content the system retrieves, not in the user's direct input."
        - content: "The malicious instructions are hidden in content the AI retrieves, not in the user's prompt"
          isCorrect: true
          explanation: "In indirect prompt injection, malicious instructions are embedded in documents, emails, or web pages that the AI system reads during processing. The user may never see the attack, and a single poisoned document can affect multiple users."
        - content: "It can only be performed by authorized system administrators"
          isCorrect: false
          explanation: "Indirect prompt injection can be performed by anyone who can place content where the AI system will read it, such as a web page or shared document."
    - content: "Which of the following is a risk associated with AI overreliance?"
      choices:
        - content: "Users accept AI-generated output without verification, leading to errors in critical decisions"
          isCorrect: true
          explanation: "Overreliance occurs when people accept AI output as correct without critical analysis. This is especially dangerous in high-stakes contexts where AI errors could lead to incorrect medical, legal, or security decisions."
        - content: "AI systems become slower over time due to excessive use"
          isCorrect: false
          explanation: "Performance degradation from use isn't related to overreliance. Overreliance is about the human behavioral risk of trusting AI output without verification."
        - content: "AI models are unable to process complex queries"
          isCorrect: false
          explanation: "AI models can process complex queries. Overreliance is about human behavior - accepting AI output without verification - not about model capability limitations."
