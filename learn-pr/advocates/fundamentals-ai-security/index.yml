title: Fundamentals of AI security
summary: Learn how AI security differs from traditional cybersecurity, explore the three-layer AI architecture model, and examine AI-specific attack techniques including jailbreaking, prompt injection, model manipulation, data exfiltration, and overreliance.
abstract: |
  After completing this module, you'll be able to:
  - Describe how AI security differs from traditional cybersecurity
  - Identify the three layers of AI architecture and the security concerns at each layer
  - Explain AI-specific attack techniques, including jailbreaking, prompt injection, model manipulation, data exfiltration, and overreliance
  - Describe mitigation strategies for each attack type
prerequisites: |
  To get the best learning experience from this module, you should have knowledge and experience of:
  - Fundamental security concepts
  - Fundamental AI concepts
