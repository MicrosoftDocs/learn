quiz:
  title: Check your knowledge
  questions:
    - content: "Why would you use a Platform as a Service (PaaS) solution?"
      choices:
        - content: "You want to go to production as fast as possible, with a limited ops team."
          isCorrect: false
          explanation: "You're partially right, but this answer isn't the only reason."
        - content: "You have high availability, security, or compliance requirements."
          isCorrect: false
          explanation: "You're partially right, but this answer isn't the only reason."
        - content: "Your team doesn't have the resources or the willingness to maintain a production-grade infrastructure."
          isCorrect: false
          explanation: "You're partially right, but this answer isn't the only reason."
        - content: "All of the above."
          isCorrect: true
          explanation: "Correct. PaaS solutions are the preferred choice if you want to go to production quickly, with high confidence and a minimal maintenance burden."
    - content: "Among the listed choices, which Azure service is designed to run serverless workloads?"
      choices:
        - content: "Azure App Service"
          isCorrect: false
          explanation: "Incorrect. Azure App Service is a platform as a service solution, which can run standard Java applications."
        - content: "Azure Functions"
          isCorrect: true
          explanation: "Correct. Among these choices, Azure Functions is the serverless event-driven compute service. Azure Container Apps is also serverless, but it isn't listed here."
        - content: "Azure Kubernetes Service"
          isCorrect: false
          explanation: "Incorrect. Azure Kubernetes Service is a managed Kubernetes service, not a serverless event-driven compute service."
    - content: "With Azure App Service built-in Java runtime stacks, who manages your Java Virtual Machine (JVM)?"
      choices:
        - content: "You're responsible for updating and patching your JVM."
          isCorrect: false
          explanation: "Incorrect for Microsoft-managed built-in App Service Java runtime stacks. Microsoft manages those JVM updates and patches, although you must stay on supported runtimes and custom containers differ."
        - content: "Microsoft is responsible for updating and patching the built-in JVM runtime stack."
          isCorrect: true
          explanation: "Correct. For Microsoft-managed built-in App Service Java runtime stacks, Microsoft updates and patches the JVM. You must stay on supported runtimes, and custom containers have different responsibilities."
        - content: "JVM can't be updated or patched."
          isCorrect: false
          explanation: "Incorrect. Microsoft-managed built-in App Service Java runtime stacks can be updated and patched. You must stay on supported runtimes, and custom containers have different responsibilities."
