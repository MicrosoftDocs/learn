summary: Learn how to secure Microsoft Foundry Agent Service with current Foundry resource and project controls.
abstract:  |
  After completing this module, you'll be able to:
  - Describe Microsoft Foundry Agent Service and the transition from Agents (classic), which retire on March 31, 2027.
  - Identify security boundaries for Foundry resources and Foundry projects.
  - Apply identity, RBAC, network, data-source, content-safety, and monitoring controls for agent workloads.
prerequisites: |
  To get the best learning experience from this module, you should have knowledge and experience of:
  - Fundamental security concepts
  - Fundamental AI concepts
