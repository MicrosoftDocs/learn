content: |
  [!include[](includes/8-knowledge-check.md)]
quiz:
  title: Knowledge check
  questions:
  - content: What is the primary purpose of evaluating generative AI applications?
    choices:
    - content: To increase the speed of AI model training.
      isCorrect: false
      explanation: "Incorrect: The primary focus isn't on the speed of training but on the quality and reliability of the AI models."
    - content: To measure the quality, safety, and reliability of AI systems.
      isCorrect: true
      explanation: "Correct: Evaluations help you assess whether a model or agent is producing useful, safe, and reliable outputs for the scenarios that matter to users."
    - content: To reduce the cost of AI development.
      isCorrect: false
      explanation: "Incorrect: While evaluations might indirectly affect costs, their main goal is to validate the AI system's performance and reliability."
    - content: To replace human evaluators with automated systems.
      isCorrect: false
      explanation: "Incorrect: Evaluations often involve a combination of automated and human assessments to capture both quantitative and qualitative insights."
  - content: Which of the following isn't a characteristic of good evaluation data?
    choices:
    - content: Diversity.
      isCorrect: false
      explanation: 'Incorrect: Diversity is a key characteristic of good evaluation data, ensuring the model is tested against different types of inputs.'
    - content: Representativeness.
      isCorrect: false
      explanation: "Incorrect: Representativeness ensures the data accurately reflects real-world scenarios."
    - content: High quality.
      isCorrect: false
      explanation: "Incorrect: High-quality data is essential for accurate and reliable evaluation results."
    - content: Homogeneity.
      isCorrect: true
      explanation: "Correct: Good evaluation data should be diverse and representative, capturing a wide range of scenarios and contexts. Homogeneity, or uniformity, isn't a desired characteristic as it doesn't reflect the complexities of real-world interactions."
  - content: Which statement best reflects how evaluation data should be prepared in Microsoft Foundry?
    choices:
    - content: Every built-in evaluator uses the same input fields, so one fixed schema always works.
      isCorrect: false
      explanation: "Incorrect: Different evaluators can require different inputs, so you shouldn't assume one schema works everywhere."
    - content: Different evaluators can require different inputs, so confirm the mapping for fields such as query, response, context, ground truth, or tool calls.
      isCorrect: true
      explanation: "Correct: Foundry evaluations depend on matching your dataset fields to the evaluator inputs. Some evaluators need only query and response, while others also require context, ground truth, or tool-call data."
    - content: Only custom evaluators ever use context or ground truth.
      isCorrect: false
      explanation: "Incorrect: Many built-in evaluators also require context or ground truth, especially textual similarity and RAG-focused evaluators."
    - content: You should remove edge cases so they don't distort the average score.
      isCorrect: false
      explanation: "Incorrect: Edge cases often reveal the failures that matter most, so they should be included rather than removed."
  - content: When comparing two evaluation runs after a prompt change, what gives you the clearest evidence that the change helped?
    choices:
    - content: Compare the new run against a baseline while keeping the dataset and evaluator set stable.
      isCorrect: true
      explanation: "Correct: Stable comparisons make it easier to attribute score changes to the prompt update instead of to other variables."
    - content: Run the new prompt on a different dataset with different evaluators.
      isCorrect: false
      explanation: "Incorrect: Changing the dataset and evaluator set at the same time makes it hard to determine what caused the result change."
    - content: Look only at the overall pass/fail rate and ignore row-level results.
      isCorrect: false
      explanation: "Incorrect: Aggregate results help, but row-level results are essential for understanding why the system improved or failed."
    - content: Change the thresholds at the same time so more results pass.
      isCorrect: false
      explanation: "Incorrect: Changing thresholds during a comparison obscures whether the prompt itself improved the system."
