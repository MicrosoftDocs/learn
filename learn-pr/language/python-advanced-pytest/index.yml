  title: Advanced testing with pytest
  description: Take advantage of the advanced features of pytest, a popular test framework used to write and run tests in Python.
  ms.date: 04/20/2026
  author: alfredodeza
  ms.author: orthomas
  ms.topic: module
  ms.service: azure
title: Advanced testing with pytest
summary: Use parametrization, fixtures, and the monkeypatch fixture to write pytest tests with reusable setup and isolated state.
abstract: |
  By the end of this module, you'll be able to:
    - Use `@pytest.mark.parametrize` to run one test function with multiple input values.
    - Create reusable fixtures to share setup and cleanup across tests.
    - Explain pytest fixture scopes, use `yield`-based teardown, and share fixtures through `conftest.py`.
    - Use the built-in `monkeypatch` fixture to safely replace functions, values, environment variables, and paths during tests.
prerequisites: |
  - Ability to write Python scripts
  - Familiarity with command-line tools and executing scripts
  - Basic familiarity with writing and running pytest tests, including test discovery and assertions
  - Python 3.10 or later, which matches the minimum supported version for pytest 9.x, and pytest installed in a virtual environment. For Windows setup, see [Set up your Python development environment on Windows](/windows/dev-environment/python). For Python packaging and pytest setup, see Python's [Installing Python modules](https://docs.python.org/3/installing/index.html) and pytest's [getting started guide](https://docs.pytest.org/en/stable/getting-started.html#install-pytest).

