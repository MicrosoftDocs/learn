### YamlMime:ModuleUnit
uid: learn.oxford.connect-iot-devices-cognitive-services-azure-func.knowledge-check-2
title: Knowledge check
metadata:
  title: Knowledge check
  description: In this section, we create interactive questions that validate if the learner has understood the learning objectives
  ms.date: 05/01/2026
  author: leestott
  ms.author: leestott
  ms.topic: unit
  ms.custom: team=nextgen
durationInMinutes: 5 # dummy number at present
content: |
quiz:
  questions:
  - content: "How would you describe a function code?"
    choices:
    - content: "Function code is a set of interdependent functions that can be executed only on the server."
      isCorrect: false
      explanation: "Azure Functions runs the code for a function when its trigger fires; the code isn't defined as a set of interdependent server-only functions."
    - content: "Function code is the code Azure Functions runs when a configured trigger invokes a function."
      isCorrect: true
      explanation: "Function code performs the work for that invocation and can use bindings and configuration to interact with other services."
    - content: "A function code is merely code deployed in the local environment to perform a job."
      isCorrect: false
      explanation: "Function code can run locally during development and in Azure after deployment; it isn't limited to a local environment."
  - content: "Suppose that you’re tasked with calling Azure AI Speech translation from your function app. In what order would you perform the following steps to create a speech translation app?"
    choices:
    - content: "Trigger the function - speech recognition - translation - return or display translated text"
      isCorrect: true
      explanation: "After the function is triggered, recognize or transcribe speech, translate the resulting text, and return or display the translated text. Synthesized speech output is optional if implemented."
    - content: "Trigger the function - translation - return or display translated text"
      isCorrect: false
      explanation: "You need to recognize the speech after triggering the function."
    - content: "Speech recognition - translation - return or display translated text"
      isCorrect: false
      explanation: "You need to trigger the function to execute the code"
  - content: "Suppose you want to develop an application that uses Azure AI Speech in an Azure function. How do you access Azure AI Speech from your application?"
    choices:
    - content: "You could directly access Azure AI Speech from an Azure function without configuring service credentials."
      isCorrect: false
      explanation: "Azure AI Speech requires a configured resource endpoint or region and a valid key or Microsoft Entra authentication. Store credentials securely, such as in app settings or Azure Key Vault."
    - content: "You'll need to generate a new Azure AI Speech key for every request from the function app."
      isCorrect: false
      explanation: "You don't generate a new key for each request. Store keys securely and rotate or regenerate them when needed."
    - content: "You create an Azure AI Speech resource and configure its key plus region, or an endpoint plus a key, token, or supported credential, securely for the function app."
      isCorrect: true
      explanation: "The function app uses Speech resource configuration, such as a key plus region, or an endpoint plus a key, token, or supported credential, to authenticate requests to Azure AI Speech. Store secrets securely and rotate or regenerate keys when needed."

