### YamlMime:ModuleUnit
uid: learn.oxford.connect-iot-devices-cognitive-services-azure-func.knowledge-check-3
title: Module assessment
metadata:
  title: Module assessment
  description: In this section, we create interactive questions that validate if the learner has understood the learning objectives
  ms.date: 05/01/2026
  author: leestott
  ms.author: leestott
  ms.topic: unit
  ms.custom: team=nextgen
  module_assessment: true
durationInMinutes: 3 # dummy number at present
content: |
quiz:
  questions:
  - content: "Which of the following descriptions best describes how Speech translation works?"
    choices:
    - content: "Speech translation stores microphone input for batch processing before any translation can occur."
      isCorrect: false
      explanation: "Speech translation can recognize spoken input and return translated text without requiring batch storage first."
    - content: "Speech translation recognizes audio input, transcribes it to text, and returns translated text in the target language."
      isCorrect: true
      explanation: "Speech translation recognizes speech, translates the resulting text, and returns translated text. Synthesized speech output is optional if implemented."
    - content: "It only synthesizes translated speech to a speaker and doesn't return translated text."
      isCorrect: false
      explanation: "Speech translation returns translated text; speech synthesis is an optional additional step."
  - content: "How would you describe a function app?"
    choices:
    - content: "A function app is a function runtime to execute the function code."
      isCorrect: false
      explanation: "A function app isn’t a runtime. It’s a collection of one or more functions. Azure functions runtime provides a way to manage the function and execute the function code."
    - content: "A function app is a single trigger definition that runs one function."
      isCorrect: false
      explanation: "A function app is a collection of one or more functions that are managed together. Azure Functions can also be container-hosted on supported hosting options."
    - content: "A function app is a collection of one or more functions that are managed together."
      isCorrect: true
      explanation: "A function app can handle multiple functions."
