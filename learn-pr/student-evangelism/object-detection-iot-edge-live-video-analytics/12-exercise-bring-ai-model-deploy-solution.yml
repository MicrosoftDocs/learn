quiz:
  title: Check your knowledge
  questions:
  - content: "Historically, why was Vision on Edge presented as a template for deploying different models to an edge device?"
    choices:
    - content: "Because teams could easily deploy models on existing cameras"
      isCorrect: false
      explanation: "That capability was useful, but by itself it did not make the solution a general template for deploying machine learning models"
    - content: "Because the Vision on Edge solution used Live Video Analytics to build video applications"
      isCorrect: false
      explanation: "That was part of the architecture, but by itself it did not make the solution a general template for deploying machine learning models"
    - content: "Because teams could build and deploy their own models to an edge device"
      isCorrect: true
      explanation: "Historically, the solution could incorporate other modules, such as Cognitive Services containers, custom edge modules built by you with open source machine learning models, or custom models trained with your data"
