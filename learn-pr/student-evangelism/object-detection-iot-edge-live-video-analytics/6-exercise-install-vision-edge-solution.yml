quiz:
  title: Check your knowledge
  questions:
  - content: "In the context of the Vision on Edge solution, which of the following defines where media should be captured from, how it should be processed, and where the results should be delivered?"
    choices:
    - content: "Web module"
      isCorrect: false
      explanation: "This module hosts the web application, but it doesn't define the media sources, processors, and sinks."
    - content: "Live Video Analytics module"
      isCorrect: false
      explanation: "The Live Video Analytics module hosts and executes the media graph, but the media graph defines the sources, processors, and sinks."
    - content: "Media graph"
      isCorrect: true
      explanation: "The media graph topology and instance together define where media is captured, how it's processed, and where results are delivered."