title: "Introduction to Azure IoT Edge"
summary: "Explain the essential characteristics of IoT Edge and the functionality of its components (modules, runtime, and cloud interface). Characterize the types of problems that you can solve with IoT Edge. Describe how the elements of IoT Edge can be combined to solve the problem of deploying IoT applications in the cloud."
abstract: |
    In this module, you'll:
    - Evaluate situations where IoT Edge can help run cloud or business logic on edge devices as part of an IoT solution
    - Describe the components of IoT Edge
    - List the capabilities IoT Edge provides for cloud-connected IoT solutions

    ***Produced in partnership with the University of Oxford, Ajit Jaokar — Artificial Intelligence: Cloud and Edge Implementations course.***
prerequisites: |
    - Basic knowledge of IoT applications and IoT Hub
