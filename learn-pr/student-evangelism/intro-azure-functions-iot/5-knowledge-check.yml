### YamlMime:ModuleUnit
uid: learn.oxford.intro-iot-functions-iot.knowledge-check
title: Module assessment
metadata:
  title: Module assessment
  description: In this section, we create interactive questions that validate if the learner understands the learning objectives
  ms.date: 05/10/2026
  author: Orin-Thomas
  ms.author: orthomas
  ms.topic: unit
  module_assessment: true
durationInMinutes: 5 # dummy number at present
content: |
quiz:
  questions:
  - content: "Which characteristic of Azure Functions helps to deploy large-scale IoT applications?"
    choices:
    - content: "Azure Functions can manage demand that spikes up or down."
      isCorrect: true
      explanation: "Correct. Azure Functions enables developers to create scalable IoT applications that can be rapidly deployed. On Flex Consumption, the recommended serverless pay-as-you-go plan for new function apps, Azure Functions can scale event-driven processing without preallocating fixed compute capacity. The legacy Consumption plan can also scale this way, and it remains the only serverless option for Windows function apps."
    - content: "Azure Functions is secure."
      isCorrect: false
      explanation: "Incorrect. Security doesn't directly help in scaling solutions"
    - content: "Azure Functions automatically stores every IoT message and image in a database."
      isCorrect: false
      explanation: "Incorrect. Azure Functions runs event-driven code. You must configure bindings, application code, and downstream services to store data."
  - content: "How do triggers and bindings work together in an Azure Function?"
    choices:
    - content: "Triggers and bindings help to create a scalable solution."
      isCorrect: false
      explanation: "Incorrect. Scalable solutions are a feature of Azure solutions but aren't uniquely related to triggers and bindings."
    - content: "Triggers and bindings help you to avoid hardcoding access to other services."
      isCorrect: true
      explanation: "Correct. Each Azure Function has exactly one trigger, which invokes the function and provides data needed by the function. A function can optionally use one or more input and output bindings to connect to other resources. Together, triggers and bindings help you to avoid hardcoding access to other services."
    - content: "Triggers and bindings provide a rapid response to events."
      isCorrect: false
      explanation: "Incorrect. Triggers and bindings aren't uniquely responsible for providing a rapid response to events."
  - content: "Identify the feature of Azure Functions on a serverless pay-as-you-go hosting plan that helps ensure that you're charged only for the resources you use?"
    choices:
    - content: "Azure Functions runs faster, so it uses fewer resources."
      isCorrect: false
      explanation: "Incorrect. Azure Functions doesn't have a feature that simply makes code run faster. On serverless consumption-style plans, duration and memory do affect billed resources, so the cost-related characteristic is avoiding preallocated compute capacity, not raw execution speed."
    - content: "Azure Functions can be managed through a dashboard."
      isCorrect: false
      explanation: "Incorrect. The existence of a dashboard doesn't influence the cost."
    - content: "You don't have to preallocate fixed compute capacity in advance."
      isCorrect: true
      explanation: "Correct. On Flex Consumption, the recommended serverless pay-as-you-go plan for new function apps, Azure Functions can scale automatically and billing is based on executions and resources used. The legacy Consumption plan has similar billing behavior and remains the only serverless option for Windows function apps, while [Linux Consumption hosting retires on September 30, 2028](/azure/azure-functions/consumption-plan), so existing Linux Consumption apps should migrate to Flex Consumption. Premium, Dedicated, and Container Apps hosting plans have different billing and capacity behavior."

