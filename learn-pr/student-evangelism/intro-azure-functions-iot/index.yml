title: "Introduction to Azure Functions in IoT solutions"
summary: "Assess the characteristics of Azure Functions in IoT solutions. Describe the function of triggers and bindings and show how you combine them to create a scalable IoT solution. Describe the benefits of using cloud infrastructure to rapidly deploy IoT applications with Azure Functions."
abstract: |
    In this module, you will:
    - Explain how Azure Functions implements business logic with IoT devices
    - Decide whether Azure Functions is right choice for your IoT solution

    "***Produced in partnership with the University of Oxford – Ajit Jaokar, Artificial Intelligence: Cloud and Edge Implementations course.***"
prerequisites: |
    - Familiarity with Azure
    - Basic knowledge of REST and APIs
    - Basic understanding of IoT 
    
