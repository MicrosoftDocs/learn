summary: "Assess the characteristics of Azure IoT Hub and determine scenarios when to use IoT Hub."
abstract: |
    In this module, you will:  
    - Evaluate whether Azure IoT Hub can effectively address the challenges associated with large-scale IoT deployments.
    - Describe how the main components and primitives of Azure IoT Hub work together to build cloud-managed IoT solutions.
 
    "***Produced in partnership with the University of Oxford – Ajit Jaokar, Artificial Intelligence: Cloud and Edge Implementations course.***"
prerequisites: |
    - Basic knowledge of IoT applications and deploying applications in the Cloud
