summary: Implement security controls for Azure Function apps and Logic apps. Configure authentication and authorization, managed identities, virtual network integration, and private endpoints for Function apps, and apply managed identity, connector security, and network isolation for Logic apps.
abstract: |
  After completing this module, you can:
    - Configure authentication and authorization controls for Azure Function apps
    - Implement network access controls for Function apps including virtual network integration and private endpoints
    - Apply managed identity, connector security, and network isolation for Azure Logic apps
prerequisites: |
  - Working knowledge of Azure App Service fundamentals (Function apps run on the App Service platform)
  - Understanding of Azure role-based access control (RBAC) and managed identities
  - Familiarity with Azure Virtual Network and private endpoint concepts
  - Basic understanding of serverless and event-driven computing concepts
