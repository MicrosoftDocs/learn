title: Manage certificates and monitor Azure Key Vault
summary: Manage certificate lifecycle in Azure Key Vault through integrated certificate authority issuance and autorenewal. Enable diagnostic logging to create an investigation-ready audit trail, configure log-based alert rules, and integrate Event Grid for real-time lifecycle automation.
abstract: |
  After completing this module, you'll be able to:
    - Manage certificate issuance, renewal, and lifecycle through integrated certificate authorities
    - Configure Key Vault lifetime actions and certificate contacts for automated renewal and notification
    - Enable Key Vault diagnostic logging to support security investigation and compliance requirements
prerequisites: |
  - Azure Key Vault deployed and secured with access controls configured
  - Familiarity with TLS/SSL certificates and public key infrastructure (PKI) concepts
  - Microsoft Defender for Cloud enabled in your Azure subscription
