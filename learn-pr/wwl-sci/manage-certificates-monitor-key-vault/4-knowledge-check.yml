### YamlMime:ModuleUnit
uid: learn.wwl.manage-certificates-monitor-key-vault.knowledge-check
metadata:
  title: Knowledge check
  description: Check your knowledge of managing certificates and enabling audit logging in Azure Key Vault, including CA integration, lifetime actions, and diagnostic log configuration.
  ms.date: 04/13/2026
  author: r-c-stewart
  ms.author: roberts
  ms.topic: unit
  ai-usage: ai-generated
title: Knowledge check
durationInMinutes: 3
content: |
  [!include[](includes/4-knowledge-check.md)]
quiz:
  title: Check your knowledge
  questions:
  - content: "Contoso Health needs Transport Layer Security (TLS) certificates for a public-facing patient portal to autorenew before expiry without manual intervention. The renewed certificates must be trusted by public browsers. Which Key Vault configuration achieves the goal?"
    choices:
    - content: "Configure a self-signed issuer and enable a notify lifetime action."
      isCorrect: false
      explanation: "Incorrect. Self-signed certificates are generated by Key Vault acting as its own CA. Public browsers don't trust the Key Vault CA chain, so TLS on public-facing endpoints fail certificate validation. The notify action also requires human intervention—it doesn't autorenew."
    - content: "Configure a DigiCert or GlobalSign issuer object and set an auto-Renew lifetime action in the certificate policy."
      isCorrect: true
      explanation: "Correct. DigiCert and GlobalSign are the two integrated CA partners in Azure Key Vault. An issuer object stores the CA account credentials, and the auto-Renew lifetime action instructs Key Vault to submit a CSR to the CA automatically when the trigger threshold is reached. The resulting certificate has a public CA chain trusted by browsers."
    - content: "Set the certificate's Enabled attribute to true at 80% of its lifetime."
      isCorrect: false
      explanation: "Incorrect. The Enabled attribute controls whether a certificate version can be used—it doesn't trigger renewal. Autorenewal is controlled by the lifetime action in the certificate policy, triggered by a percentage of lifetime elapsed or a fixed number of days before expiry."
    - content: "Configure the certificate as exportable in the certificate policy."
      isCorrect: false
      explanation: "Incorrect. The exportable setting controls whether the certificate's private key can be extracted from the vault. It has no effect on autorenewal behavior. Renewal is configured through the certificate policy lifetime actions and issuer object."
  - content: "A security engineer creates a Log Analytics alert rule to detect Key Vault access failures. After admins deployed the rule, the alert never fires despite repeated authentication errors. What configuration step was most likely missed?"
    choices:
    - content: "Assigning the Key Vault Administrator role to the Log Analytics workspace."
      isCorrect: false
      explanation: "Incorrect. Log Analytics doesn't need a Key Vault RBAC role to receive diagnostic log data. The Log Analytics workspace destination is configured directly in the diagnostic setting, and Azure handles the data ingestion—no RBAC assignment on the vault is required for the workspace to receive logs."
    - content: "Enabling Microsoft Defender for Key Vault on the subscription."
      isCorrect: false
      explanation: "Incorrect. Microsoft Defender for Key Vault generates threat detection alerts for anomalous access patterns. It operates separately from the diagnostic log pipeline—enabling it doesn't cause access failure events to appear in Log Analytics. Diagnostic logging for the AuditEvent category must be explicitly enabled."
    - content: "Enabling the AuditEvent diagnostic setting on the Key Vault and configuring Log Analytics as the destination."
      isCorrect: true
      explanation: "Correct. Key Vault diagnostic logging isn't enabled by default. Without an active diagnostic setting sending the AuditEvent category to a Log Analytics workspace, no vault operation data reaches Log Analytics—and no alert rule can match data that isn't there. The alert rule itself can be correctly configured but has no source data to evaluate."
    - content: "Configuring certificate contacts on the Key Vault."
      isCorrect: false
      explanation: "Incorrect. Certificate contacts receive certificate lifecycle notifications such as near-expiry and renewal status. They have no relationship to the diagnostic log pipeline or to access failure logging."
  - content: "A security engineer needs an evidence trail of every operation performed on Azure Key Vault—including who accessed a secret, the timestamp, and whether the access succeeded. Which configuration produces this record?"
    choices:
    - content: "Enable Microsoft Defender for Key Vault."
      isCorrect: false
      explanation: "Incorrect. Microsoft Defender for Key Vault detects anomalous access patterns and generates security alerts. It doesn't produce a chronological log of every operation. Diagnostic logs and Defender alerts are complementary—the log provides the evidence. Defender provides the threat signal."
    - content: "Configure a resource lock on the Key Vault."
      isCorrect: false
      explanation: "Incorrect. Resource locks prevent accidental deletion or modification of the vault resource in Azure Resource Manager. They have no logging function and don't record operational activity such as secret reads or key operations."
    - content: "Configure an Azure Policy assignment to audit Key Vault access."
      isCorrect: false
      explanation: "Incorrect. Azure Policy evaluates whether resources comply with defined configuration rules and records compliance state. It doesn't capture an operational audit log of individual access events—who accessed which secret, when, and from what location."
    - content: "Enable the AuditEvent diagnostic category and send logs to a Log Analytics workspace."
      isCorrect: true
      explanation: "Correct. The AuditEvent diagnostic category captures every operation performed on Key Vault—the operation type, caller identity (stored as claims in the identity field), caller IP address, timestamp, and result. Sending these logs to Log Analytics makes them queryable for investigations and alert creation."
  - content: "A secret rotation function needs to trigger immediately when a new secret version is created in Azure Key Vault—without waiting for diagnostic log ingestion. Which mechanism should the security engineer configure?"
    choices:
    - content: "A Log Analytics alert rule that queries for SecretSet operations in the AuditEvent log."
      isCorrect: false
      explanation: "Incorrect. Log Analytics alert rules evaluate diagnostic log data on a polling schedule, and the AuditEvent log has an ingestion latency of approximately 10 minutes. This approach can't provide the immediate trigger that the scenario requires. Event Grid subscriptions are the correct mechanism for low-latency Key Vault lifecycle automation."
    - content: "An Azure Event Grid subscription on the Key Vault for the Microsoft.KeyVault.SecretNewVersionCreated event type."
      isCorrect: true
      explanation: "Correct. Event Grid provides real-time, push-based notification of Key Vault lifecycle events. When a new secret version is created, Key Vault publishes a Microsoft.KeyVault.SecretNewVersionCreated event to Event Grid, which immediately triggers the subscribed automation—such as an Azure Function. Diagnostic logs are batch-ingested with up to 10-minutes latency, making them unsuitable for real-time automation triggers."
    - content: "A certificate contact registered on the Key Vault."
      isCorrect: false
      explanation: "Incorrect. Certificate contacts receive notifications about certificate lifecycle events such as near-expiry and renewal status. They have no relationship to secret operations or to real-time automation triggers."
    - content: "Enabling Microsoft Defender for Key Vault and configuring an alert suppression rule."
      isCorrect: false
      explanation: "Incorrect. Microsoft Defender for Key Vault generates threat detection alerts for anomalous access patterns—it doesn't publish lifecycle events such as secret version creation. Alert suppression rules reduce noise from known-good activity and have no role in triggering rotation automation."
