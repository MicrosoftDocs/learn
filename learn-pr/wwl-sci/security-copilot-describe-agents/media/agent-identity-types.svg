<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-label="Architectural diagram showing the two types of agent identities in Security Copilot: Agent Identity via Microsoft Entra Agent ID and Existing User Account, along with the capabilities each enables">
  <!-- Background -->
  <rect width="900" height="520" fill="#FFFFFF"/>

  <!-- Central agent icon -->
  <rect x="370" y="20" width="160" height="60" rx="8" fill="#0078D4" aria-label="AI Agent"/>
  <text x="450" y="55" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="14" font-weight="600" fill="#FFFFFF">AI Agent</text>

  <!-- Arrow down from agent -->
  <path d="M450 80 L450 110" stroke="#091F2C" stroke-width="2" fill="none"/>
  <path d="M445 105 L450 115 L455 105" fill="#091F2C"/>

  <!-- Identity choice box -->
  <rect x="350" y="115" width="200" height="40" rx="6" fill="#E8E6DF" stroke="#091F2C" stroke-width="1" aria-label="Identity Selection"/>
  <text x="450" y="140" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#091F2C">Identity Selection</text>

  <!-- Branch arrows -->
  <path d="M380 155 L220 190" stroke="#091F2C" stroke-width="2" fill="none"/>
  <path d="M224 185 L216 193 L227 191" fill="#091F2C"/>
  <path d="M520 155 L680 190" stroke="#091F2C" stroke-width="2" fill="none"/>
  <path d="M673 191 L684 193 L676 185" fill="#091F2C"/>

  <!-- Left branch: Agent Identity -->
  <rect x="80" y="190" width="280" height="90" rx="8" fill="#FFFFFF" stroke="#0078D4" stroke-width="2" aria-label="Agent Identity via Microsoft Entra Agent ID"/>
  <rect x="80" y="190" width="280" height="28" rx="8" fill="#0078D4"/>
  <rect x="80" y="205" width="280" height="13" fill="#0078D4"/>
  <text x="220" y="210" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#FFFFFF">Agent Identity (Entra Agent ID)</text>
  <text x="100" y="240" font-family="Segoe UI, sans-serif" font-size="11" fill="#091F2C">• Dedicated identity for AI agents</text>
  <text x="100" y="256" font-family="Segoe UI, sans-serif" font-size="11" fill="#091F2C">• Right-sized access</text>
  <text x="100" y="272" font-family="Segoe UI, sans-serif" font-size="11" fill="#091F2C">• Bulk creation and retirement</text>

  <!-- Right branch: User Account -->
  <rect x="540" y="190" width="280" height="90" rx="8" fill="#FFFFFF" stroke="#C73ECC" stroke-width="2" aria-label="Existing User Account"/>
  <rect x="540" y="190" width="280" height="28" rx="8" fill="#C73ECC"/>
  <rect x="540" y="205" width="280" height="13" fill="#C73ECC"/>
  <text x="680" y="210" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#FFFFFF">Existing User Account</text>
  <text x="560" y="240" font-family="Segoe UI, sans-serif" font-size="11" fill="#091F2C">• Uses existing user credentials</text>
  <text x="560" y="256" font-family="Segoe UI, sans-serif" font-size="11" fill="#091F2C">• Inherits user's access</text>
  <text x="560" y="272" font-family="Segoe UI, sans-serif" font-size="11" fill="#091F2C">• Same data and services as user</text>

  <!-- Capabilities section -->
  <text x="450" y="320" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="13" font-weight="600" fill="#091F2C">What Agent Identities Enable</text>

  <!-- Arrow down to capabilities -->
  <path d="M450 325 L450 345" stroke="#091F2C" stroke-width="1.5" fill="none"/>
  <path d="M446 340 L450 348 L454 340" fill="#091F2C"/>

  <!-- Capability boxes -->
  <rect x="40" y="350" width="190" height="80" rx="8" fill="#8DC8E8" stroke="#2A446F" stroke-width="1.5" aria-label="Access Web Services"/>
  <text x="135" y="380" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#2A446F">Access Web Services</text>
  <text x="135" y="398" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#2A446F">Request tokens from</text>
  <text x="135" y="412" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#2A446F">Microsoft Entra to call</text>
  <text x="135" y="426" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#2A446F">Graph &amp; other APIs</text>

  <rect x="250" y="350" width="190" height="80" rx="8" fill="#8DC8E8" stroke="#2A446F" stroke-width="1.5" aria-label="Autonomous Access"/>
  <text x="345" y="380" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#2A446F">Autonomous Access</text>
  <text x="345" y="398" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#2A446F">Act independently using</text>
  <text x="345" y="412" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#2A446F">assigned rights (Graph,</text>
  <text x="345" y="426" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#2A446F">Azure RBAC, Entra roles)</text>

  <rect x="460" y="350" width="190" height="80" rx="8" fill="#8DC8E8" stroke="#2A446F" stroke-width="1.5" aria-label="Delegated Access"/>
  <text x="555" y="380" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#2A446F">Delegated Access</text>
  <text x="555" y="398" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#2A446F">Act on behalf of a user</text>
  <text x="555" y="412" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#2A446F">using delegated rights</text>
  <text x="555" y="426" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#2A446F">(on-behalf-of flow)</text>

  <rect x="670" y="350" width="190" height="80" rx="8" fill="#8DC8E8" stroke="#2A446F" stroke-width="1.5" aria-label="Authenticate Messages"/>
  <text x="765" y="380" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#2A446F">Authenticate Messages</text>
  <text x="765" y="398" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#2A446F">Accept &amp; validate</text>
  <text x="765" y="412" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#2A446F">requests from clients,</text>
  <text x="765" y="426" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#2A446F">users, or other agents</text>

  <!-- Comparison note at bottom -->
  <rect x="100" y="455" width="700" height="50" rx="6" fill="#F4F3F5" stroke="#E8E6DF" stroke-width="1" aria-label="Key difference note"/>
  <text x="450" y="477" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" fill="#091F2C">Agent identities are built for ephemeral, dynamically created agents — unlike application identities (long-lived services)</text>
  <text x="450" y="493" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" fill="#091F2C">or human identities (tied to passwords, MFA, mailboxes).</text>
</svg>