<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 820" role="img" aria-label="Architectural diagram showing Microsoft Entra agents, their capabilities, configuration elements, and the two available agents: Conditional Access Optimization and Identity Risk Management">
  <!-- Background -->
  <rect width="1100" height="820" fill="#FFFFFF"/>

  <!-- Top: Microsoft Entra Agents Platform -->
  <rect x="350" y="15" width="400" height="50" rx="8" fill="#091F2C" aria-label="Microsoft Entra Agents"/>
  <text x="550" y="46" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="18" font-weight="600" fill="#FFFFFF">Microsoft Entra Agents</text>

  <!-- Capabilities row -->
  <text x="550" y="90" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="14" font-weight="600" fill="#091F2C">Agent Capabilities</text>

  <rect x="30" y="102" width="190" height="48" rx="6" fill="#8DC8E8" stroke="#2A446F" stroke-width="1.2" aria-label="Automate routine tasks"/>
  <text x="125" y="131" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="13" font-weight="600" fill="#2A446F">Automate Tasks</text>

  <rect x="235" y="102" width="190" height="48" rx="6" fill="#8DC8E8" stroke="#2A446F" stroke-width="1.2" aria-label="Provide suggestions"/>
  <text x="330" y="131" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="13" font-weight="600" fill="#2A446F">Provide Suggestions</text>

  <rect x="440" y="102" width="210" height="48" rx="6" fill="#8DC8E8" stroke="#2A446F" stroke-width="1.2" aria-label="Operate autonomously"/>
  <text x="545" y="131" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="13" font-weight="600" fill="#2A446F">Operate Autonomously</text>

  <rect x="665" y="102" width="200" height="48" rx="6" fill="#8DC8E8" stroke="#2A446F" stroke-width="1.2" aria-label="Integrate seamlessly"/>
  <text x="765" y="131" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="13" font-weight="600" fill="#2A446F">Integrate Seamlessly</text>

  <rect x="880" y="102" width="185" height="48" rx="6" fill="#8DC8E8" stroke="#2A446F" stroke-width="1.2" aria-label="Learn and adapt"/>
  <text x="972" y="131" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="13" font-weight="600" fill="#2A446F">Learn &amp; Adapt</text>

  <!-- Configuration section -->
  <text x="550" y="185" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="14" font-weight="600" fill="#091F2C">Key Configuration Elements</text>

  <rect x="70" y="198" width="220" height="58" rx="6" fill="#F4F3F5" stroke="#C73ECC" stroke-width="1.5" aria-label="Agent Identity"/>
  <text x="180" y="222" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="13" font-weight="600" fill="#702573">Agent Identity</text>
  <text x="180" y="242" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">Unique ID on activation</text>

  <rect x="310" y="198" width="220" height="58" rx="6" fill="#F4F3F5" stroke="#C73ECC" stroke-width="1.5" aria-label="Entra Roles"/>
  <text x="420" y="222" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="13" font-weight="600" fill="#702573">Entra Roles</text>
  <text x="420" y="242" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">Built-in roles required</text>

  <rect x="550" y="198" width="220" height="58" rx="6" fill="#F4F3F5" stroke="#C73ECC" stroke-width="1.5" aria-label="Permissions"/>
  <text x="660" y="222" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="13" font-weight="600" fill="#702573">Permissions</text>
  <text x="660" y="242" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">Scoped read/write access</text>

  <rect x="790" y="198" width="220" height="58" rx="6" fill="#F4F3F5" stroke="#C73ECC" stroke-width="1.5" aria-label="Role-Based Access"/>
  <text x="900" y="222" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="13" font-weight="600" fill="#702573">Role-Based Access</text>
  <text x="900" y="242" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">Admin roles for setup</text>

  <!-- Arrow down to agents -->
  <path d="M550 260 L550 285" stroke="#091F2C" stroke-width="2" fill="none"/>
  <path d="M546 280 L550 290 L554 280" fill="#091F2C"/>

  <!-- Available Agents Section -->
  <rect x="40" y="295" width="1020" height="445" rx="10" fill="#FFFFFF" stroke="#E8E6DF" stroke-width="2" aria-label="Available Microsoft Entra Agents"/>
  <text x="550" y="322" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="15" font-weight="600" fill="#091F2C">Available Microsoft Entra Agents</text>

  <!-- Conditional Access Optimization Agent -->
  <rect x="65" y="338" width="470" height="375" rx="8" fill="#FFFFFF" stroke="#0078D4" stroke-width="2" aria-label="Conditional Access Optimization Agent"/>
  <rect x="65" y="338" width="470" height="34" rx="8" fill="#0078D4"/>
  <rect x="65" y="358" width="470" height="14" fill="#0078D4"/>
  <text x="300" y="361" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="14" font-weight="600" fill="#FFFFFF">Conditional Access Optimization Agent</text>

  <!-- CA Agent description -->
  <text x="85" y="396" font-family="Segoe UI, sans-serif" font-size="13" fill="#091F2C">Analyzes CA policies against best practices</text>
  <text x="85" y="414" font-family="Segoe UI, sans-serif" font-size="13" fill="#091F2C">and Zero Trust principles.</text>

  <!-- CA Agent policy suggestions -->
  <text x="85" y="442" font-family="Segoe UI, sans-serif" font-size="13" font-weight="600" fill="#2A446F">Policy Suggestions:</text>
  <rect x="85" y="452" width="210" height="28" rx="4" fill="#E8E6DF" aria-label="Require MFA"/>
  <text x="190" y="471" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">Require MFA</text>
  <rect x="305" y="452" width="210" height="28" rx="4" fill="#E8E6DF" aria-label="Device controls"/>
  <text x="410" y="471" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">Device Controls</text>
  <rect x="85" y="486" width="210" height="28" rx="4" fill="#E8E6DF" aria-label="Block legacy auth"/>
  <text x="190" y="505" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">Block Legacy Auth</text>
  <rect x="305" y="486" width="210" height="28" rx="4" fill="#E8E6DF" aria-label="Block device code flow"/>
  <text x="410" y="505" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">Block Device Code Flow</text>
  <rect x="85" y="520" width="135" height="28" rx="4" fill="#FFA38B" aria-label="Risky users"/>
  <text x="152" y="539" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" fill="#73391D">Risky Users</text>
  <rect x="228" y="520" width="135" height="28" rx="4" fill="#FFA38B" aria-label="Risky sign-ins"/>
  <text x="295" y="539" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" fill="#73391D">Risky Sign-ins</text>
  <rect x="371" y="520" width="135" height="28" rx="4" fill="#FFA38B" aria-label="Risky agents"/>
  <text x="438" y="539" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" fill="#73391D">Risky Agents</text>
  <rect x="85" y="554" width="210" height="28" rx="4" fill="#E8E6DF" aria-label="Policy consolidation"/>
  <text x="190" y="573" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">Policy Consolidation</text>
  <rect x="305" y="554" width="210" height="28" rx="4" fill="#E8E6DF" aria-label="Deep analysis"/>
  <text x="410" y="573" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">Deep Analysis</text>

  <!-- CA Agent attributes -->
  <line x1="85" y1="594" x2="515" y2="594" stroke="#E8E6DF" stroke-width="1"/>
  <text x="85" y="616" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C"><tspan font-weight="600">License:</tspan> Entra ID P1</text>
  <text x="85" y="636" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C"><tspan font-weight="600">Roles:</tspan> Security Admin (config) · CA Admin (use)</text>
  <text x="85" y="656" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C"><tspan font-weight="600">Trigger:</tspan> Every 24 hours or manual</text>
  <text x="85" y="676" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C"><tspan font-weight="600">Mode:</tspan> Report-only (admin approval required)</text>

  <!-- Identity Risk Management Agent -->
  <rect x="560" y="338" width="475" height="375" rx="8" fill="#FFFFFF" stroke="#FF5C39" stroke-width="2" aria-label="Identity Risk Management Agent"/>
  <rect x="560" y="338" width="475" height="34" rx="8" fill="#FF5C39"/>
  <rect x="560" y="358" width="475" height="14" fill="#FF5C39"/>
  <text x="797" y="361" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="14" font-weight="600" fill="#FFFFFF">Identity Risk Management Agent (Preview)</text>

  <!-- Risk Agent description -->
  <text x="580" y="396" font-family="Segoe UI, sans-serif" font-size="13" fill="#091F2C">Investigates risky users, generates findings,</text>
  <text x="580" y="414" font-family="Segoe UI, sans-serif" font-size="13" fill="#091F2C">and recommends remediation actions.</text>

  <!-- Risk Agent workflow -->
  <text x="580" y="442" font-family="Segoe UI, sans-serif" font-size="13" font-weight="600" fill="#73391D">Agent Workflow:</text>

  <rect x="580" y="452" width="430" height="34" rx="5" fill="#F4F3F5" stroke="#E8E6DF" stroke-width="1" aria-label="Step 1: Check for risky users"/>
  <text x="590" y="474" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">1. Check for new risky users (state: "At risk")</text>
  <path d="M795 486 L795 496" stroke="#091F2C" stroke-width="1.5" fill="none"/>
  <path d="M791 492 L795 500 L799 492" fill="#091F2C"/>

  <rect x="580" y="500" width="430" height="34" rx="5" fill="#F4F3F5" stroke="#E8E6DF" stroke-width="1" aria-label="Step 2: Investigate sign-ins and detections"/>
  <text x="590" y="522" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">2. Investigate risky sign-ins and risk detections</text>
  <path d="M795 534 L795 544" stroke="#091F2C" stroke-width="1.5" fill="none"/>
  <path d="M791 540 L795 548 L799 540" fill="#091F2C"/>

  <rect x="580" y="548" width="430" height="34" rx="5" fill="#F4F3F5" stroke="#E8E6DF" stroke-width="1" aria-label="Step 3: Generate findings and risk summary"/>
  <text x="590" y="570" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">3. Generate findings with thorough risk summary</text>
  <path d="M795 582 L795 592" stroke="#091F2C" stroke-width="1.5" fill="none"/>
  <path d="M791 588 L795 596 L799 588" fill="#091F2C"/>

  <rect x="580" y="596" width="430" height="34" rx="5" fill="#F4F3F5" stroke="#E8E6DF" stroke-width="1" aria-label="Step 4: Recommend remediation"/>
  <text x="590" y="618" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">4. Recommend remediation (manual admin approval)</text>

  <!-- Risk Agent attributes -->
  <line x1="580" y1="642" x2="1015" y2="642" stroke="#E8E6DF" stroke-width="1"/>
  <text x="580" y="664" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C"><tspan font-weight="600">License:</tspan> Entra Agent ID + Entra ID P2</text>
  <text x="580" y="684" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C"><tspan font-weight="600">Roles:</tspan> Security Admin (activate) · Security Reader (view)</text>
  <text x="580" y="704" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C"><tspan font-weight="600">Trigger:</tspan> Every 24h, manual, or continuous</text>

  <!-- Bottom: Prerequisites -->
  <rect x="225" y="758" width="650" height="48" rx="6" fill="#F4F3F5" stroke="#E8E6DF" stroke-width="1.5" aria-label="Prerequisites"/>
  <text x="550" y="779" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="13" font-weight="600" fill="#091F2C">Prerequisite: Security Compute Units (SCUs)</text>
  <text x="550" y="797" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">At least 1 SCU provisioned · Each agent run consumes &lt;1 SCU · Billed monthly</text>
</svg>