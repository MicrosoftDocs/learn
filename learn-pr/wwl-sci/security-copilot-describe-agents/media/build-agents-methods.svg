<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 520" role="img" aria-label="Architectural diagram showing three methods for building custom agents in Security Copilot: Natural Language (NL2Agent), Agent Builder, and Developer Methods (YAML Upload and MCP Tools).">
  <!-- Background -->
  <rect width="1100" height="520" fill="#FFFFFF"/>

  <!-- Method 1: Natural Language (NL2Agent) -->
  <rect x="40" y="20" width="330" height="485" rx="8" fill="#FFFFFF" stroke="#0078D4" stroke-width="2" aria-label="Natural Language Agent Creation"/>
  <rect x="40" y="20" width="330" height="38" rx="8" fill="#0078D4"/>
  <rect x="40" y="44" width="330" height="14" fill="#0078D4"/>
  <text x="205" y="45" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#FFFFFF">Natural Language (NL2Agent)</text>

  <!-- Description -->
  <text x="60" y="78" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">Describe what you want in conversational</text>
  <text x="60" y="95" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">language. Security Copilot autogenerates</text>
  <text x="60" y="112" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">the agent YAML from your description.</text>

  <!-- Key Takeaways -->
  <text x="60" y="138" font-family="Segoe UI, sans-serif" font-size="13" font-weight="600" fill="#2A446F">Key Takeaways:</text>

  <rect x="60" y="150" width="290" height="44" rx="6" fill="#F4F3F5" stroke="#0078D4" stroke-width="1"/>
  <text x="75" y="170" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#091F2C">No Technical Expertise Required</text>
  <text x="75" y="187" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">Accessible to all skill levels</text>

  <rect x="60" y="200" width="290" height="44" rx="6" fill="#F4F3F5" stroke="#0078D4" stroke-width="1"/>
  <text x="75" y="220" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#091F2C">Conversational Workflow</text>
  <text x="75" y="237" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">Guided questions refine your intent</text>

  <rect x="60" y="250" width="290" height="44" rx="6" fill="#F4F3F5" stroke="#0078D4" stroke-width="1"/>
  <text x="75" y="270" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#091F2C">Auto-Generated YAML</text>
  <text x="75" y="287" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">Output transitions to agent builder</text>

  <rect x="60" y="300" width="290" height="44" rx="6" fill="#F4F3F5" stroke="#0078D4" stroke-width="1"/>
  <text x="75" y="320" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#091F2C">Quick Prototyping</text>
  <text x="75" y="337" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">Fastest path from idea to agent</text>

  <!-- Workflow -->
  <line x1="60" y1="360" x2="350" y2="360" stroke="#E8E6DF" stroke-width="1"/>
  <text x="60" y="380" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C"><tspan font-weight="600">Experience:</tspan> Security Copilot portal</text>
  <text x="60" y="398" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C"><tspan font-weight="600">Audience:</tspan> Security analysts, admins</text>
  <text x="60" y="416" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C"><tspan font-weight="600">Output:</tspan> Agent YAML manifest</text>

  <!-- Best for -->
  <rect x="60" y="434" width="290" height="28" rx="6" fill="#0078D4" opacity="0.1"/>
  <text x="205" y="453" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#0078D4">Best for: Quick, no-code creation</text>

  <!-- Shared workflow arrow indicator -->
  <text x="205" y="483" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#091F2C">Build → Test → Publish</text>

  <!-- Method 2: Agent Builder -->
  <rect x="390" y="20" width="330" height="485" rx="8" fill="#FFFFFF" stroke="#008272" stroke-width="2" aria-label="Agent Builder"/>
  <rect x="390" y="20" width="330" height="38" rx="8" fill="#008272"/>
  <rect x="390" y="44" width="330" height="14" fill="#008272"/>
  <text x="555" y="45" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#FFFFFF">Agent Builder</text>

  <!-- Description -->
  <text x="410" y="78" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">Form-based graphical interface for creating</text>
  <text x="410" y="95" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">agents from scratch with full control over</text>
  <text x="410" y="112" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">details, instructions, inputs, and tools.</text>

  <!-- Key Takeaways -->
  <text x="410" y="138" font-family="Segoe UI, sans-serif" font-size="13" font-weight="600" fill="#005C5C">Key Takeaways:</text>

  <rect x="410" y="150" width="290" height="44" rx="6" fill="#F4F3F5" stroke="#008272" stroke-width="1"/>
  <text x="425" y="170" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#091F2C">Comprehensive Configuration</text>
  <text x="425" y="187" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">Details, instructions, inputs, tools, triggers</text>

  <rect x="410" y="200" width="290" height="44" rx="6" fill="#F4F3F5" stroke="#008272" stroke-width="1"/>
  <text x="425" y="220" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#091F2C">Tools Catalog Access</text>
  <text x="425" y="237" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">AGENT, GPT, KQL, API, and MCP tools</text>

  <rect x="410" y="250" width="290" height="44" rx="6" fill="#F4F3F5" stroke="#008272" stroke-width="1"/>
  <text x="425" y="270" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#091F2C">Chat-Assisted Refinement</text>
  <text x="425" y="287" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">Copilot chat to iterate on configuration</text>

  <rect x="410" y="300" width="290" height="44" rx="6" fill="#F4F3F5" stroke="#008272" stroke-width="1"/>
  <text x="425" y="320" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#091F2C">Code View Toggle</text>
  <text x="425" y="337" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">Switch between form and YAML views</text>

  <!-- Workflow -->
  <line x1="410" y1="360" x2="700" y2="360" stroke="#E8E6DF" stroke-width="1"/>
  <text x="410" y="380" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C"><tspan font-weight="600">Experience:</tspan> Security Copilot portal</text>
  <text x="410" y="398" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C"><tspan font-weight="600">Audience:</tspan> Security engineers, admins</text>
  <text x="410" y="416" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C"><tspan font-weight="600">Output:</tspan> Agent YAML manifest</text>

  <!-- Best for -->
  <rect x="410" y="434" width="290" height="28" rx="6" fill="#008272" opacity="0.1"/>
  <text x="555" y="453" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#008272">Best for: Precise, form-based control</text>

  <!-- Shared workflow -->
  <text x="555" y="483" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#091F2C">Build → Test → Publish</text>

  <!-- Method 3: Developer Methods (YAML + MCP) -->
  <rect x="740" y="20" width="330" height="485" rx="8" fill="#FFFFFF" stroke="#5C2D91" stroke-width="2" aria-label="Developer Methods: YAML Upload and MCP Tools"/>
  <rect x="740" y="20" width="330" height="38" rx="8" fill="#5C2D91"/>
  <rect x="740" y="44" width="330" height="14" fill="#5C2D91"/>
  <text x="905" y="45" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#FFFFFF">Developer Methods (YAML + MCP)</text>

  <!-- Description -->
  <text x="760" y="78" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">Build agent YAML in your IDE and upload, or</text>
  <text x="760" y="95" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">use MCP tools to create and deploy agents</text>
  <text x="760" y="112" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">directly from your development environment.</text>

  <!-- Key Takeaways -->
  <text x="760" y="138" font-family="Segoe UI, sans-serif" font-size="13" font-weight="600" fill="#3B1C5A">Key Takeaways:</text>

  <rect x="760" y="150" width="290" height="44" rx="6" fill="#F4F3F5" stroke="#5C2D91" stroke-width="1"/>
  <text x="775" y="170" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#091F2C">Full Programmatic Control</text>
  <text x="775" y="187" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">Version control and iteration management</text>

  <rect x="760" y="200" width="290" height="44" rx="6" fill="#F4F3F5" stroke="#5C2D91" stroke-width="1"/>
  <text x="775" y="220" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#091F2C">IDE Integration</text>
  <text x="775" y="237" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">Build in VS Code or any MCP-compatible IDE</text>

  <rect x="760" y="250" width="290" height="44" rx="6" fill="#F4F3F5" stroke="#5C2D91" stroke-width="1"/>
  <text x="775" y="270" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#091F2C">Reusable Configurations</text>
  <text x="775" y="287" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">Share and reuse manifests across agents</text>

  <rect x="760" y="300" width="290" height="44" rx="6" fill="#F4F3F5" stroke="#5C2D91" stroke-width="1"/>
  <text x="775" y="320" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#091F2C">Direct Deployment</text>
  <text x="775" y="337" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">Deploy to Security Copilot from IDE</text>

  <!-- Workflow -->
  <line x1="760" y1="360" x2="1050" y2="360" stroke="#E8E6DF" stroke-width="1"/>
  <text x="760" y="380" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C"><tspan font-weight="600">Experience:</tspan> IDE (VS Code, etc.)</text>
  <text x="760" y="398" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C"><tspan font-weight="600">Audience:</tspan> Developers, partners</text>
  <text x="760" y="416" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C"><tspan font-weight="600">Output:</tspan> Agent YAML manifest</text>

  <!-- Best for -->
  <rect x="760" y="434" width="290" height="28" rx="6" fill="#5C2D91" opacity="0.1"/>
  <text x="905" y="453" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#5C2D91">Best for: Code-first development</text>

  <!-- Shared workflow -->
  <text x="905" y="483" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#091F2C">Build → Test → Publish</text>
</svg>
