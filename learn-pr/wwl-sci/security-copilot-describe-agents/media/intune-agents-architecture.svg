<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 580" role="img" aria-label="Architectural diagram showing three Microsoft Intune agents in Security Copilot: Vulnerability Remediation Agent, Change Review Agent, and Policy Configuration Agent, along with their key capabilities.">
  <!-- Background -->
  <rect width="1100" height="580" fill="#FFFFFF"/>

  <!-- Agent 1: Vulnerability Remediation Agent -->
  <rect x="40" y="20" width="330" height="545" rx="8" fill="#FFFFFF" stroke="#0078D4" stroke-width="2" aria-label="Vulnerability Remediation Agent"/>
  <rect x="40" y="20" width="330" height="38" rx="8" fill="#0078D4"/>
  <rect x="40" y="44" width="330" height="14" fill="#0078D4"/>
  <text x="205" y="45" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#FFFFFF">Vulnerability Remediation Agent</text>

  <!-- Description -->
  <text x="60" y="78" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">Uses Defender Vulnerability Management to</text>
  <text x="60" y="95" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">identify CVEs on managed devices; prioritizes</text>
  <text x="60" y="112" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">remediation with step-by-step guidance.</text>

  <!-- Key Capabilities -->
  <text x="60" y="138" font-family="Segoe UI, sans-serif" font-size="13" font-weight="600" fill="#2A446F">Key Capabilities:</text>

  <rect x="60" y="150" width="290" height="50" rx="6" fill="#F4F3F5" stroke="#0078D4" stroke-width="1" aria-label="CVE identification"/>
  <text x="75" y="170" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#091F2C">CVE Identification</text>
  <text x="75" y="188" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">Detects vulnerabilities on managed devices</text>

  <rect x="60" y="206" width="290" height="50" rx="6" fill="#F4F3F5" stroke="#0078D4" stroke-width="1" aria-label="Prioritized remediation"/>
  <text x="75" y="226" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#091F2C">Prioritized Remediation</text>
  <text x="75" y="244" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">Ranked suggestions with impact analysis</text>

  <rect x="60" y="262" width="290" height="50" rx="6" fill="#F4F3F5" stroke="#0078D4" stroke-width="1" aria-label="Step-by-step guidance"/>
  <text x="75" y="282" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#091F2C">Step-by-Step Guidance</text>
  <text x="75" y="300" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">Actionable Intune remediation instructions</text>

  <rect x="60" y="318" width="290" height="50" rx="6" fill="#F4F3F5" stroke="#0078D4" stroke-width="1" aria-label="Remediation tracking"/>
  <text x="75" y="338" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#091F2C">Remediation Tracking</text>
  <text x="75" y="356" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">Mark as applied; historical record</text>

  <!-- Key details -->
  <line x1="60" y1="382" x2="350" y2="382" stroke="#E8E6DF" stroke-width="1"/>
  <text x="60" y="400" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C"><tspan font-weight="600">Trigger:</tspan> Manually started by an admin</text>
  <text x="60" y="418" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C"><tspan font-weight="600">Plugin:</tspan> Microsoft Intune, Microsoft Defender</text>
  <text x="60" y="436" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C"><tspan font-weight="600">Identity:</tspan> Admin account used during setup</text>
  <text x="60" y="454" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C"><tspan font-weight="600">Auth expiry:</tspan> 90 days</text>

  <!-- License -->
  <rect x="60" y="472" width="290" height="48" rx="6" fill="#F4F3F5" stroke="#E8E6DF" stroke-width="1"/>
  <text x="205" y="493" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#091F2C">License</text>
  <text x="205" y="511" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">Intune Plan 1 + Defender Vuln Mgmt</text>

  <!-- Products -->
  <rect x="60" y="530" width="290" height="28" rx="6" fill="#0078D4" opacity="0.1"/>
  <text x="205" y="549" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#0078D4">Security Copilot + Intune + Defender</text>

  <!-- Agent 2: Change Review Agent -->
  <rect x="390" y="20" width="330" height="545" rx="8" fill="#FFFFFF" stroke="#C73ECC" stroke-width="2" aria-label="Change Review Agent"/>
  <rect x="390" y="20" width="330" height="38" rx="8" fill="#C73ECC"/>
  <rect x="390" y="44" width="330" height="14" fill="#C73ECC"/>
  <text x="555" y="45" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#FFFFFF">Change Review Agent</text>

  <!-- Description -->
  <text x="410" y="78" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">Evaluates Multi Admin Approval requests for</text>
  <text x="410" y="95" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">PowerShell scripts; provides risk-based</text>
  <text x="410" y="112" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">recommendations and contextual insights.</text>

  <!-- Key Capabilities -->
  <text x="410" y="138" font-family="Segoe UI, sans-serif" font-size="13" font-weight="600" fill="#702573">Key Capabilities:</text>

  <rect x="410" y="150" width="290" height="50" rx="6" fill="#F4F3F5" stroke="#C73ECC" stroke-width="1" aria-label="Script risk assessment"/>
  <text x="425" y="170" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#091F2C">Script Risk Assessment</text>
  <text x="425" y="188" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">Analyzes PowerShell script behavior</text>

  <rect x="410" y="206" width="290" height="50" rx="6" fill="#F4F3F5" stroke="#C73ECC" stroke-width="1" aria-label="Multi-signal aggregation"/>
  <text x="425" y="226" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#091F2C">Multi-Signal Aggregation</text>
  <text x="425" y="244" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">Defender, Entra ID, and Intune signals</text>

  <rect x="410" y="262" width="290" height="50" rx="6" fill="#F4F3F5" stroke="#C73ECC" stroke-width="1" aria-label="Risk-based recommendations"/>
  <text x="425" y="282" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#091F2C">Risk-Based Recommendations</text>
  <text x="425" y="300" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">Approve or deny with justification</text>

  <rect x="410" y="318" width="290" height="50" rx="6" fill="#F4F3F5" stroke="#C73ECC" stroke-width="1" aria-label="Change management"/>
  <text x="425" y="338" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#091F2C">Change Management</text>
  <text x="425" y="356" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">Secure and efficient approval workflows</text>

  <!-- Key details -->
  <line x1="410" y1="382" x2="700" y2="382" stroke="#E8E6DF" stroke-width="1"/>
  <text x="410" y="400" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C"><tspan font-weight="600">Trigger:</tspan> Manually started by an admin</text>
  <text x="410" y="418" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C"><tspan font-weight="600">Plugin:</tspan> Intune, Entra, Defender XDR, TI</text>
  <text x="410" y="436" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C"><tspan font-weight="600">Identity:</tspan> Admin account used during setup</text>
  <text x="410" y="454" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C"><tspan font-weight="600">Auth expiry:</tspan> 90 days</text>

  <!-- License -->
  <rect x="410" y="472" width="290" height="48" rx="6" fill="#F4F3F5" stroke="#E8E6DF" stroke-width="1"/>
  <text x="555" y="493" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#091F2C">License</text>
  <text x="555" y="511" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">Intune Plan 1 + Entra P2 + Defender Vuln Mgmt</text>

  <!-- Products -->
  <rect x="410" y="530" width="290" height="28" rx="6" fill="#C73ECC" opacity="0.1"/>
  <text x="555" y="549" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#C73ECC">Security Copilot + Intune + Entra + Defender</text>

  <!-- Agent 3: Policy Configuration Agent -->
  <rect x="740" y="20" width="330" height="545" rx="8" fill="#FFFFFF" stroke="#FF5C39" stroke-width="2" aria-label="Policy Configuration Agent"/>
  <rect x="740" y="20" width="330" height="38" rx="8" fill="#FF5C39"/>
  <rect x="740" y="44" width="330" height="14" fill="#FF5C39"/>
  <text x="905" y="45" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#FFFFFF">Policy Configuration Agent</text>

  <!-- Description -->
  <text x="760" y="78" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">Converts plain-language documents and</text>
  <text x="760" y="95" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">industry baselines into recommended Intune</text>
  <text x="760" y="112" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">settings and configuration profiles.</text>

  <!-- Key Capabilities -->
  <text x="760" y="138" font-family="Segoe UI, sans-serif" font-size="13" font-weight="600" fill="#73391D">Key Capabilities:</text>

  <rect x="760" y="150" width="290" height="50" rx="6" fill="#F4F3F5" stroke="#FF5C39" stroke-width="1" aria-label="Document analysis"/>
  <text x="775" y="170" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#091F2C">Document Analysis</text>
  <text x="775" y="188" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">Upload compliance standards or baselines</text>

  <rect x="760" y="206" width="290" height="50" rx="6" fill="#F4F3F5" stroke="#FF5C39" stroke-width="1" aria-label="Settings matching"/>
  <text x="775" y="226" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#091F2C">Settings Matching</text>
  <text x="775" y="244" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">Maps to Intune settings catalog settings</text>

  <rect x="760" y="262" width="290" height="50" rx="6" fill="#F4F3F5" stroke="#FF5C39" stroke-width="1" aria-label="Guided policy creation"/>
  <text x="775" y="282" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#091F2C">Guided Policy Creation</text>
  <text x="775" y="300" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">Walk-through of profile configuration</text>

  <rect x="760" y="318" width="290" height="50" rx="6" fill="#F4F3F5" stroke="#FF5C39" stroke-width="1" aria-label="Customizable recommendations"/>
  <text x="775" y="338" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#091F2C">Customizable Recommendations</text>
  <text x="775" y="356" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">Adjust suggestions to fit your environment</text>

  <!-- Key details -->
  <line x1="760" y1="382" x2="1050" y2="382" stroke="#E8E6DF" stroke-width="1"/>
  <text x="760" y="400" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C"><tspan font-weight="600">Trigger:</tspan> Manually started by an admin</text>
  <text x="760" y="418" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C"><tspan font-weight="600">Plugin:</tspan> Microsoft Intune</text>
  <text x="760" y="436" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C"><tspan font-weight="600">Identity:</tspan> Admin account used during setup</text>
  <text x="760" y="454" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C"><tspan font-weight="600">Auth expiry:</tspan> 90 days</text>

  <!-- License -->
  <rect x="760" y="472" width="290" height="48" rx="6" fill="#F4F3F5" stroke="#E8E6DF" stroke-width="1"/>
  <text x="905" y="493" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#091F2C">License</text>
  <text x="905" y="511" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">Microsoft Intune Plan 1</text>

  <!-- Products -->
  <rect x="760" y="530" width="290" height="28" rx="6" fill="#FF5C39" opacity="0.1"/>
  <text x="905" y="549" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#FF5C39">Security Copilot + Microsoft Intune</text>
</svg>
