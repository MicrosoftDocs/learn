<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 530" role="img" aria-label="Architectural diagram showing two Microsoft Security Copilot standalone agents: Threat Intelligence Briefing Agent and Security Analyst Agent, along with their key capabilities.">
  <!-- Background -->
  <rect width="740" height="530" fill="#FFFFFF"/>

  <!-- Agent 1: Threat Intelligence Briefing Agent -->
  <rect x="30" y="20" width="330" height="495" rx="8" fill="#FFFFFF" stroke="#0078D4" stroke-width="2" aria-label="Threat Intelligence Briefing Agent"/>
  <rect x="30" y="20" width="330" height="38" rx="8" fill="#0078D4"/>
  <rect x="30" y="44" width="330" height="14" fill="#0078D4"/>
  <text x="195" y="45" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#FFFFFF">Threat Intelligence Briefing Agent</text>

  <!-- Description -->
  <text x="50" y="78" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">Generates threat intel briefings from latest</text>
  <text x="50" y="95" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">threat actor activity and vulnerability</text>
  <text x="50" y="112" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">information using dynamic automation.</text>

  <!-- Key Capabilities -->
  <text x="50" y="138" font-family="Segoe UI, sans-serif" font-size="13" font-weight="600" fill="#2A446F">Key Capabilities:</text>

  <rect x="50" y="150" width="290" height="50" rx="6" fill="#F4F3F5" stroke="#0078D4" stroke-width="1" aria-label="Automated briefing generation"/>
  <text x="65" y="170" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#091F2C">Automated Briefing Generation</text>
  <text x="65" y="188" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">Customized reports within minutes</text>

  <rect x="50" y="206" width="290" height="50" rx="6" fill="#F4F3F5" stroke="#0078D4" stroke-width="1" aria-label="Dynamic reasoning"/>
  <text x="65" y="226" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#091F2C">Dynamic Reasoning</text>
  <text x="65" y="244" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">Real-time prioritization of intel steps</text>

  <rect x="50" y="262" width="290" height="50" rx="6" fill="#F4F3F5" stroke="#0078D4" stroke-width="1" aria-label="Organizational context"/>
  <text x="65" y="282" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#091F2C">Organizational Context</text>
  <text x="65" y="300" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">Defender for Endpoint + EASM signals</text>

  <rect x="50" y="318" width="290" height="50" rx="6" fill="#F4F3F5" stroke="#0078D4" stroke-width="1" aria-label="Configurable parameters"/>
  <text x="65" y="338" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#091F2C">Configurable Parameters</text>
  <text x="65" y="356" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">Insights count, period, region, industry</text>

  <!-- Key details -->
  <line x1="50" y1="382" x2="340" y2="382" stroke="#E8E6DF" stroke-width="1"/>
  <text x="50" y="400" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C"><tspan font-weight="600">Trigger:</tspan> Configured interval or manual</text>
  <text x="50" y="418" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C"><tspan font-weight="600">Plugin:</tspan> Threat Intel, EASM (optional)</text>
  <text x="50" y="436" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C"><tspan font-weight="600">Identity:</tspan> User account or agent identity</text>

  <!-- Products -->
  <rect x="50" y="454" width="290" height="34" rx="6" fill="#0078D4" opacity="0.1"/>
  <text x="195" y="475" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#0078D4">Security Copilot + Microsoft Defender</text>

  <!-- Agent 2: Security Analyst Agent -->
  <rect x="380" y="20" width="330" height="495" rx="8" fill="#FFFFFF" stroke="#5C2D91" stroke-width="2" aria-label="Security Analyst Agent"/>
  <rect x="380" y="20" width="330" height="38" rx="8" fill="#5C2D91"/>
  <rect x="380" y="44" width="330" height="14" fill="#5C2D91"/>
  <text x="545" y="45" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#FFFFFF">Security Analyst Agent</text>

  <!-- Description -->
  <text x="400" y="78" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">Identifies, assesses, and prioritizes risks</text>
  <text x="400" y="95" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">with ready-to-use or custom analyses on</text>
  <text x="400" y="112" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">security data from multiple sources.</text>

  <!-- Key Capabilities -->
  <text x="400" y="138" font-family="Segoe UI, sans-serif" font-size="13" font-weight="600" fill="#3B1C5A">Key Capabilities:</text>

  <rect x="400" y="150" width="290" height="58" rx="6" fill="#F4F3F5" stroke="#5C2D91" stroke-width="1" aria-label="Flexible analysis"/>
  <text x="415" y="172" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#091F2C">Flexible Analysis</text>
  <text x="415" y="190" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">Pattern analysis, anomaly detection,</text>
  <text x="415" y="204" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">clustering, risk scoring, forecasting</text>

  <rect x="400" y="214" width="290" height="58" rx="6" fill="#F4F3F5" stroke="#5C2D91" stroke-width="1" aria-label="Data integration"/>
  <text x="415" y="236" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#091F2C">Data Integration</text>
  <text x="415" y="254" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">Defender XDR, Sentinel Log Analytics,</text>
  <text x="415" y="268" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">Sentinel Data Lake, CSV uploads</text>

  <rect x="400" y="278" width="290" height="50" rx="6" fill="#F4F3F5" stroke="#5C2D91" stroke-width="1" aria-label="Interactive exploration"/>
  <text x="415" y="298" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#091F2C">Interactive Exploration</text>
  <text x="415" y="316" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">Visualize data to spot anomalies faster</text>

  <rect x="400" y="334" width="290" height="50" rx="6" fill="#F4F3F5" stroke="#5C2D91" stroke-width="1" aria-label="Conversation assistance"/>
  <text x="415" y="354" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#091F2C">Conversation Assistance</text>
  <text x="415" y="372" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">Follow-up questions + deeper analysis</text>

  <!-- Key details -->
  <line x1="400" y1="398" x2="690" y2="398" stroke="#E8E6DF" stroke-width="1"/>
  <text x="400" y="416" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C"><tspan font-weight="600">Trigger:</tspan> Interactive (natural language)</text>
  <text x="400" y="434" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C"><tspan font-weight="600">Plugin:</tspan> Security Copilot</text>
  <text x="400" y="452" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C"><tspan font-weight="600">Identity:</tspan> Per-user configuration</text>

  <!-- Products -->
  <rect x="400" y="468" width="290" height="34" rx="6" fill="#5C2D91" opacity="0.1"/>
  <text x="545" y="489" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#5C2D91">Security Copilot + Microsoft Defender</text>
</svg>