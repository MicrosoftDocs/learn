<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 640" role="img" aria-label="Architectural diagram showing three Microsoft Defender agents in Security Copilot: Security Alert Triage Agent, Threat Intelligence Briefing Agent, and Threat Hunting Agent, along with their key capabilities.">
  <!-- Background -->
  <rect width="1100" height="640" fill="#FFFFFF"/>

  <!-- Top: Title -->
  <rect x="300" y="18" width="500" height="52" rx="8" fill="#091F2C" aria-label="Microsoft Defender Agents"/>
  <text x="550" y="50" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="18" font-weight="600" fill="#FFFFFF">Microsoft Defender Agents</text>

  <!-- Subtitle -->
  <text x="550" y="92" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="14" fill="#091F2C">AI-powered agents in the Microsoft Defender portal for Security Copilot</text>

  <!-- Agent 1: Security Alert Triage Agent -->
  <rect x="40" y="120" width="330" height="505" rx="8" fill="#FFFFFF" stroke="#0078D4" stroke-width="2" aria-label="Security Alert Triage Agent"/>
  <rect x="40" y="120" width="330" height="38" rx="8" fill="#0078D4"/>
  <rect x="40" y="144" width="330" height="14" fill="#0078D4"/>
  <text x="205" y="145" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="13" font-weight="600" fill="#FFFFFF">Security Alert Triage Agent</text>

  <!-- Description -->
  <text x="60" y="178" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">Triages alerts at scale using AI-driven</text>
  <text x="60" y="195" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">reasoning; identifies real attacks vs false</text>
  <text x="60" y="212" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">positives across supported workloads.</text>

  <!-- Capabilities -->
  <text x="60" y="240" font-family="Segoe UI, sans-serif" font-size="13" font-weight="600" fill="#2A446F">Key Capabilities:</text>

  <rect x="60" y="252" width="290" height="52" rx="6" fill="#F4F3F5" stroke="#0078D4" stroke-width="1" aria-label="Autonomous triage"/>
  <text x="75" y="272" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#091F2C">Autonomous Triage</text>
  <text x="75" y="290" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">No step-by-step human input required</text>

  <rect x="60" y="312" width="290" height="52" rx="6" fill="#F4F3F5" stroke="#0078D4" stroke-width="1" aria-label="Transparent rationale"/>
  <text x="75" y="332" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#091F2C">Transparent Rationale</text>
  <text x="75" y="350" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">NL reasoning and visual graphs</text>

  <rect x="60" y="372" width="290" height="52" rx="6" fill="#F4F3F5" stroke="#0078D4" stroke-width="1" aria-label="Learning from feedback"/>
  <text x="75" y="392" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#091F2C">Learning from Feedback</text>
  <text x="75" y="410" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">Tunes verdicts via analyst input</text>

  <!-- Key details -->
  <line x1="60" y1="436" x2="350" y2="436" stroke="#E8E6DF" stroke-width="1"/>
  <text x="60" y="456" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C"><tspan font-weight="600">Trigger:</tspan> Auto on new alert / email report</text>
  <text x="60" y="476" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C"><tspan font-weight="600">Plugin:</tspan> Defender XDR, Threat Intel</text>
  <text x="60" y="496" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C"><tspan font-weight="600">Identity:</tspan> Connected user context</text>

  <!-- License -->
  <rect x="60" y="514" width="290" height="48" rx="6" fill="#F4F3F5" stroke="#E8E6DF" stroke-width="1"/>
  <text x="205" y="535" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#091F2C">License</text>
  <text x="205" y="553" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">Defender for Office P2</text>

  <!-- Products -->
  <rect x="60" y="572" width="290" height="36" rx="6" fill="#0078D4" opacity="0.1"/>
  <text x="205" y="594" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#0078D4">Security Copilot + Defender for Office 365</text>

  <!-- Agent 2: Threat Intelligence Briefing Agent -->
  <rect x="390" y="120" width="330" height="505" rx="8" fill="#FFFFFF" stroke="#C73ECC" stroke-width="2" aria-label="Threat Intelligence Briefing Agent"/>
  <rect x="390" y="120" width="330" height="38" rx="8" fill="#C73ECC"/>
  <rect x="390" y="144" width="330" height="14" fill="#C73ECC"/>
  <text x="555" y="145" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="13" font-weight="600" fill="#FFFFFF">Threat Intelligence Briefing Agent</text>

  <!-- Description -->
  <text x="410" y="178" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">Generates threat intel briefings from latest</text>
  <text x="410" y="195" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">threat actor activity and vulnerability</text>
  <text x="410" y="212" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">information using dynamic automation.</text>

  <!-- Capabilities -->
  <text x="410" y="240" font-family="Segoe UI, sans-serif" font-size="13" font-weight="600" fill="#702573">Key Capabilities:</text>

  <rect x="410" y="252" width="290" height="52" rx="6" fill="#F4F3F5" stroke="#C73ECC" stroke-width="1" aria-label="Dynamic automation"/>
  <text x="425" y="272" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#091F2C">Dynamic Automation</text>
  <text x="425" y="290" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">Real-time prioritization of intel steps</text>

  <rect x="410" y="312" width="290" height="52" rx="6" fill="#F4F3F5" stroke="#C73ECC" stroke-width="1" aria-label="Deep generative AI"/>
  <text x="425" y="332" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#091F2C">Deep Generative AI</text>
  <text x="425" y="350" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">Threat intel knowledge and signals</text>

  <rect x="410" y="372" width="290" height="52" rx="6" fill="#F4F3F5" stroke="#C73ECC" stroke-width="1" aria-label="Digestible reports"/>
  <text x="425" y="392" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#091F2C">Digestible Reports</text>
  <text x="425" y="410" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">Technical info for various audiences</text>

  <!-- Key details -->
  <line x1="410" y1="436" x2="700" y2="436" stroke="#E8E6DF" stroke-width="1"/>
  <text x="410" y="456" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C"><tspan font-weight="600">Trigger:</tspan> Configured interval or manual</text>
  <text x="410" y="476" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C"><tspan font-weight="600">Plugin:</tspan> Threat Intel, EASM (optional)</text>
  <text x="410" y="496" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C"><tspan font-weight="600">Identity:</tspan> User account or agent identity</text>

  <!-- License -->
  <rect x="410" y="514" width="290" height="48" rx="6" fill="#F4F3F5" stroke="#E8E6DF" stroke-width="1"/>
  <text x="555" y="535" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#091F2C">License</text>
  <text x="555" y="553" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">Not applicable</text>

  <!-- Products -->
  <rect x="410" y="572" width="290" height="36" rx="6" fill="#C73ECC" opacity="0.1"/>
  <text x="555" y="594" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#C73ECC">Security Copilot</text>

  <!-- Agent 3: Threat Hunting Agent -->
  <rect x="740" y="120" width="330" height="505" rx="8" fill="#FFFFFF" stroke="#FF5C39" stroke-width="2" aria-label="Threat Hunting Agent"/>
  <rect x="740" y="120" width="330" height="38" rx="8" fill="#FF5C39"/>
  <rect x="740" y="144" width="330" height="14" fill="#FF5C39"/>
  <text x="905" y="145" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="13" font-weight="600" fill="#FFFFFF">Threat Hunting Agent</text>

  <!-- Description -->
  <text x="760" y="178" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">Conversational threat hunting using</text>
  <text x="760" y="195" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">natural language; transforms complex</text>
  <text x="760" y="212" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">data into actionable insights.</text>

  <!-- Capabilities -->
  <text x="760" y="240" font-family="Segoe UI, sans-serif" font-size="13" font-weight="600" fill="#73391D">Key Capabilities:</text>

  <rect x="760" y="252" width="290" height="44" rx="6" fill="#F4F3F5" stroke="#FF5C39" stroke-width="1" aria-label="Natural language answers"/>
  <text x="775" y="270" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#091F2C">NL to NL Answers</text>
  <text x="775" y="287" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">Ask in natural language, get answers + KQL</text>

  <rect x="760" y="304" width="290" height="44" rx="6" fill="#F4F3F5" stroke="#FF5C39" stroke-width="1" aria-label="Conversational flow"/>
  <text x="775" y="322" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#091F2C">Conversational Flow</text>
  <text x="775" y="339" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">Maintains context across follow-ups</text>

  <rect x="760" y="356" width="290" height="44" rx="6" fill="#F4F3F5" stroke="#FF5C39" stroke-width="1" aria-label="Observations and charts"/>
  <text x="775" y="374" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#091F2C">Observations</text>
  <text x="775" y="391" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">NL observations + pie/timeline charts</text>

  <rect x="760" y="408" width="290" height="44" rx="6" fill="#F4F3F5" stroke="#FF5C39" stroke-width="1" aria-label="Insight generation"/>
  <text x="775" y="426" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#091F2C">Insight Generation</text>
  <text x="775" y="443" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">Contextual insights from related sources</text>

  <rect x="760" y="460" width="290" height="44" rx="6" fill="#F4F3F5" stroke="#FF5C39" stroke-width="1" aria-label="Smart suggestions"/>
  <text x="775" y="478" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#091F2C">Smart Suggestions</text>
  <text x="775" y="495" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C">Follow-ups + remediation actions</text>

  <!-- Key details -->
  <line x1="760" y1="516" x2="1050" y2="516" stroke="#E8E6DF" stroke-width="1"/>
  <text x="760" y="536" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C"><tspan font-weight="600">Surface:</tspan> Advanced hunting in Defender</text>
  <text x="760" y="556" font-family="Segoe UI, sans-serif" font-size="12" fill="#091F2C"><tspan font-weight="600">Input:</tspan> Natural language queries</text>

  <!-- Products -->
  <rect x="760" y="572" width="290" height="36" rx="6" fill="#FF5C39" opacity="0.1"/>
  <text x="905" y="594" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#FF5C39">Security Copilot + Defender</text>
</svg>