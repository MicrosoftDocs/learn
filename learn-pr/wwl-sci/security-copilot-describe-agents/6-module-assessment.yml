quiz:
  title: Check your knowledge
  questions:

  - content: During agent setup in Microsoft Security Copilot, an administrator needs to choose an identity for the agent. What is the benefit of creating an agent identity using Microsoft Entra Agent ID, compared to connecting an existing user account?
    choices:
      - content: An agent identity inherits the user's full set of permissions, ensuring broader access to resources.
        isCorrect: false
        explanation: "Incorrect. Connecting an existing user account inherits the user's permissions. An agent identity is a dedicated identity with scoped, right-sized access specifically for the agent."
      - content: An agent identity provides a dedicated identity with scoped access that is easier to manage and retire independently of user accounts.
        isCorrect: true
        explanation: "Correct. Agent identities created through Microsoft Entra Agent ID provide unique identification for AI agents, keeping access scoped and secure, and can be managed and retired without affecting user accounts."
      - content: An agent identity eliminates the need for any permissions or role-based access controls on the agent.
        isCorrect: false
        explanation: "Incorrect. Agent identities still require appropriate permissions and role-based access controls. The benefit is that access is scoped specifically to the agent's tasks."

  - content: A security administrator wants to ensure that new users and applications in the organization are covered by appropriate Conditional Access policies. Which Microsoft Entra agent should they use?
    choices:
      - content: Access Review Agent
        isCorrect: false
        explanation: "Incorrect. The Access Review Agent helps reviewers make access decisions during access reviews. It does not monitor Conditional Access policy coverage for new users and applications."
      - content: Identity Risk Management Agent
        isCorrect: false
        explanation: "Incorrect. The Identity Risk Management Agent helps investigate potential identity risks. It does not focus on Conditional Access policy optimization."
      - content: Conditional Access Optimization Agent
        isCorrect: true
        explanation: "Correct. The Conditional Access Optimization Agent monitors for new users or applications not covered by existing Conditional Access policies, identifies gaps, and recommends improvements aligned with best practices and Zero Trust principles."

  - content: A security operations team needs to triage a high volume of user-reported phishing emails. Which Security Copilot agent in Microsoft Defender is designed for this scenario?
    choices:
      - content: Dynamic Threat Detection Agent
        isCorrect: false
        explanation: "Incorrect. The Dynamic Threat Detection Agent is an always-on service that uncovers hidden threats by correlating alerts, events, and threat intelligence. It is not designed for triaging user-reported phishing emails."
      - content: Threat Hunting Agent
        isCorrect: false
        explanation: "Incorrect. The Threat Hunting Agent enables investigation using natural language and KQL queries. It is not specifically designed for classifying user-reported phishing incidents."
      - content: Phishing Triage Agent
        isCorrect: true
        explanation: "Correct. The Phishing Triage Agent autonomously triages and classifies user-submitted phishing incidents, provides transparent rationale for its verdicts, and continuously improves based on analyst feedback."

  - content: Which Microsoft Purview agent helps security teams evaluate insider risk management alerts based on user risk, file risk, and activity risk?
    choices:
      - content: Alert Triage Agent in Data Loss Prevention
        isCorrect: false
        explanation: "Incorrect. The Alert Triage Agent in Data Loss Prevention evaluates DLP alerts based on sensitivity risk, exfiltration risk, and policy risk, not insider risk management alerts."
      - content: Triage Agent in Insider Risk Management
        isCorrect: true
        explanation: "Correct. The Triage Agent in Insider Risk Management evaluates alerts based on user risk, file risk, and activity risk, and sorts them into categories for the security team to review."
      - content: Conditional Access Optimization Agent
        isCorrect: false
        explanation: "Incorrect. The Conditional Access Optimization Agent is a Microsoft Entra agent that monitors and optimizes Conditional Access policies. It does not evaluate insider risk management alerts."

  - content: A developer wants to build a custom security agent using a conversational approach without writing code. Which method in Security Copilot best supports this?
    choices:
      - content: YAML Upload method
        isCorrect: false
        explanation: "Incorrect. The YAML Upload method requires creating a YAML manifest file, which is a code-first approach suited for developers who prefer programmatic control."
      - content: Natural Language Agent Creation (NL2Agent)
        isCorrect: true
        explanation: "Correct. NL2Agent allows you to build agents by describing what you want in conversational language, without requiring technical expertise. Security Copilot generates the agent configuration based on your natural language descriptions."
      - content: Model Context Protocol (MCP) tools
        isCorrect: false
        explanation: "Incorrect. MCP tools integrate with development environments like Visual Studio Code and are designed for developers who want to build agents within an IDE, rather than a no-code conversational experience."

