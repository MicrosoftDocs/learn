title: Describe identity concepts
summary: Learn about the key concepts of authentication and authorization, why identity is the new security perimeter, how identity providers enable modern authentication and single sign-on, the role of directory services and Microsoft Entra ID, and how federation extends trust across organizational boundaries.
abstract: |
  After completing this module, you'll be able to:
  - Define authentication and authorization and explain how they work together to control access.
  - Describe identity as the primary security perimeter and explain the four pillars of an identity infrastructure.
  - Describe the role of an identity provider and how modern authentication uses tokens and single sign-on.
  - Describe directory services, Active Directory Domain Services, and Microsoft Entra ID as its cloud evolution.
  - Describe the concept of federation and how trust relationships enable cross-organizational access.
prerequisites: |
  - General understanding of networking and cloud computing concepts.
  - General IT knowledge or any general experience working in an IT environment.
  - General understanding of Microsoft Azure and Microsoft 365.
