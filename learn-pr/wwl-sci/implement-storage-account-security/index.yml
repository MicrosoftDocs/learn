title: Implement security and manage access for Azure Storage
summary: Implement account-level security controls and access governance for Azure Storage. Configure secure transfer settings, choose appropriate authorization models, apply stored access policies for SAS lifecycle management, and enforce Shared Key disable using Azure Policy to protect storage accounts used by AI agents and enterprise workloads.
abstract: |
  After completing this module, you'll be able to:
    - Configure storage account security settings including secure transfer, minimum Transport Layer Security (TLS), and anonymous access controls
    - Select an appropriate authorization model for different access scenarios including managed identity for AI agent workloads
    - Create and manage stored access policies to control SAS token lifecycle
    - Disable Shared Key authorization and enforce compliance using Azure Policy
prerequisites: |
  - Familiarity with Azure Storage accounts
  - Understanding of Azure role-based access control (RBAC) and managed identities
  - Basic understanding of Microsoft Entra ID
