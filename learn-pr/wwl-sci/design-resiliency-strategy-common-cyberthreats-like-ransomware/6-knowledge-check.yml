### General guidance (https://review.learn.microsoft.com/learn-docs/docs/id-guidance-knowledge-check)
###  - Questions are complete sentences ending with a question mark
###  - No true/false questions
###  - 3 answers per question
###  - All answers about the same length
###  - Numeric answers listed in sorted order
###  - No "All of the above" and/or "None of the above" as answer choices
###  - No "Not" or "Except" in questions
###  - No second person ("you") in the questions or answers
###  - Provide a meaningful explanation for both correct and incorrect answers
###
###########################################################################
content: |
quiz:
    questions:
      - content: "Microsoft's ransomware protection guidance prioritizes Phase 1 (backup and recovery) before Phase 2 (limiting damage scope). What is the reason for this sequencing?"
        choices:
        - content: "Backup solutions are less expensive to implement than privileged access controls."
          isCorrect: false
          explanation: "Cost is not the reason for the sequencing. Phase 1 is prioritized because it addresses the most immediate monetary incentive ransomware attackers rely on."
        - content: "Restoring from backup eliminates the need to implement privileged access protection."
          isCorrect: false
          explanation: "The three phases are complementary, not substitutes for each other. Completing Phase 1 does not remove the need for Phases 2 and 3."
        - content: "Phase 1 removes the attackers' primary leverage by ensuring your organization can recover without paying a ransom."
          isCorrect: true
          explanation: "Phase 1 is designed to minimize the monetary incentive from attackers. If your organization can restore from immutable backups, the threat of encryption becomes far less effective as leverage for ransom payment."
        - content: "Phase 1 is the only phase that applies to organizations without cloud infrastructure."
          isCorrect: false
          explanation: "All three phases apply regardless of whether infrastructure is on-premises or in the cloud. Phase 1 is prioritized for urgency, not infrastructure type."
      - content: "A ransomware attacker has compromised a standard user account and is attempting to encrypt backup data stored in Azure Backup. Which feature specifically prevents the attacker from deleting or disabling backups using the compromised account's permissions?"
        choices:
        - content: "Azure Policy compliance scanning"
          isCorrect: false
          explanation: "Azure Policy monitors and reports compliance but does not prevent real-time backup deletion or modification by a compromised account."
        - content: "Multi-user authorization using Resource Guard"
          isCorrect: true
          explanation: "Multi-user authorization requires approval from multiple administrators before critical operations such as disabling soft delete or modifying backup policies can be performed. A single compromised account cannot complete these operations alone."
        - content: "Azure role-based access control (RBAC) at the subscription level"
          isCorrect: false
          explanation: "RBAC controls who can perform operations but does not add a multi-person approval gate. A single account with sufficient RBAC permissions could still disable backups without MUA."
        - content: "Geo-redundant backup storage"
          isCorrect: false
          explanation: "Geo-redundant storage protects against regional failures and data loss, but it does not prevent an authenticated user or attacker from deleting or disabling backup configurations."
      - content: "An organization uses a mix of Azure VMs, on-premises Windows servers connected via Azure Arc, and VMware machines. Which Azure Update Manager capability enables consistent patch management across all of these resources from a single management plane?"
        choices:
        - content: "Azure Policy guest configuration extension"
          isCorrect: false
          explanation: "Guest configuration is used for auditing and enforcing OS settings compliance, not for deploying security patches across hybrid and multicloud machines."
        - content: "Windows Server Update Services (WSUS) synchronization"
          isCorrect: false
          explanation: "WSUS is a traditional on-premises update server. While Azure Update Manager can refer to a WSUS repository, WSUS itself does not extend management to Azure VMs, Arc-enabled servers, and VMware machines from a single pane."
        - content: "Azure Arc integration with Azure Update Manager"
          isCorrect: true
          explanation: "Azure Arc onboards non-Azure machines — including on-premises servers and VMware VMs — into Azure management. Azure Update Manager then provides unified assessment, scheduling, and deployment of security updates across all Arc-enabled and native Azure resources from a single dashboard."
        - content: "Microsoft Defender for Cloud regulatory compliance dashboard"
          isCorrect: false
          explanation: "Defender for Cloud surfaces update compliance recommendations but is not the deployment mechanism for patches. Azure Update Manager handles the actual patching across hybrid and multicloud machines."