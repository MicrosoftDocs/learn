title: Configure auditing for Azure SQL Database and SQL Managed Instance
summary: Configure audit logging for Azure SQL Database and SQL Managed Instance to create tamper-resistant compliance records. Set audit action groups, route logs to Azure Monitor, Event Hubs, and immutable blob storage, and configure SQL Managed Instance–specific auditing to meet financial regulatory audit requirements.
abstract: |
  After completing this module, you'll be able to:
    - Describe Azure SQL auditing capabilities and select appropriate audit action groups
    - Configure audit log destinations for Azure SQL Database
    - Configure auditing for SQL Managed Instance
    - Design a compliant audit strategy using multiple log destinations
prerequisites: |
  - Familiarity with Microsoft Entra ID and Azure role-based access control (RBAC)
  - Understanding of Azure Monitor and Log Analytics at a conceptual level
  - Completion of Configure platform-level security for Azure SQL or equivalent experience
