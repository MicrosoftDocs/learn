quiz:
  title: "Check your knowledge"
  questions:
  - content: "The healthcare compliance team just upgraded to Microsoft 365 E5 to get access to `MailItemsAccessed`. A week later, they search for the physician's message-level access and get no records. What's the most likely cause?"
    choices:
    - content: "The upgrade is too recent. Audit (Premium) records take 30 days to start populating after a license change."
      isCorrect: false
      explanation: "Incorrect. Premium events start logging within 24 hours of Advanced Auditing being enabled on the user. The license upgrade itself doesn't enable per-user Advanced Auditing."
    - content: "`MailItemsAccessed` requires **Microsoft 365 Advanced Auditing** to be enabled per user, and the E5 upgrade alone doesn't turn it on automatically."
      isCorrect: true
      explanation: "Correct. Microsoft 365 E5, Office 365 E5, and E5 Compliance licensing include the Advanced Auditing service plan, but it isn't turned on automatically. Someone has to enable it per user, and records only exist from the enablement date forward."
    - content: "The team needs to purchase the **10-Year Audit Log Retention** add-on before Premium events start logging."
      isCorrect: false
      explanation: "Incorrect. The 10-Year Audit Log Retention add-on extends how long records are kept. It doesn't affect whether `MailItemsAccessed` records get created."
