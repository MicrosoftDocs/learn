quiz:
  title: "Check your knowledge"
  questions:
  - content: "The healthcare team creates a custom retention policy for Copilot audit records at priority 5, keeping them for 3 years. The default retention policy retains records for 1 year at priority 10. Where do Copilot records land?"
    choices:
    - content: "1 year, because higher priority numbers win."
      isCorrect: false
      explanation: "Incorrect. Priority numbering is inverted. Lower numbers win. Priority 5 beats priority 10."
    - content: "10 years, because Audit (Premium) applies the maximum retention across overlapping policies."
      isCorrect: false
      explanation: "Incorrect. Retention policies don't merge or take the maximum. Whichever policy wins on priority applies its own duration."
    - content: "3 years, because lower priority numbers win, so the custom policy overrides the default."
      isCorrect: true
      explanation: "Correct. Custom policies override the default for the records they cover. Lower priority numbers win, so the priority-5 custom policy applies its 3-year duration to Copilot records."
