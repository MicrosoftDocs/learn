quiz:
  title: "Check your knowledge"
  questions:
  - content: "During the physician's `MailItemsAccessed` investigation, several records show `IsThrottled` set to `True` inside the incident window. The team still needs to know which specific messages were opened during those hours. What's the practical next step?"
    choices:
    - content: "Wait 24 hours and rerun the search. Throttled bind events backfill after the throttling window ends."
      isCorrect: false
      explanation: "Incorrect. Throttled bind events don't backfill. Once the throttling window passes, the missing records don't reappear."
    - content: "Escalate to Microsoft support. Throttled `MailItemsAccessed` records are permanently lost with no recovery option."
      isCorrect: false
      explanation: "Incorrect. Support can't recover records that were never logged. The workable path is cross-referencing other logs to reconstruct the activity."
    - content: "Cross-reference the gap with **Exchange message trace** or **Microsoft Entra sign-in logs**. Throttled bind events don't backfill, so gaps have to be reconstructed from other sources."
      isCorrect: true
      explanation: "Correct. Exchange message trace and Microsoft Entra sign-in logs cover the activity from different angles. `SearchQueryInitiatedExchange` and `SearchQueryInitiatedSharePoint` aren't throttled, so they can help too when the question is what the user was searching for."
