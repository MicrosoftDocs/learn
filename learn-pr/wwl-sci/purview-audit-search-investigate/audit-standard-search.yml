quiz:
  title: "Check your knowledge"
  questions:
  - content: "You run an audit search for a physician's file downloads on last Wednesday and get zero results. You've confirmed auditing is enabled tenant-wide, the physician was active that day, and your account has the **Audit Reader** role. What's the next thing to check?"
    choices:
    - content: "Whether your date range is in UTC. Portal search interprets dates as UTC, and your local Wednesday might have started on Tuesday UTC."
      isCorrect: true
      explanation: "Correct. Portal results and `Search-UnifiedAuditLog` interpret dates as UTC. A local-time incident window that spans a day boundary can land outside your intended search range if you don't convert."
    - content: "Whether you have the **Organization Configuration** role, which is required to search file activity."
      isCorrect: false
      explanation: "Incorrect. **Audit Reader** covers searching audit logs. **Organization Configuration** is required for creating retention policies, not for search."
    - content: "Whether the tenant has Audit (Premium), because file download records require Premium."
      isCorrect: false
      explanation: "Incorrect. File downloads on SharePoint and OneDrive log to `SharePointFileOperation` with `FileDownloaded`, which is available in Audit (Standard)."
