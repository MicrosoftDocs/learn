quiz:
  title: "Check your knowledge"
  questions:
  - content: "The healthcare investigation returns roughly 200,000 `MailItemsAccessed` records the team needs to correlate with Microsoft Entra sign-in logs in Excel. The tenant has Audit (Premium). What's the practical export path?"
    choices:
    - content: "Export from the portal. A single Audit (Premium) export supports up to 1,000,000 rows."
      isCorrect: true
      explanation: "Correct. Audit (Premium) exports support up to 1,000,000 rows in a single portal export. 200,000 records fit comfortably. Audit (Standard) caps at 50,000 rows per export."
    - content: "Split the search into four smaller portal exports because a single portal export caps at 50,000 rows regardless of tier."
      isCorrect: false
      explanation: "Incorrect. The 50,000-row cap is the Audit (Standard) limit. Audit (Premium) supports up to 1,000,000 rows per export."
    - content: "Use `Search-UnifiedAuditLog` in PowerShell only. Portal exports are limited to 5,000 rows for all tenants."
      isCorrect: false
      explanation: "Incorrect. Portal exports handle the row counts described here. `Search-UnifiedAuditLog` returns a maximum of 5,000 rows per call and 100 by default, and needs the pagination pattern to go further. It's a scale and automation option, not the only path."
