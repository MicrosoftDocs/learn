quiz:
  title: "Check your knowledge"
  questions:
  - content: "The healthcare compliance team turned on Audit (Standard) six months ago and hasn't upgraded to Audit (Premium). They want to know whether a physician opened a specific patient email 30 days ago. What does the mental model of audit predict they'll find?"
    choices:
    - content: "The record will be there. Standard covers Exchange mailbox activity across the tenant."
      isCorrect: false
      explanation: "Incorrect. Standard records many Exchange activities like mailbox folder access and message deletion, but not which specific messages a user opened. That level of detail comes from `MailItemsAccessed` in Audit (Premium)."
    - content: "The record won't be there because Standard's retention window is only 30 days for mailbox activity."
      isCorrect: false
      explanation: "Incorrect. Standard retention is 180 days by default, or one year for Microsoft Entra ID, Exchange, SharePoint, and OneDrive with a Microsoft 365 E5 or equivalent license. Thirty days ago is well inside that window. The gap is the event type, not the retention."
    - content: "The record won't be there because message-level opens come from `MailItemsAccessed`, an Audit (Premium) event."
      isCorrect: true
      explanation: "Correct. `MailItemsAccessed` is a high-value Audit (Premium) event. Without Premium, Standard doesn't record which specific messages a user opened."
