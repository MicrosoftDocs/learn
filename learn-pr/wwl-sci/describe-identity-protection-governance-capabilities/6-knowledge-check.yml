content: |
  [!include[](includes/6-knowledge-check.md)]
quiz:
  title: "Check your knowledge"
  questions:
  - content: "Your organization implemented important changes in their customer facing web-based applications. You want to ensure that any user who wishes to access these applications agrees to the legal disclaimers. Which Microsoft Entra feature should you implement?"
    choices:
    - content: "Entitlement management."
      isCorrect: false
      explanation: "Incorrect. Entitlement management automates access request workflows, access assignments, reviews, and expiration but doesn't address the business requirement for users to agree to terms of use."
    - content: "Microsoft Entra terms of use."
      isCorrect: true
      explanation: "Correct. Microsoft Entra terms of use presents information to users before they access data and can be configured to require users to accept the terms of use."
    - content: "Identity Protection."
      isCorrect: false
      explanation: "Incorrect. Identity Protection is a tool that allows organizations to detect, investigate, and remediate identity-based risks."

  - content: "An organization recently conducted a security audit and found that four people who left the organization were still active and assigned global admin roles. The users are now deleted but the IT organization needs to recommend a solution to prevent a similar security lapse happening in future. Which solution should they recommend?"
    choices:
    - content: "Entitlement management."
      isCorrect: false
      explanation: "Incorrect. Entitlement management automates access request workflows, access assignments, reviews, and expiration but doesn't specifically address the risk of excessive privileged access."
    - content: "Privileged Identity Management."
      isCorrect: true
      explanation: "Correct. Privileged Identity Management provides just-in-time and time-bound privileged access, mitigating the risks of excessive, unnecessary, or misused access permissions."
    - content: "Identity Protection."
      isCorrect: false
      explanation: "Incorrect. Identity Protection helps detect identity-based risks but doesn't directly manage the assignment of privileged roles."

  - content: "Your IT organization recently discovered that several user accounts in the finance department are compromised. The CTO wants a solution to reduce the impact of compromised user accounts. Which Microsoft Entra feature should they recommend?"
    choices:
    - content: "Microsoft Entra ID Protection."
      isCorrect: true
      explanation: "Correct. Microsoft Entra ID Protection helps organizations detect, investigate, and remediate identity-based risks, including user risk and sign-in risk."
    - content: "Conditional Access."
      isCorrect: false
      explanation: "Incorrect. Conditional Access policies are used to enforce organizational rules for access but don't provide the risk detection and investigation capabilities that Identity Protection does."
    - content: "Entitlement management."
      isCorrect: false
      explanation: "Incorrect. Entitlement management automates access to the applications and data needed for someone to be productive in a particular project or role."

  - content: "An organization is project-oriented with employees often working on more than one project at a time. Each project requires access to different sets of applications and resources. Which Microsoft Entra feature is best suited to managing user access in this scenario?"
    choices:
    - content: "Microsoft Entra terms of use."
      isCorrect: false
      explanation: "Incorrect. Microsoft Entra terms of use presents information to users before they access data but doesn't manage access rights to resources."
    - content: "Identity Protection."
      isCorrect: false
      explanation: "Incorrect. Identity Protection detects, investigates, and remediates identity-based risks but doesn't manage access assignments."
    - content: "Entitlement management."
      isCorrect: true
      explanation: "Correct. Entitlement management is well suited to handling project-based access needs. It uses access packages to bundle resources for a project and automates access requests, assignments, reviews, and expiration."
