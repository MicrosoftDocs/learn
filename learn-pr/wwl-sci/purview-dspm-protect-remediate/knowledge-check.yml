quiz:
  title: "Check your knowledge"
  questions:
  - content: "The Prevent oversharing objective flags several SharePoint sites with anonymous sharing links on sensitive files. The admin needs to fix specific overshared items on those sites. Which remediation approach fits?"
    choices:
    - content: "Create a one-click data loss prevention (dDLP) policy from the objective workflow."
      isCorrect: false
      explanation: "Incorrect: A one-click DLP policy applies broad rules across locations. It prevents future violations but doesn't remediate specific items already overshared."
    - content: "Run a custom data risk assessment with item-level scanning for the affected sites."
      isCorrect: true
      explanation: "Correct: Item-level scanning identifies each overshared file and provides targeted actions like removing sharing links or applying labels to individual items."
    - content: "Apply an autolabeling policy through the sensitivity label workflow."
      isCorrect: false
      explanation: "Incorrect: Autolabeling adds labels based on content patterns but doesn't remove existing sharing links or address current oversharing."
  - content: "Before applying a one-click DLP policy, the impact prediction shows it would affect 95% of sensitive files across the organization. The objective's risk indicator only flags exfiltration through one unmonitored pathway. What should the admin do?"
    choices:
    - content: "Apply the policy because broad coverage is always better."
      isCorrect: false
      explanation: "Incorrect: A policy affecting 95% of files when the gap is one pathway creates unnecessary disruption. Scope should match the identified risk."
    - content: "Narrow the policy conditions to align with the specific gap the objective identified."
      isCorrect: true
      explanation: "Correct: When predicted scope far exceeds the actual risk, tightening conditions avoids disruption while still closing the gap."
    - content: "Ignore the prediction because it's only an estimate."
      isCorrect: false
      explanation: "Incorrect: Impact predictions exist as a decision checkpoint. Dismissing them risks creating overly broad policies that disrupt legitimate workflows."
  - content: "Two weeks after applying a one-click DLP policy through the Prevent exfiltration objective, the outcome card shows minimal improvement. What's the best next step?"
    choices:
    - content: "Delete the policy and create a broader one."
      isCorrect: false
      explanation: "Incorrect: Deleting removes whatever protection the policy does provide. Diagnose first, then adjust."
    - content: "Compare the policy's scope against the objective's risk indicators to check whether it targets the right gap."
      isCorrect: true
      explanation: "Correct: Minimal improvement after two weeks usually means a scope mismatch or a complementary gap the policy doesn't address. Evaluate alignment before changing anything."
    - content: "Wait another two weeks because policies need 30 days to show results."
      isCorrect: false
      explanation: "Incorrect: Outcome cards reflect changes as policies take effect. Two weeks with no movement is a meaningful signal, not normal delay."
  - content: "A custom data risk assessment with item-level scanning finds a file containing highly sensitive financial data shared via anonymous external link. Which remediation combination is most appropriate?"
    choices:
    - content: "Remove the sharing link and apply a sensitivity label."
      isCorrect: true
      explanation: "Correct: Removing the link stops the immediate exposure. Applying a label ensures ongoing protection through label-based DLP and access controls."
    - content: "Notify the site owner and resolve the item as not at risk."
      isCorrect: false
      explanation: "Incorrect: Resolving a highly sensitive file with anonymous external access as 'not at risk' ignores active exposure. Direct action is warranted here."
    - content: "Create a retention policy to delete the file after its retention period."
      isCorrect: false
      explanation: "Incorrect: Retention addresses lifecycle, not immediate exposure. The anonymous link stays active until the file is deleted, leaving sensitive data accessible."
