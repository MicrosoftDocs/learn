title: Protect and remediate sensitive data in Microsoft Purview
summary: Use Data Security Posture Management (DSPM) objectives and remediation workflows to protect sensitive data across the data estate. Select appropriate protection approaches, configure one-click policies for DLP, sensitivity labels, and Insider Risk Management, and assess and remediate oversharing risks.
abstract: |
  After completing this module, you'll be able to:
  - Select appropriate remediation approaches based on DSPM data security objective risk indicators
  - Configure and apply one-click policies for DLP, sensitivity labels, and Insider Risk Management through DSPM objective workflows
  - Measure remediation progress and manage independent remediation actions
  - Assess and remediate oversharing risks using default and custom data risk assessments
prerequisites: |
  - Familiarity with the Microsoft Purview portal and its navigation
  - Working knowledge of sensitivity labels and information protection policies
  - Working knowledge of data loss prevention (DLP) policies and concepts
  - Working knowledge of Insider Risk Management concepts
  - Understanding of DSPM's purpose and ability to interpret posture metrics and risk signals
