title: Protect Azure Key Vault with Microsoft Defender for Cloud
summary: Protect Azure Key Vault with Microsoft Defender for Cloud. Use Defender CSPM agentless secret scanning to discover exposed credentials across virtual machines (VMs) and cloud deployments, enable Microsoft Defender for Key Vault to detect malicious access patterns, and respond effectively to Key Vault security alerts.
abstract: |
  After completing this module, you're able to:
    - Use Defender CSPM agentless scanning to discover secrets exposed on virtual machines and cloud deployments
    - Enable Microsoft Defender for Key Vault and identify its threat detection capabilities
    - Investigate and respond to Microsoft Defender for Key Vault security alerts
prerequisites: |
  - Azure Key Vault deployed with access controls and diagnostic logging configured
  - Microsoft Defender for Cloud enabled in your Azure subscription
  - Understanding of Microsoft Defender for Cloud plans and security recommendations
