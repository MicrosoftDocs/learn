title: Assess data security posture in Microsoft Purview
summary: Assess your organization's data security posture using Data Security Posture Management (DSPM) in Microsoft Purview. Interpret posture metrics and security objectives on the DSPM dashboard, then discover where specific gaps exist across the data estate using AI observability, asset explorer, and reports.
abstract: |
  After completing this module, you'll be able to:
  - Describe how Data Security Posture Management (DSPM) consolidates DLP, information protection, Insider Risk Management, and Data Security Investigations into a unified posture view
  - Interpret key posture metrics and trending data on the DSPM dashboard
  - Evaluate data security objectives to prioritize the gaps that pose the most risk
  - Discover AI apps and agents with sensitive interactions using AI observability
  - Assess classification and labeling coverage using asset explorer
  - Track posture changes over time using DSPM reports
prerequisites: |
  - Familiarity with the Microsoft Purview portal and its navigation
  - Working knowledge of sensitivity labels and information protection policies
  - Working knowledge of data loss prevention (DLP) policies and concepts
  - Working knowledge of Insider Risk Management concepts
  - Basic understanding of data classification with sensitive information types and trainable classifiers
