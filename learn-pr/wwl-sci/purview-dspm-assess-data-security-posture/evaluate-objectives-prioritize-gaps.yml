  title: Evaluate Data Security Objectives and Prioritize Gaps
  description: "Learn to evaluate data security objectives, interpret risk indicators and outcome metrics, and prioritize the security gaps that pose the most risk."
  ms.date: 04/29/2026
  author: wwlpublish
  ms.author: riswinto
