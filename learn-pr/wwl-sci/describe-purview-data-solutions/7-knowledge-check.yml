content: |
quiz:
  questions:

  - content: "As part of a new data loss prevention policy, the compliance admin needs to be able to identify important information such as credit card numbers, across the organization's data. How can the admin address this requirement?"
    choices:
    - content: "Use activity explorer."
      isCorrect: false
      explanation: "Incorrect. ​​​Activity explorer provides visibility into what content has been discovered and labeled, and where that content is. Instead, use sensitive information types to identify sensitive information like credit card numbers.​​​"
    - content: "Use sensitivity labels."
      isCorrect: false
      explanation: "Incorrect. Sensitivity labels enable you to apply to content like emails and documents, much like different stamps can be applied to physical documents. Instead, use sensitive information types to identify specific types of information such as credit card numbers.​​​​​​"
    - content: "Use sensitive information types."
      isCorrect: true
      explanation: "​​​Correct. Microsoft provides built-in sensitive information types that you can use to identify data such as credit card numbers.​​"
  
  - content: "Within the organization, some emails are confidential and should be encrypted so that only authorized users can read them. How can this requirement be implemented?"
    choices:
    - content: "Use the content explorer."
      isCorrect: false
      explanation: "Incorrect. Content explorer enables admins to get a current snapshot of individual items that have been classified across the organization. Instead, use sensitivity labels to help ensure that emails can only be decrypted only by users authorized by the label's encryption settings.​​​"
    - content: "Use sensitivity labels."
      isCorrect: true
      explanation: "​​​Correct. Sensitivity labels help ensure that emails can only be decrypted only by users authorized by the label's encryption settings.​​​"
    - content: "Use records management."
      isCorrect: false
      explanation: "​​​Incorrect. You don't use record management to encrypt emails. Instead, use sensitivity labels to help ensure that emails can only be decrypted by users authorized by the label's encryption settings.​​​"

  - content: "The compliance admin for the organization wants to explain the importance of insider risk management, to the business leaders.  What use case would apply?"
    choices:
    - content: "To identify and protect against risks like an employee sharing confidential information."
      isCorrect: true
      explanation: "Correct. Insider risk management helps organizations detect, investigate, and act on risky activities such as an employee sharing confidential data, data theft by departing users, or unintentional data leaks."
    - content: "To identify and protect against malicious software across your network, such as ransomware."
      isCorrect: false
      explanation: "Incorrect. Defending against malicious software like ransomware is the role of endpoint security tools such as Microsoft Defender for Endpoint. Insider risk management focuses on identifying and responding to risks from within the organization, such as an employee sharing confidential information."
    - content: "To identify and protect against devices shutting down at critical moments."
      isCorrect: false
      explanation: "Incorrect. Device availability and reliability are infrastructure concerns handled outside of insider risk management. Insider risk management focuses on detecting and responding to risky or malicious activities by people within the organization."

  - content: "An organization wants its DLP controls to automatically tighten for users identified as high-risk by Insider Risk Management, without requiring admins to manually update policies. Which capability should the organization configure?"
    choices:
    - content: "Sensitivity label policies."
      isCorrect: false
      explanation: "Incorrect. Sensitivity label policies control which users can see and apply sensitivity labels. They don't automatically adjust DLP controls based on insider risk levels. Adaptive protection is the feature that dynamically connects insider risk levels to DLP policies."
    - content: "Adaptive protection."
      isCorrect: true
      explanation: "Correct. Adaptive protection dynamically assigns DLP policies, data lifecycle management policies, and Conditional Access policies to users based on their current insider risk level—automatically tightening controls for high-risk users and relaxing them when risk decreases."
    - content: "Trainable classifiers."
      isCorrect: false
      explanation: "Incorrect. Trainable classifiers are used to identify types of content for classification. They don't adjust DLP controls based on insider risk. Adaptive protection is the feature that connects insider risk levels to DLP and other protective controls."

  - content: "An organization needs a unified view of its sensitive data risks across Microsoft 365, Azure, and third-party platforms like Google Cloud Platform. The organization also wants to monitor how AI apps interact with sensitive data. Which Microsoft Purview solution provides this capability?"
    choices:
    - content: "Content explorer."
      isCorrect: false
      explanation: "Incorrect. Content explorer provides a snapshot of classified items in your organization, but it doesn't provide unified posture management across Microsoft and non-Microsoft environments or AI observability. Data Security Posture Management provides those capabilities."
    - content: "Data Security Posture Management."
      isCorrect: true
      explanation: "Correct. Data Security Posture Management provides unified visibility into data risks across Microsoft 365, Azure, Fabric, and third-party SaaS platforms. It includes AI observability dashboards that monitor how AI apps and agents interact with sensitive data."
    - content: "Insider Risk Management."
      isCorrect: false
      explanation: "Incorrect. Insider Risk Management focuses on detecting, investigating, and acting on risky activities by users within the organization. Data Security Posture Management is the solution that provides a unified view of data risks across your entire digital estate, including AI interactions."
