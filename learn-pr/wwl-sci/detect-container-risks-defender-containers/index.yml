title: Detect container risks using Microsoft Defender for Containers
summary: Detect misconfigurations and runtime risks across container workloads using Microsoft Defender for Containers. Enable and configure the Defender for Containers plan, and assess container image vulnerabilities in Azure Container Registry. Then respond to runtime threat alerts and security posture recommendations for Azure Kubernetes Service (AKS) clusters.
abstract: |
  After completing this module, you can:
    - Describe the architecture and protection pillars of Microsoft Defender for Containers
    - Enable and configure the Defender for Containers plan in Microsoft Defender for Cloud
    - Evaluate container image vulnerability findings from Azure Container Registry (ACR) scanning
    - Interpret runtime threat alerts and security posture recommendations for AKS clusters
prerequisites: |
  - Familiarity with Azure networking concepts including virtual networks and subnets
  - Understanding of Azure role-based access control (RBAC) and managed identities
  - Familiarity with Microsoft Defender for Cloud at a foundational level
  - Basic understanding of container concepts and Azure Kubernetes Service
