title: Investigate data security risks with Microsoft Purview DSPM
summary: Investigate data security risks by using DSPM to analyze activity signals, trace risky user and AI agent behavior, govern AI-driven alert triage and automated actions, and use Security Copilot to prioritize and respond to the most critical data security events.
abstract: |
  After completing this module, you will be able to:
  - Analyze sensitive data activity across activity explorer, audit logs, and DSPM reports
  - Investigate data security events using Security Copilot in DSPM
  - Evaluate and govern AI-driven alert triage for DLP and Insider Risk Management
  - Investigate risky AI agent behavior through AI observability
prerequisites: |
  - Familiarity with the Microsoft Purview portal and its navigation
  - Working knowledge of sensitivity labels and information protection policies
  - Working knowledge of data loss prevention (DLP) policies and concepts
  - Working knowledge of Insider Risk Management concepts
  - Understanding of DSPM's purpose and ability to interpret posture metrics and risk signals
  - Understanding of how DSPM security objectives and remediation workflows create protection policies
