title: Describe the security management capabilities in Azure
summary: Learn about Microsoft Defender for Cloud and the capabilities it brings together to protect your cloud through security policies, standards, recommendations, secure score, enhanced workload protection plans, and AI security capabilities.
abstract: |
  After completing this module, you'll be able to:
  - Describe Microsoft Defender for Cloud, its core pillars, and its AI security capabilities.
  - Describe how security policies, standards, and recommendations improve cloud security posture.
  - Describe cloud security posture management (CSPM) and the features available through Defender CSPM.
  - Describe the enhanced security features provided through Microsoft Defender plans and cloud workload protection.
  - Describe DevOps security management capabilities in Microsoft Defender for Cloud.
prerequisites: |
  - General understanding of networking and cloud computing concepts.
  - General IT knowledge or any general experience working in an IT environment.
  - General understanding of Microsoft Azure and Microsoft 365.
