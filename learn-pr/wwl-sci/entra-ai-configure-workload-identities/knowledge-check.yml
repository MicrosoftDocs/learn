uid: learn.wwl.entra-ai-configure-workload-identities.knowledge-check
title: Module assessment
metadata:
  title: Module Assessment
  description: "Knowledge check"
  ms.date: 04/14/2026
  author: riswinto
  ms.author: riswinto
  ms.topic: unit
  module_assessment: true
  ai_generated_module_assessment: false
durationInMinutes: 5
quiz:
  title: "Check your knowledge"
  questions:
  - content: "An AI workload runs on Azure App Service and uses a client secret to authenticate. The workload is stable and the secret won't expire for six months. What should the administrator do?"
    choices:
    - content: "Keep the client secret since it's working and not yet expired"
      isCorrect: false
      explanation: "A working credential isn't the same as the right credential. App Service supports managed identity, which eliminates the secret entirely."
    - content: "Replace the client secret with a managed identity on the App Service resource"
      isCorrect: true
      explanation: "The hosting environment supports managed identity, so the secret is unnecessary. Replacing it removes a credential that must be tracked, rotated, and protected."
    - content: "Add a certificate credential alongside the secret for redundancy"
      isCorrect: false
      explanation: "Adding a second credential increases the management surface without addressing the core issue. Managed identity eliminates both."
  - content: "A workload running on a Kubernetes cluster outside Azure needs app-only access to Microsoft Graph. The cluster has an OIDC issuer configured. What credential approach should the administrator use?"
    choices:
    - content: "Create a client secret on the app registration and store it in a Kubernetes secret"
      isCorrect: false
      explanation: "The cluster supports OIDC tokens, so federation is available. Storing a client secret introduces a credential that could be eliminated."
    - content: "Configure workload identity federation using the cluster's OIDC issuer"
      isCorrect: true
      explanation: "The cluster's OIDC issuer enables federation, which eliminates stored secrets by exchanging the external token for a Microsoft Entra token."
    - content: "Enable a managed identity on the Kubernetes cluster"
      isCorrect: false
      explanation: "Managed identities are for Azure-hosted resources. A cluster outside Azure can't use an Azure-managed identity directly."
  - content: "An AI workload needs to read secrets from Azure Key Vault at runtime. Which role assignment follows least-privilege principles?"
    choices:
    - content: "Key Vault Administrator assigned at the resource group level"
      isCorrect: false
      explanation: "Key Vault Administrator grants full management over keys, certificates, and vault settings, which is far broader than read access to secrets."
    - content: "Key Vault Secrets User assigned at the individual vault level"
      isCorrect: true
      explanation: "Key Vault Secrets User provides read-only access to secrets, and scoping to the individual vault limits access to the specific resource the workload needs."
    - content: "Key Vault Secrets Officer assigned at the subscription level"
      isCorrect: false
      explanation: "Secrets Officer adds write and delete capabilities the workload doesn't need, and subscription-level scope expands access beyond the relevant vault."
  - content: "After configuring an AI workload identity, an administrator confirms the workload can sign in and access its target resources. What additional validation step is needed before the workload goes into production?"
    choices:
    - content: "Review the enterprise application's permissions and Azure role assignments to confirm they match the documented workload requirements"
      isCorrect: true
      explanation: "A successful sign-in doesn't prove the permission scope is correct. Reviewing permissions confirms the identity holds only the access its task requires."
    - content: "Grant the identity Contributor access at the subscription level to ensure it has sufficient permissions for future needs"
      isCorrect: false
      explanation: "Granting broad permissions to prevent future access issues violates least-privilege principles and increases blast radius."
    - content: "Remove all conditional access policies targeting the identity so authentication is not blocked"
      isCorrect: false
      explanation: "Conditional access policies provide security controls that should remain in place. Removing them to avoid sign-in issues weakens access protection."
  - content: "An administrator rotates a certificate credential but the workload fails to authenticate with the new certificate. The old certificate is still on the app registration. What should the administrator do next?"
    choices:
    - content: "Remove the old certificate to force the workload to use the new one"
      isCorrect: false
      explanation: "Removing the working credential while the new one fails would cause a complete authentication outage."
    - content: "Revert the workload to the old certificate and troubleshoot why the new certificate fails"
      isCorrect: true
      explanation: "The old certificate is still valid. Reverting restores authentication while the administrator investigates the failure without downtime."
    - content: "Create a client secret as a temporary fallback until the certificate issue is resolved"
      isCorrect: false
      explanation: "Introducing a weaker credential type creates a new risk. The old certificate is still valid and available as the immediate fallback."
