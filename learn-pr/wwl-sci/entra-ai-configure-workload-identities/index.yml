title: Set up AI workload identities in Microsoft Entra
summary: Configure credentials and least-privilege access for AI workload identities, then create agent identities from blueprints with the right permissions and accountability in Microsoft Entra.
abstract: |
  After completing this module, you will be able to:
  - Recognize the setup choices that create security risk for AI workload identities.
  - Select and configure the appropriate credential pattern for an AI workload identity based on where the workload runs.
  - Apply least-privilege access by right-sizing Azure RBAC, Microsoft Graph permissions, and app roles.
  - Explain how agent identity blueprints govern creation, credentials, and token exchange for agent identities.
  - Assign owners, sponsors, and managers to establish accountability for agent identities.
prerequisites: |
  - Working knowledge of Microsoft Entra ID service principals, app registrations, and managed identities.
  - Familiarity with Azure RBAC role assignments and Microsoft Graph application permissions.
  - Basic understanding of workload identity federation concepts.
