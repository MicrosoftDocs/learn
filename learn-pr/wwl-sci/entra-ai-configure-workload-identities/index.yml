title: Configure identities and permissions for AI workloads
summary: Configure AI workload identities with secure credential models, assign least-privilege permissions across Azure RBAC and Microsoft Graph, secure access to common AI workload dependencies, and validate the configuration before the workload goes into production.
abstract: |
  After completing this module, you will be able to:
  - Identify setup decisions that create lasting security risk for AI workload identities.
  - Configure the right credential type for an AI workload based on its hosting environment.
  - Assign least-privilege permissions across Azure RBAC, Microsoft Graph, and app roles.
  - Select the correct roles for Key Vault, Azure AI services, storage, and downstream APIs.
  - Validate the identity configuration and plan credential maintenance before production.
prerequisites: |
  - Working knowledge of Microsoft Entra ID service principals, app registrations, and managed identities.
  - Familiarity with Azure RBAC role assignments and Microsoft Graph application permissions.
  - Basic understanding of workload identity federation concepts.
