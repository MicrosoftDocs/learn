title: Experience Security Copilot through guided simulations
summary: "Explore use cases of Microsoft Security Copilot in the standalone and embedded experiences through interactive guides covering prompts, promptbooks, Microsoft Purview, and Microsoft Defender XDR."
abstract: |
  After completing this module, you'll be able to:
  - Configure owner settings in Microsoft Security Copilot.
  - Use prompts and promptbooks to investigate security scenarios.
  - Create a custom promptbook to streamline repeatable investigation workflows.
  - Use Security Copilot in Microsoft Purview to investigate data protection activity, insider risks, DLP alerts, and unlabeled sensitive content.
  - Use Security Copilot in Microsoft Defender XDR to investigate security incidents and analyze artifacts.
  - Explore and create agents in Security Copilot.
  - Review Conditional Access Optimization Agent activity and suggestions.
prerequisites: |
  - Working knowledge of security operations and incident response
  - Working knowledge of Microsoft Security solutions and services
  - Completion of the module [Describe Microsoft Security Copilot](/training/modules/security-copilot-getting-started/)
  - Completion of the module [Describe the core features of Microsoft Security Copilot](/training/modules/security-copilot-describe-core-features/)
  - Completion of the module [Describe the embedded experiences of Microsoft Security Copilot](/training/modules/security-copilot-embedded-experiences/)
