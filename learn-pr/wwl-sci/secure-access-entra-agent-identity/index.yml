title: Secure access for Microsoft Entra Agent Identity
summary: Apply Conditional Access controls to AI agent identities in Microsoft Entra Agent Identity. Map how agents authenticate, configure policies that enforce access conditions, and manage the agent identity lifecycle to reduce risk from compromised or over-privileged agents.
abstract: |
  After completing this module, you can:
  - Map how AI agents authenticate and identify where Conditional Access applies
  - Configure Conditional Access policies scoped to agent identities
  - Control agent access, and manage agent identity lifecycle events
prerequisites: |
  - Completion of Introduction to Microsoft Entra Agent Identity module on Learn
  - Understanding of Microsoft Entra Conditional Access policy structure
  - Familiarity with Microsoft Entra ID authentication concepts
