title: Implement Microsoft Defender for Databases
summary: Enable Microsoft Defender for Databases to detect SQL injection, anomalous query patterns, and vulnerability exposures across Azure SQL services. Enable protection at subscription scope using Azure Policy, configure vulnerability assessment baselines, and route security alerts to the security operations team.
abstract: |
  After completing this module, you'll be able to:
    - Describe Microsoft Defender for Databases plans and threat detection capabilities
    - Enable Defender for Azure SQL Databases at subscription scope
    - Enable Defender for open-source relational databases
    - Configure vulnerability assessment to establish security baselines for Azure SQL
    - Configure alert routing to deliver Defender detections to the security operations team
prerequisites: |
  - Familiarity with Microsoft Defender for Cloud at a conceptual level
  - Understanding of Azure subscription and resource management
  - Completion of Configure platform-level security for Azure SQL or equivalent experience
