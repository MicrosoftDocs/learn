title: Investigate data security risks with Microsoft Purview Data Security Posture Management
summary: Investigate data security risks by using DSPM to analyze activity signals, identify risky user and AI agent behavior, and use Security Copilot to prioritize critical data security events.
abstract: |
  After completing this module, you'll be able to:
  - Analyze sensitive data activity across activity explorer, audit logs, and DSPM reports
  - Investigate data security events using Security Copilot in DSPM
  - Investigate risky AI agent behavior through AI observability
prerequisites: |
  - Familiarity with the Microsoft Purview portal and its navigation
  - Working knowledge of sensitivity labels, data loss prevention (DLP) policies, and Insider Risk Management concepts
