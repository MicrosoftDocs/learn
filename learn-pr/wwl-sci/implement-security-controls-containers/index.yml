title: Implement security controls for Azure Container Registry, Container Instances, and Container Apps
summary: Implement security controls across Azure Container Registry, Azure Container Instances, and Azure Container Apps. Configure RBAC, private endpoints, and content trust for ACR; apply managed identities and virtual network integration for Container Instances; and enforce ingress controls, managed identities, and secrets management for Container Apps environments.
abstract: |
  After completing this module, you can:
    - Implement access controls and network isolation for Azure Container Registry
    - Configure security controls for Azure Container Instances workloads
    - Apply ingress controls, managed identity, and secrets management for Azure Container Apps
prerequisites: |
  - Working knowledge of container fundamentals including images, registries, and container runtimes
  - Understanding of Azure role-based access control (RBAC) and managed identities
  - Familiarity with Azure Virtual Network and private endpoint concepts
  - Basic understanding of Defender for Containers capabilities (covered in a previous module in this learning path)
