title: Configure DLP policies for Microsoft Defender for Cloud Apps and Power Platform
summary: Learn how to configure and implement data loss prevention policies for Power Platform connectors and non-Microsoft cloud apps through Microsoft Defender for Cloud Apps.
abstract: |
  After completing this module, you're able to:
  - Configure DLP policies in Power Platform to control connector communication.
  - Integrate DLP with Microsoft Defender for Cloud Apps for non-Microsoft cloud apps.
  - Create and configure file policies in Defender for Cloud Apps.
prerequisites: |
  - Basic knowledge of data loss prevention in Microsoft 365
  - Basic knowledge of Microsoft Defender for Cloud Apps
  - Basic knowledge of Power Platform
