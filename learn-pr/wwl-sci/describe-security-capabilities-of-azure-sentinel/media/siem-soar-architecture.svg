<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" font-family="Segoe UI, Arial, sans-serif">
  <rect width="960" height="620" fill="#ffffff"/>

  <!-- Title -->
  <text x="480" y="38" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a1a">SIEM &amp; SOAR Architecture</text>

  <!-- DATA SOURCES column -->
  <text x="100" y="75" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a1a">Data Sources</text>

  <rect x="30" y="90" width="140" height="40" rx="6" fill="#e8e8e8" stroke="#555555" stroke-width="1.5"/>
  <text x="100" y="115" text-anchor="middle" font-size="12" fill="#1a1a1a">Firewalls</text>

  <rect x="30" y="140" width="140" height="40" rx="6" fill="#e8e8e8" stroke="#555555" stroke-width="1.5"/>
  <text x="100" y="165" text-anchor="middle" font-size="12" fill="#1a1a1a">Servers</text>

  <rect x="30" y="190" width="140" height="40" rx="6" fill="#e8e8e8" stroke="#555555" stroke-width="1.5"/>
  <text x="100" y="215" text-anchor="middle" font-size="12" fill="#1a1a1a">Identity Systems</text>

  <rect x="30" y="240" width="140" height="40" rx="6" fill="#e8e8e8" stroke="#555555" stroke-width="1.5"/>
  <text x="100" y="265" text-anchor="middle" font-size="12" fill="#1a1a1a">Applications</text>

  <rect x="30" y="290" width="140" height="40" rx="6" fill="#e8e8e8" stroke="#555555" stroke-width="1.5"/>
  <text x="100" y="315" text-anchor="middle" font-size="12" fill="#1a1a1a">Endpoints</text>

  <rect x="30" y="340" width="140" height="40" rx="6" fill="#e8e8e8" stroke="#555555" stroke-width="1.5"/>
  <text x="100" y="365" text-anchor="middle" font-size="12" fill="#1a1a1a">Cloud Services</text>

  <!-- Arrows from sources to SIEM -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#444444"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#0058a3"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#1a7a3a"/>
    </marker>
  </defs>

  <line x1="170" y1="110" x2="235" y2="180" stroke="#444444" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="170" y1="160" x2="235" y2="195" stroke="#444444" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="170" y1="210" x2="235" y2="210" stroke="#444444" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="170" y1="260" x2="235" y2="225" stroke="#444444" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="170" y1="310" x2="235" y2="240" stroke="#444444" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="170" y1="360" x2="235" y2="255" stroke="#444444" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- SIEM Box -->
  <rect x="240" y="88" width="260" height="310" rx="10" fill="#dce8f5" stroke="#0058a3" stroke-width="2"/>
  <rect x="240" y="88" width="260" height="36" rx="10" fill="#0058a3"/>
  <rect x="240" y="108" width="260" height="16" fill="#0058a3"/>
  <text x="370" y="112" text-anchor="middle" font-size="16" font-weight="bold" fill="#ffffff">SIEM</text>

  <!-- SIEM capabilities -->
  <rect x="260" y="138" width="220" height="36" rx="5" fill="#ffffff" stroke="#0058a3" stroke-width="1"/>
  <text x="370" y="161" text-anchor="middle" font-size="13" fill="#1a1a1a">Log Aggregation</text>

  <rect x="260" y="184" width="220" height="36" rx="5" fill="#ffffff" stroke="#0058a3" stroke-width="1"/>
  <text x="370" y="207" text-anchor="middle" font-size="13" fill="#1a1a1a">Correlation</text>

  <rect x="260" y="230" width="220" height="36" rx="5" fill="#ffffff" stroke="#0058a3" stroke-width="1"/>
  <text x="370" y="253" text-anchor="middle" font-size="13" fill="#1a1a1a">Alerting</text>

  <rect x="260" y="276" width="220" height="36" rx="5" fill="#ffffff" stroke="#0058a3" stroke-width="1"/>
  <text x="370" y="299" text-anchor="middle" font-size="13" fill="#1a1a1a">Incident Creation</text>

  <rect x="260" y="322" width="220" height="36" rx="5" fill="#ffffff" stroke="#0058a3" stroke-width="1"/>
  <text x="370" y="345" text-anchor="middle" font-size="13" fill="#1a1a1a">Centralized Visibility</text>

  <!-- Arrow from SIEM to SOAR -->
  <line x1="500" y1="200" x2="555" y2="200" stroke="#0058a3" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <text x="528" y="190" text-anchor="middle" font-size="11" fill="#0058a3" font-weight="bold">Alerts</text>

  <!-- SOAR Box -->
  <rect x="560" y="88" width="260" height="310" rx="10" fill="#dff0e3" stroke="#1a7a3a" stroke-width="2"/>
  <rect x="560" y="88" width="260" height="36" rx="10" fill="#1a7a3a"/>
  <rect x="560" y="108" width="260" height="16" fill="#1a7a3a"/>
  <text x="690" y="112" text-anchor="middle" font-size="16" font-weight="bold" fill="#ffffff">SOAR</text>

  <!-- SOAR capabilities -->
  <rect x="580" y="138" width="220" height="36" rx="5" fill="#ffffff" stroke="#1a7a3a" stroke-width="1"/>
  <text x="690" y="161" text-anchor="middle" font-size="13" fill="#1a1a1a">Orchestration</text>

  <rect x="580" y="184" width="220" height="36" rx="5" fill="#ffffff" stroke="#1a7a3a" stroke-width="1"/>
  <text x="690" y="207" text-anchor="middle" font-size="13" fill="#1a1a1a">Automation</text>

  <!-- Playbook sub-box -->
  <rect x="580" y="234" width="220" height="126" rx="5" fill="#ffffff" stroke="#1a7a3a" stroke-width="1.5"/>
  <text x="690" y="255" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a1a">Playbook</text>

  <!-- Playbook steps as a flow -->
  <rect x="596" y="264" width="188" height="24" rx="4" fill="#eaf5ec" stroke="#1a7a3a" stroke-width="0.75"/>
  <text x="690" y="281" text-anchor="middle" font-size="11" fill="#1a1a1a">1. Disable Account</text>

  <rect x="596" y="292" width="188" height="24" rx="4" fill="#eaf5ec" stroke="#1a7a3a" stroke-width="0.75"/>
  <text x="690" y="309" text-anchor="middle" font-size="11" fill="#1a1a1a">2. Notify Team</text>

  <rect x="596" y="320" width="188" height="24" rx="4" fill="#eaf5ec" stroke="#1a7a3a" stroke-width="0.75"/>
  <text x="690" y="337" text-anchor="middle" font-size="11" fill="#1a1a1a">3. Open Ticket</text>

  <rect x="596" y="348" width="188" height="6" rx="3" fill="#1a7a3a" opacity="0.3"/>

  <!-- Bottom: Combined benefits -->
  <rect x="240" y="430" width="580" height="170" rx="10" fill="#f5f0e0" stroke="#8a6d00" stroke-width="2"/>
  <rect x="240" y="430" width="580" height="36" rx="10" fill="#8a6d00"/>
  <rect x="240" y="450" width="580" height="16" fill="#8a6d00"/>
  <text x="530" y="454" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffffff">SIEM + SOAR Combined Benefits</text>

  <!-- Benefit items -->
  <circle cx="275" cy="490" r="6" fill="#8a6d00"/>
  <text x="290" y="495" font-size="13" fill="#1a1a1a">Single source of security data &amp; context</text>

  <circle cx="275" cy="520" r="6" fill="#8a6d00"/>
  <text x="290" y="525" font-size="13" fill="#1a1a1a">Faster detection-to-containment response</text>

  <circle cx="275" cy="550" r="6" fill="#8a6d00"/>
  <text x="290" y="555" font-size="13" fill="#1a1a1a">Consistent, repeatable processes — reduced human error</text>

  <circle cx="275" cy="580" r="6" fill="#8a6d00"/>
  <text x="290" y="585" font-size="13" fill="#1a1a1a">Analysts freed for complex investigations</text>

  <!-- Arrows down to benefits -->
  <line x1="370" y1="398" x2="430" y2="425" stroke="#0058a3" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <line x1="690" y1="398" x2="630" y2="425" stroke="#1a7a3a" stroke-width="2" marker-end="url(#arrow-green)"/>

</svg>