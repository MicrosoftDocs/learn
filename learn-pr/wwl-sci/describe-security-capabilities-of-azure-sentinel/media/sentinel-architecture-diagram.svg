<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1220 860" width="1220" height="860" role="img" aria-label="Architecture diagram of Microsoft Sentinel showing SIEM capabilities (Collect, Detect, Investigate, Respond) and Platform components (Data Lake, Graph, MCP Server)">
  <title>Microsoft Sentinel Architecture Diagram</title>
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#005da6"/>
      <stop offset="100%" style="stop-color:#004578"/>
    </linearGradient>
    <linearGradient id="siemGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f7fd"/>
      <stop offset="100%" style="stop-color:#e3f0fa"/>
    </linearGradient>
    <linearGradient id="platformGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f4f9ee"/>
      <stop offset="100%" style="stop-color:#e8f3dc"/>
    </linearGradient>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#005da6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1220" height="860" fill="#ffffff"/>

  <!-- Title Banner -->
  <rect x="30" y="20" width="1160" height="64" rx="8" fill="url(#headerGrad)" filter="url(#shadow)"/>
  <text x="610" y="60" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#ffffff">Microsoft Sentinel Architecture</text>

  <!-- SIEM Section -->
  <rect x="30" y="105" width="1160" height="310" rx="10" fill="url(#siemGrad)" stroke="#005da6" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="30" y="105" width="1160" height="42" rx="10" fill="#005da6"/>
  <rect x="30" y="137" width="1160" height="10" fill="#005da6"/>
  <text x="610" y="134" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="19" font-weight="700" fill="#ffffff">SIEM — Unified Threat Visibility</text>

  <!-- SIEM: Collect -->
  <rect x="55" y="162" width="260" height="230" rx="8" fill="#ffffff" stroke="#005da6" stroke-width="1.2" filter="url(#shadow)"/>
  <circle cx="185" cy="196" r="22" fill="#005da6"/>
  <text x="185" y="204" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="19" font-weight="700" fill="#ffffff">1</text>
  <text x="185" y="238" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700" fill="#1a1a1a">Collect</text>
  <text x="185" y="266" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#2d2d2d">350+ data connectors</text>
  <text x="185" y="288" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#2d2d2d">Microsoft &amp; non-Microsoft</text>
  <text x="185" y="310" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#2d2d2d">AWS, GCP, on-premises</text>
  <text x="185" y="332" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#2d2d2d">Data normalization</text>
  <text x="185" y="368" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#3a3a3a" font-style="italic">Cloud-scale ingestion</text>

  <!-- Arrow 1→2 -->
  <path d="M320 280 L333 280" stroke="#005da6" stroke-width="2.5" marker-end="url(#arrowBlue)"/>

  <!-- SIEM: Detect -->
  <rect x="338" y="162" width="260" height="230" rx="8" fill="#ffffff" stroke="#005da6" stroke-width="1.2" filter="url(#shadow)"/>
  <circle cx="468" cy="196" r="22" fill="#005da6"/>
  <text x="468" y="204" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="19" font-weight="700" fill="#ffffff">2</text>
  <text x="468" y="238" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700" fill="#1a1a1a">Detect</text>
  <text x="468" y="266" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#2d2d2d">Analytics rules &amp; AI</text>
  <text x="468" y="288" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#2d2d2d">Minimize false positives</text>
  <text x="468" y="310" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#2d2d2d">Alerts → Incidents</text>
  <text x="468" y="332" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#2d2d2d">Automated grouping</text>
  <text x="468" y="368" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#3a3a3a" font-style="italic">AI-powered detection</text>

  <!-- Arrow 2→3 -->
  <path d="M603 280 L616 280" stroke="#005da6" stroke-width="2.5" marker-end="url(#arrowBlue)"/>

  <!-- SIEM: Investigate -->
  <rect x="621" y="162" width="260" height="230" rx="8" fill="#ffffff" stroke="#005da6" stroke-width="1.2" filter="url(#shadow)"/>
  <circle cx="751" cy="196" r="22" fill="#005da6"/>
  <text x="751" y="204" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="19" font-weight="700" fill="#ffffff">3</text>
  <text x="751" y="238" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700" fill="#1a1a1a">Investigate</text>
  <text x="751" y="266" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#2d2d2d">AI-assisted tools</text>
  <text x="751" y="288" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#2d2d2d">Proactive threat hunting</text>
  <text x="751" y="310" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#2d2d2d">Full attack scope</text>
  <text x="751" y="332" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#2d2d2d">Root cause analysis</text>
  <text x="751" y="368" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#3a3a3a" font-style="italic">Deep investigation</text>

  <!-- Arrow 3→4 -->
  <path d="M886 280 L899 280" stroke="#005da6" stroke-width="2.5" marker-end="url(#arrowBlue)"/>

  <!-- SIEM: Respond -->
  <rect x="904" y="162" width="260" height="230" rx="8" fill="#ffffff" stroke="#005da6" stroke-width="1.2" filter="url(#shadow)"/>
  <circle cx="1034" cy="196" r="22" fill="#005da6"/>
  <text x="1034" y="204" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="19" font-weight="700" fill="#ffffff">4</text>
  <text x="1034" y="238" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700" fill="#1a1a1a">Respond</text>
  <text x="1034" y="266" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#2d2d2d">Orchestration &amp; automation</text>
  <text x="1034" y="288" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#2d2d2d">Rapid incident response</text>
  <text x="1034" y="310" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#2d2d2d">Limit threat impact</text>
  <text x="1034" y="332" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#2d2d2d">No manual intervention</text>
  <text x="1034" y="368" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#3a3a3a" font-style="italic">Built-in SOAR</text>

  <!-- Connector between sections -->
  <path d="M610 420 L610 450" stroke="#2d2d2d" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="610" y="472" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#2d2d2d" font-style="italic">Powered by</text>

  <!-- Platform Section -->
  <rect x="30" y="490" width="1160" height="330" rx="10" fill="url(#platformGrad)" stroke="#0b6a0b" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="30" y="490" width="1160" height="42" rx="10" fill="#0b6a0b"/>
  <rect x="30" y="522" width="1160" height="10" fill="#0b6a0b"/>
  <text x="610" y="519" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="19" font-weight="700" fill="#ffffff">Platform — Extensible Security Foundation</text>

  <!-- Platform: Data Lake -->
  <rect x="55" y="548" width="350" height="248" rx="8" fill="#ffffff" stroke="#0b6a0b" stroke-width="1.2" filter="url(#shadow)"/>
  <rect x="55" y="548" width="350" height="38" rx="8" fill="#0b6a0b"/>
  <rect x="55" y="578" width="350" height="8" fill="#0b6a0b"/>
  <text x="230" y="574" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff">Data Lake</text>

  <!-- Data Lake icon -->
  <ellipse cx="100" cy="618" rx="18" ry="9" fill="none" stroke="#0b6a0b" stroke-width="2"/>
  <path d="M82 618 L82 640 Q100 654 118 640 L118 618" fill="none" stroke="#0b6a0b" stroke-width="2"/>

  <text x="134" y="620" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#1a1a1a" font-weight="600">Unified Storage</text>
  <text x="134" y="640" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#2d2d2d">M365, Defender, Azure, Entra ID,</text>
  <text x="134" y="658" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#2d2d2d">Purview, Intune, AWS, GCP</text>

  <text x="75" y="692" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#1a1a1a" font-weight="600">• Multi-modal Analytics</text>
  <text x="90" y="712" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#2d2d2d">KQL, graph, AI notebooks</text>

  <text x="75" y="744" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#1a1a1a" font-weight="600">• Cost-efficient Retention</text>
  <text x="90" y="764" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#2d2d2d">Long-term storage at scale</text>

  <!-- Platform: Graph -->
  <rect x="435" y="548" width="350" height="248" rx="8" fill="#ffffff" stroke="#0b6a0b" stroke-width="1.2" filter="url(#shadow)"/>
  <rect x="435" y="548" width="350" height="38" rx="8" fill="#0b6a0b"/>
  <rect x="435" y="578" width="350" height="8" fill="#0b6a0b"/>
  <text x="610" y="574" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff">Graph</text>

  <!-- Graph icon - nodes and edges -->
  <circle cx="475" cy="624" r="7" fill="#0b6a0b"/>
  <circle cx="502" cy="607" r="7" fill="#0b6a0b"/>
  <circle cx="496" cy="646" r="7" fill="#0b6a0b"/>
  <line x1="475" y1="624" x2="502" y2="607" stroke="#0b6a0b" stroke-width="1.5"/>
  <line x1="475" y1="624" x2="496" y2="646" stroke="#0b6a0b" stroke-width="1.5"/>
  <line x1="502" y1="607" x2="496" y2="646" stroke="#0b6a0b" stroke-width="1.5"/>

  <text x="520" y="620" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#1a1a1a" font-weight="600">Relationship Modeling</text>
  <text x="520" y="640" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#2d2d2d">Assets, identities, activities,</text>
  <text x="520" y="658" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#2d2d2d">threat intelligence</text>

  <text x="455" y="692" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#1a1a1a" font-weight="600">• Attack Path Analysis</text>
  <text x="470" y="712" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#2d2d2d">Trace threat lateral movement</text>

  <text x="455" y="744" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#1a1a1a" font-weight="600">• Interconnected Reasoning</text>
  <text x="470" y="764" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#2d2d2d">Beyond isolated table searches</text>

  <!-- Platform: MCP Server -->
  <rect x="815" y="548" width="350" height="248" rx="8" fill="#ffffff" stroke="#0b6a0b" stroke-width="1.2" filter="url(#shadow)"/>
  <rect x="815" y="548" width="350" height="38" rx="8" fill="#0b6a0b"/>
  <rect x="815" y="578" width="350" height="8" fill="#0b6a0b"/>
  <text x="990" y="574" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff">MCP Server</text>

  <!-- MCP icon - chat bubble -->
  <rect x="850" y="604" width="32" height="24" rx="5" fill="none" stroke="#0b6a0b" stroke-width="2"/>
  <path d="M861 628 L866 637 L871 628" fill="none" stroke="#0b6a0b" stroke-width="2"/>
  <line x1="857" y1="613" x2="876" y2="613" stroke="#0b6a0b" stroke-width="1.5"/>
  <line x1="857" y1="620" x2="872" y2="620" stroke="#0b6a0b" stroke-width="1.5"/>

  <text x="894" y="620" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#1a1a1a" font-weight="600">Natural Language Interface</text>
  <text x="894" y="640" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#2d2d2d">Security teams &amp; AI agents</text>
  <text x="894" y="658" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#2d2d2d">interact via natural language</text>

  <text x="835" y="692" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#1a1a1a" font-weight="600">• No Schema Knowledge Needed</text>
  <text x="850" y="712" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#2d2d2d">No custom coding required</text>

  <text x="835" y="744" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#1a1a1a" font-weight="600">• AI-driven Operations</text>
  <text x="850" y="764" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#2d2d2d">Customized automation faster</text>

  <!-- Footer: Access Point -->
  <text x="610" y="845" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#1a1a1a">Access via Microsoft Defender portal — unified security operations experience</text>
</svg>