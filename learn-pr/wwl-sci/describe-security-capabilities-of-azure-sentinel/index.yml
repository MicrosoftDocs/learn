title: Describe security capabilities of Microsoft Sentinel
summary: Learn about Microsoft Sentinel—a scalable, cloud-native security information and event management (SIEM) and security orchestration, automation, and response (SOAR) solution. Explore how AI and machine learning capabilities help security teams detect, investigate, and respond to threats. You'll also be introduced to Microsoft Security Copilot and how it integrates with Microsoft Sentinel.
abstract: |
  After completing this module, you'll be able to:
  - Define the concepts of SIEM and SOAR, and describe the role of AI in modern security operations.
  - Describe how Microsoft Sentinel provides threat detection and mitigation capabilities.
  - Describe Microsoft Security Copilot and how it integrates with Microsoft Sentinel.
prerequisites: |
  - General understanding of networking and cloud computing concepts.
  - General IT knowledge or any general experience working in an IT environment.
  - General understanding of Microsoft Azure and Microsoft 365.
