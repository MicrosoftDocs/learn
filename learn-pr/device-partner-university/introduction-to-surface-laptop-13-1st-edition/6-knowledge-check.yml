title: Knowledge check
metadata:
  title: Knowledge Check
  description: This content is part of the "Introduction to Microsoft Surface Laptop for Business, 13-inch (1st Edition)" module.
  ms.date: 05/19/2026
  author: ozahran7
  ms.author: v-zahranomar
