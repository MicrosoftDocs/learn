summary: >2+
  Modern organizations need to support flexible work styles for all kinds of employees while maintaining security and manageability. In this module, you’ll explore what Windows 365 is, how it delivers cloud‑based Windows desktops, and how to decide if it’s the right solution for your organization’s workforce needs.
abstract: |2+
  By the end of this module, you'll be able to:
  - Evaluate whether Windows 365 is appropriate for delivering cloud‑based Windows desktops in common organizational scenarios.
  - Describe how Windows 365 hosts, streams, and manages Cloud PC desktops for end users.
