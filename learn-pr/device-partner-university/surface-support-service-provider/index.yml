uid: learn.dpu.surface-support-service-provider
title: Managing Surface support as a service provider or partner
metadata:
  title: Managing Surface Support As A Service Provider Or Partner
  description: 'In this module, you''ll learn how to manage Surface support as a service provider or partner. You''ll understand the different partner access models for Surface support and how to use a customer''s tenant or a partner tenant to manage Surface support. You''ll also learn how to manage multiple customer tenants safely and understand partner boundaries and escalation paths.'
  ms.date: 04/20/2026
  author: ozahran7
  ms.author: v-zahranomar
  ms.topic: module
  ms.service: surface
summary: >
  This module provides guidance on managing Surface support as a service provider or partner, including understanding partner access models, using customer or partner tenants, managing multiple customer tenants safely, and understanding partner boundaries and escalation paths.

abstract: |
  By the end of this module, you'll be able to:
  - Understand the different partner access models for Surface support.
  - Use a customer’s tenant to manage Surface support.
  - Use a partner tenant to manage Surface support.
  - Manage multiple customer tenants safely.
  - Understand partner boundaries and escalation paths.

prerequisites: |
