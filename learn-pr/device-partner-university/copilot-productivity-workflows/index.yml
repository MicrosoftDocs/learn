uid: learn.dpu.copilot-productivity-workflows
title: Copilot for all the ways you work
metadata:
  title: Copilot for all the ways you work
  description: >
    In this module, you'll learn how to use Microsoft 365 Copilot to boost your productivity across Microsoft 365 apps. You'll learn how to find action items with Word, analyze data with Excel, and communicate effectively with Outlook and Teams. By the end of this module, you'll have the skills and knowledge to use Copilot to complete tasks from start to finish across Microsoft 365 apps.
  ms.date: 05/20/2026
  author: ozahran7
  ms.author: v-zahranomar
  ms.topic: module
  ms.service: microsoft-365
summary: >
