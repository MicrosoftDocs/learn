summary: >
  Explore how Arm on Microsoft Surface devices delivers long battery life, efficient performance, and broad app compatibility, enabling modern business productivity.

abstract: |
  In this module, you'll learn:
  - What Arm on Microsoft Surface is and how it differs from traditional x86 architecture.
  - How Surface devices with ARM processors work to provide efficient performance and long battery life.
  - When to use Surface devices with Arm for your business needs.
