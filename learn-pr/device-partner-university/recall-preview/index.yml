title: Retrace your steps with Recall (preview)
metadata:
  title: Retrace Your Steps With Recall (preview)
  description: In this module, you'll learn how to use Recall (preview) to find previously viewed content using natural language and timeline browsing. You'll also learn to identify when it’s most useful and how it helps reduce time spent retracing steps.
  ms.date: 06/15/2026
  author: Stephanie-Rosenzweig
  ms.author: v-stephanier
  ms.topic: module
  ms.service: windows-11
summary: >
  Learn how to use Recall (preview) to find previously viewed content using natural language and timeline browsing. Identify when it’s most useful and how it helps reduce time spent retracing steps.
abstract: |
  By the end of this module, you’ll be able to:
  - Describe what Recall (preview) is and how it works on supported devices
  - Use Recall (preview) to find previously viewed content using natural language
  - Identify when Recall (preview) can save time by helping retrace past activity
  - Explain how Recall (preview) stores and manages data locally on the device
prerequisites: |
  - None
