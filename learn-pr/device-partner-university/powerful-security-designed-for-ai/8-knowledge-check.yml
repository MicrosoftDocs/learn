### YamlMime:ModuleUnit
uid: learn.dpu.powerful-security-ai.knowledge-check
title: Knowledge check
metadata:
  title: Knowledge Check
  description: This content is part of the "Secure on-device AI with Copilot+ PCs" module.
  ms.date: 08/05/2025
  author: hhreyes21
  ms.author: v-homerreyes
  ms.topic: unit
durationInMinutes: 3
quiz:
  title: Check your knowledge
  questions:
  - content: "How do Copilot+ PCs help secure AI-powered experiences?"
    choices:
        - content: "By sending all AI data to the cloud for centralized processing"
          isCorrect: false
          explanation: "Incorrect. Copilot+ PCs prioritize on-device AI processing to reduce data exposure."
        - content: "By integrating hardware security, on-device AI processing, and built-in protections across the platform"
          isCorrect: true
          explanation: "Correct. Copilot+ PCs combine hardware, OS, and AI protections to secure AI experiences."
        - content: "By relying only on third-party security software"
          isCorrect: false
          explanation: "Incorrect. Security is built into the platform, not dependent on third-party tools."
        - content: "By disabling local processing to prevent data access"
          isCorrect: false
          explanation: "Incorrect. Local processing is a key part of how Copilot+ PCs protect data."

  - content: "What is the key benefit of on-device AI processing in Copilot+ PCs?"
    choices:
        - content: "All data is automatically backed up to the cloud"
          isCorrect: false
          explanation: "Incorrect. On-device AI focuses on local processing, not automatic cloud storage."
        - content: "AI workloads are processed locally, helping reduce latency and data exposure"
          isCorrect: true
          explanation: "Correct. Local processing improves performance while keeping sensitive data on the device."
        - content: "AI features require a constant internet connection to function"
          isCorrect: false
          explanation: "Incorrect. Many AI features can run locally without relying on the cloud."
        - content: "AI processing replaces the need for device security"
          isCorrect: false
          explanation: "Incorrect. AI processing works alongside built-in security protections."

  - content: "How can IT administrators manage AI experiences on Copilot+ PCs?"
    choices:
        - content: "By using separate tools designed only for AI workloads"
          isCorrect: false
          explanation: "Incorrect. AI is managed using existing tools, not separate systems."
        - content: "By manually configuring each device without centralized control"
          isCorrect: false
          explanation: "Incorrect. Centralized management tools are used to scale control."
        - content: "By using tools like Microsoft Intune and Microsoft Entra ID to apply policies and controls"
          isCorrect: true
          explanation: "Correct. AI experiences can be governed using the same tools used to manage devices and identities."
        - content: "By disabling AI features entirely across all devices"
          isCorrect: false
          explanation: "Incorrect. AI features can be configured and governed, not just disabled."

  - content: "How do Copilot+ PCs and Microsoft 365 Copilot work together to support secure AI?"
    choices:
        - content: "Copilot+ PCs only support cloud-based AI experiences"
          isCorrect: false
          explanation: "Incorrect. Copilot+ PCs support both on-device and cloud-based AI."
        - content: "Both rely on the same cloud processing model for all data"
          isCorrect: false
          explanation: "Incorrect. On-device AI and cloud AI use different processing models."
        - content: "On-device AI processes data locally, while Microsoft 365 Copilot applies enterprise data protection in the cloud"
          isCorrect: true
          explanation: "Correct. Copilot+ PCs and Microsoft 365 Copilot provide a combined approach to secure AI across device and cloud."
        - content: "They operate independently with no shared security or governance model"
          isCorrect: false
          explanation: "Incorrect. Both are governed using consistent security and management frameworks."

