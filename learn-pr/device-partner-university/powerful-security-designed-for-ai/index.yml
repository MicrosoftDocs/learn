title: Secure on-device AI with Copilot+ PCs
metadata:
  title: Secure On-Device AI with Copilot+ PCs
  description: Learn how Copilot+ PCs integrate hardware-backed security, Windows 11 Pro protections, and on-device AI processing to help organizations protect data, identities, and devices.
  ms.date: 05/06/2026
  author: hhreyes21
  ms.author: v-homerreyes
  ms.topic: module
  ms.service: windows-11
  ms.custom: CW052024-5
summary: >
  This module explores how Copilot+ PCs secure AI-powered experiences by integrating hardware-backed protections, Windows 11 Pro security, and on-device AI processing. You learn how organizations can adopt AI with built-in security, privacy, and management controls across devices and cloud services.
abstract: |
  By the end of this module, you are able to:
  - Describe how Copilot+ PCs integrate hardware-backed security and AI acceleration to protect data and identities
  - Explain how Windows 11 Pro security features protect data, identities, and devices
  - Summarize how Microsoft Pluton and Windows Hello Enhanced Sign-in Security protect credentials and device integrity
  - Describe how on-device AI experiences support privacy and align with Zero Trust principles
  - Identify how IT administrators can govern on-device AI experiences using existing management tools
prerequisites: |
  - None
