  ms.service: windows-11
summary: >
  Explore how to secure AI agents and AI-powered workloads on Windows. Learn how identity, governance, policy controls, containment, monitoring, and development lifecycle security practices help reduce risk while enabling AI agents to access data, interact with systems, and perform approved actions.
abstract: | 
  By the end of this module, you'll be able to:
  - Describe the differences between AI agents and AI experiences that primarily generate responses.
  - Identify security risks introduced by AI agents and how they can be mitigated.
  - Explain how identity, governance, policy controls, and containment strategies help protect AI-powered applications while enabling agents to operate safely.

