title: Secure AI agents and workloads on Windows
metadata:
  title: Secure AI Agents And Workloads On Windows
  description: Explore how to secure AI agents and AI-powered workloads on Windows. Learn how identity, governance, policy controls, containment, monitoring, and development lifecycle security practices help reduce risk while enabling AI agents to access data, interact with systems, and perform approved actions.
  ms.date: 07/23/2026
  author: hhreyes21
  ms.author: v-homerreyes
