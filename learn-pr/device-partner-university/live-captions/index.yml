title: Use Live Captions in Windows to better understand audio
metadata:
  title: Use Live Captions In Windows To Better Understand Audio
  description: In this module, you'll learn how Live Captions helps you follow spoken content in real time, making it easier to stay productive and access information in various environments and accessibility scenarios.
  ms.date: 06/15/2026
  author: Stephanie-Rosenzweig
  ms.author: v-stephanier
  ms.topic: module
  ms.service: windows-11
summary: >
  Learn how Live Captions helps you follow spoken content in real time, making it easier to stay productive and access information in various environments and accessibility scenarios.
abstract: |
  By the end of this module, you’ll be able to: 

  - Turn on and use Live Captions across different scenarios
  - Explain how Live Captions work in Windows
  - Customize caption appearance and positioning
  - Identify when to use Live Captions to improve understanding and productivity
