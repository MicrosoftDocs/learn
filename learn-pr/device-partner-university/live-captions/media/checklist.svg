<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="600" height="400" fill="#FFFFFF"/>

  <!-- Definitions -->
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Main Card -->
  <rect x="40" y="30" width="520" height="340"
        rx="20"
        fill="#FFFFFF"
        filter="url(#shadow)"/>

  <!-- Accent Bar -->
  <rect x="40" y="30" width="520" height="8"
        rx="20"
        fill="#0078D4"/>

  <!-- Content -->
  <g transform="translate(75,75)">

    <!-- Title -->
    <text x="0" y="0"
          font-family="Segoe UI, Arial, sans-serif"
          font-size="22"
          font-weight="600"
          fill="#323130">
      Audio sources supported by Live Captions
    </text>

    <!-- Subtitle -->
    <text x="0" y="28"
          font-family="Segoe UI, Arial, sans-serif"
          font-size="14"
          fill="#605E5C">
      Capture audio directly from your device and environment
    </text>

    <!-- Item 1 -->
    <g transform="translate(0,48)">
      <circle cx="14" cy="14" r="14" fill="#DFF6DD"/>
      <path d="M9 14 L13 18 L20 10"
            stroke="#107C10"
            stroke-width="2.5"
            fill="none"
            stroke-linecap="round"
            stroke-linejoin="round"/>
      <text x="42" y="19"
            font-family="Segoe UI, Arial, sans-serif"
            font-size="15"
            fill="#323130">
        Videos and streaming content
      </text>
    </g>

    <!-- Item 2 -->
    <g transform="translate(0,98)">
      <circle cx="14" cy="14" r="14" fill="#DFF6DD"/>
      <path d="M9 14 L13 18 L20 10"
            stroke="#107C10"
            stroke-width="2.5"
            fill="none"
            stroke-linecap="round"
            stroke-linejoin="round"/>
      <text x="42" y="19"
            font-family="Segoe UI, Arial, sans-serif"
            font-size="15"
            fill="#323130">
        Virtual meetings and calls
      </text>
    </g>

    <!-- Item 3 -->
    <g transform="translate(0,148)">
      <circle cx="14" cy="14" r="14" fill="#DFF6DD"/>
      <path d="M9 14 L13 18 L20 10"
            stroke="#107C10"
            stroke-width="2.5"
            fill="none"
            stroke-linecap="round"
            stroke-linejoin="round"/>
      <text x="42" y="19"
            font-family="Segoe UI, Arial, sans-serif"
            font-size="15"
            fill="#323130">
        Audio files and applications
      </text>
    </g>

    <!-- Item 4 -->
    <g transform="translate(0,198)">
      <circle cx="14" cy="14" r="14" fill="#DFF6DD"/>
      <path d="M9 14 L13 18 L20 10"
            stroke="#107C10"
            stroke-width="2.5"
            fill="none"
            stroke-linecap="round"
            stroke-linejoin="round"/>
      <text x="42" y="19"
            font-family="Segoe UI, Arial, sans-serif"
            font-size="15"
            fill="#323130">
        Microphone input for in-person conversations
      </text>
    </g>

  </g>

</svg>