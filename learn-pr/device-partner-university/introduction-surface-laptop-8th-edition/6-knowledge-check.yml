durationInMinutes: 5
quiz:
  title: Check your knowledge
  questions:
  - content: "What is the primary purpose of Surface Laptop for Business (8th Edition)?"
    choices:
        - content: "To serve as a gaming-focused device with high-end graphics capabilities"
          isCorrect: false
          explanation: "Incorrect. The device is designed for business users and productivity scenarios, not gaming."
        - content: "To help business users complete tasks efficiently with combined hardware, software, and AI capabilities"
          isCorrect: true
          explanation: "Correct. The module explains that the device combines hardware, software, AI features, and connectivity to help business users complete tasks efficiently."
        - content: "To provide a low-cost alternative to consumer laptops"
          isCorrect: false
          explanation: "Incorrect. The content doesn't position the device based on cost; it focuses on performance and business value."
        - content: "To replace all cloud-based computing with on-device processing"
          isCorrect: false
          explanation: "Incorrect. While it supports on-device AI, it doesn't replace cloud-based computing entirely."
  - content: "Which hardware feature enables on-device AI experiences on Surface Laptop for Business (8th Edition)?"
    choices:
        - content: "Dedicated Neural Processing Unit (NPU) with up to 50 TOPS"
          isCorrect: true
          explanation: "Correct. The processors include an NPU capable of 50 trillion operations per second to enable on-device AI experiences."
        - content: "Integrated GPU designed for cloud rendering"
          isCorrect: false
          explanation: "Incorrect. The GPU is mentioned for improved graphics, not as the primary driver of AI capabilities."
        - content: "External AI accelerator connected through USB-A"
          isCorrect: false
          explanation: "Incorrect. There's no mention of external AI hardware; AI capabilities are built into the device."
        - content: "Thunderbolt 4 ports for AI model training"
          isCorrect: false
          explanation: "Incorrect. Thunderbolt 4 ports support connectivity and peripherals, not AI processing."
  - content: "What is a key characteristic of the Click to Do feature?"
    choices:
        - content: "It processes all data in the cloud before showing results"
          isCorrect: false
          explanation: "Incorrect. The feature performs processing locally on the device."
        - content: "It automatically modifies content without user input"
          isCorrect: false
          explanation: "Incorrect. Users must actively select content and choose actions."
        - content: "It analyzes on-screen text and images to provide actionable options"
          isCorrect: true
          explanation: "Correct. The feature identifies and analyzes text and images, then provides actions the user can take."
        - content: "It only works with images and not text"
          isCorrect: false
          explanation: "Incorrect. The feature works with both text and images."
  - content: "What is the role of Agent in Settings on Surface Laptop for Business (8th Edition)?"
    choices:
        - content: "It automatically applies system changes without user approval"
          isCorrect: false
          explanation: "Incorrect. The user must explicitly request the agent to make any changes."
        - content: "It replaces the Settings app entirely with a new interface"
          isCorrect: false
          explanation: "Incorrect. The agent enhances the existing Settings experience rather than replacing it."
        - content: "It helps users find and change settings using natural language and AI suggestions"
          isCorrect: true
          explanation: "Correct. The feature uses on-device AI to interpret natural language queries and recommend or apply settings changes."
        - content: "It only works when connected to an external management server"
          isCorrect: false
          explanation: "Incorrect. The agent runs locally on the device."
  - content: "Which feature allows IT administrators to remotely control hardware components for security purposes?"
    choices:
        - content: "Windows Hello for Business"
          isCorrect: false
          explanation: "Incorrect. This feature provides secure sign-in using biometric authentication."
        - content: "Device Firmware Configuration Interface (DFCI)"
          isCorrect: true
          explanation: "Correct. DFCI enables IT administrators to remotely disable hardware components such as cameras or USB access."
        - content: "Click to Do"
          isCorrect: false
          explanation: "Incorrect. This is an AI productivity feature and doesn't provide hardware control."
        - content: "PixelSense Flow display"
          isCorrect: false
          explanation: "Incorrect. This is a display feature and doesn't provide security or management capabilities."
