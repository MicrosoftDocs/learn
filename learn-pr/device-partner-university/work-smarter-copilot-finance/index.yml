abstract: |
  By the end of this module, you'll be able to:
  - Use Microsoft 365 Copilot and Copilot+ PC to plan your day and prioritize tasks.
  - Analyze data, create models and reports, and collaborate with stakeholders more effectively.
  - Understand how to use Copilot prompts to streamline your work as a finance professional.
  - Identify best practices for using Microsoft 365 Copilot and Copilot+ PC in finance workflows.

