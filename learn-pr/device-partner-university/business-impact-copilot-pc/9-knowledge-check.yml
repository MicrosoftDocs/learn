### YamlMime:ModuleUnit
uid: learn.dpu.business-impact-copilot-pc.knowledge-check
title: Knowledge check
metadata:
  title: Knowledge Check
  description: This content is part of the "Understand the business impact of Copilot+ PCs" module.
  ms.date: 08/04/2025
  author: ozahran7
  ms.author: v-zahranomar
  ms.topic: unit
durationInMinutes: 5
quiz:
  title: Check your knowledge
  questions:
  - content: "How do Copilot+ PCs support modern business workflows?"
    choices:
        - content: "By requiring users to adopt entirely new applications"
          isCorrect: false
          explanation: "Incorrect. Copilot+ PCs integrate AI into existing tools and workflows rather than requiring new ones."
        - content: "By embedding AI into everyday tasks to reduce manual steps and improve efficiency"
          isCorrect: true
          explanation: "Correct. Copilot+ PCs bring AI directly into workflows to help users complete tasks more efficiently."
        - content: "By replacing all cloud-based services with local processing"
          isCorrect: false
          explanation: "Incorrect. Copilot+ PCs use both on-device and cloud-based AI together."
        - content: "By limiting AI usage to IT administrators only"
          isCorrect: false
          explanation: "Incorrect. AI capabilities are designed to support users across roles."

  - content: "What is the benefit of combining on-device AI with cloud-based services?"
    choices:
        - content: "It eliminates the need for internet connectivity entirely"
          isCorrect: false
          explanation: "Incorrect. Some scenarios still rely on cloud connectivity."
        - content: "It allows all processing to happen only in the cloud"
          isCorrect: false
          explanation: "Incorrect. Copilot+ PCs use both on-device and cloud processing."
        - content: "It enables efficient local processing while using the cloud for more complex tasks"
          isCorrect: true
          explanation: "Correct. On-device AI handles real-time tasks, while cloud services support more complex workloads."
        - content: "It reduces the need for device security"
          isCorrect: false
          explanation: "Incorrect. Security remains critical in both local and cloud scenarios."

  - content: "How do AI capabilities like Improved Windows Search, Click to Do, and Live Captions improve productivity?"
    choices:
        - content: "By requiring users to manually configure each feature before use"
          isCorrect: false
          explanation: "Incorrect. These features are integrated into the user experience."
        - content: "By reducing the need to switch between tools and helping users act on information more quickly"
          isCorrect: true
          explanation: "Correct. These capabilities streamline workflows and reduce manual effort."
        - content: "By replacing all business applications"
          isCorrect: false
          explanation: "Incorrect. They enhance existing applications rather than replace them."
        - content: "By limiting collaboration features"
          isCorrect: false
          explanation: "Incorrect. These features improve collaboration and communication."

  - content: "Why is governance important as organizations adopt AI agents?"
    choices:
        - content: "To ensure agents operate within defined policies and can be monitored by IT"
          isCorrect: true
          explanation: "Correct. Governance helps organizations maintain control, compliance, and visibility."
        - content: "To prevent users from accessing AI features entirely"
          isCorrect: false
          explanation: "Incorrect. Governance enables controlled usage, not restriction."
        - content: "To eliminate the need for security tools"
          isCorrect: false
          explanation: "Incorrect. Security remains essential alongside governance."
        - content: "To reduce device performance requirements"
          isCorrect: false
          explanation: "Incorrect. Governance doesn't impact hardware performance."

  - content: "How do Copilot+ PCs support IT teams in managing AI-enabled environments?"
    choices:
        - content: "By removing the need for device management tools"
          isCorrect: false
          explanation: "Incorrect. Management tools are still essential."
        - content: "By providing built-in security, remote management, and policy enforcement capabilities"
          isCorrect: true
          explanation: "Correct. Copilot+ PCs integrate with tools like Microsoft Intune and Microsoft Entra ID to support IT management."
        - content: "By requiring manual configuration for every device"
          isCorrect: false
          explanation: "Incorrect. Modern provisioning reduces manual setup."
        - content: "By limiting AI features to offline use only"
          isCorrect: false
          explanation: "Incorrect. Copilot+ PCs support both on-device and cloud-based AI."
