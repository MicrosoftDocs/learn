  title: Work Smarter With Copilot Prompts For Sales Professionals
  description: Explore how Microsoft 365 Copilot and Copilot+ PC experiences support each stage of the sales workflow, from planning and customer preparation to content creation, meeting collaboration, and end-of-day follow-up.
  ms.date: 07/20/2026
