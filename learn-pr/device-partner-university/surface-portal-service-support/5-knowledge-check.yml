quiz:
  title: Check your knowledge
  questions:
  - content: "A Surface device requires physical repair, and your organization has an Intune subscription. Where can the service order be initiated?"
    choices:
        - content: "Surface Management Portal"
          isCorrect: true
          explanation: "Correct. When an organization has an Intune subscription, Surface Management Portal can be used to create service orders for both enrolled and unenrolled Surface devices."
        - content: "Surface Support Portal only"
          isCorrect: false
          explanation: "Incorrect. Surface Support Portal is required when Intune isn't available, but it isn't the only option when an Intune subscription exists."
        - content: "Microsoft 365 Admin Center"
          isCorrect: false
          explanation: "Incorrect. Service orders aren't created in the Microsoft 365 Admin Center."
        - content: "Surface Diagnostic Toolkit"
          isCorrect: false
          explanation: "Incorrect. This tool is used for troubleshooting issues, not for initiating service orders."
