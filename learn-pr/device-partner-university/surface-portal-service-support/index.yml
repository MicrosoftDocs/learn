metadata:
  title: Creating Service Orders And Support Requests In Surface Portals
  description: 'In this module, you''ll learn how to create service orders and support requests in Surface portals. You''ll understand the different types of service orders and support requests, how to create them in the Surface Partner Portal and Surface Support Portal, and how to track their status and updates.'
  ms.date: 04/22/2026
  author: ozahran7
  ms.author: v-zahranomar
  ms.topic: module
  ms.service: surface
summary: >
  This module provides guidance on creating service orders and support requests in Surface portals, including the Surface Partner Portal and Surface Support Portal.

abstract: |
  By the end of this module, you'll be able to:
  - Understand the different types of service orders and support requests for Surface devices.
  - Create service orders and support requests in the Surface Partner Portal.
  - Create service orders and support requests in the Surface Support Portal.
  - Track the status and updates of service orders and support requests.

