title: Explore on-device AI and NPU capabilities in Copilot+ PCs
metadata:
  title: Explore on-device AI and NPU capabilities in Copilot+ PCs
  description: Explore how Copilot+ PCs use on-device AI, a dedicated Neural Processing Unit (NPU), and Windows 11 Pro to deliver intelligent, secure AI-powered experiences for modern work.
  ms.date: 08/06/2025
  author: Stephanie-Rosenzweig
  ms.author: v-stephanier
  ms.topic: module
  ms.service: windows-11
  ms.custom: CW052024-1
summary: >
  Learn how Copilot+ PCs combine on-device AI, a dedicated Neural Processing Unit (NPU), and Windows 11 Pro to support efficient AI workloads, improved performance, and secure, responsive experiences in the workplace.
abstract: |
  By the end of this module, you are able to:
  - Define key terms such as CPU, GPU, NPU, and TOPS
  - Describe how Copilot+ PCs support productivity, performance, and security
  - Understand the significance of the NPU and its effect on efficiency
  - Explain how Copilot+ PCs support AI agents and on-device AI workloads
  - Describe the role of Windows as a managed platform for AI
prerequisites: |
  - None
