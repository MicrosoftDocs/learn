summary: >
  Learn how to set up a Microsoft tenant for accessing Surface Portal, including verifying tenant existence, identifying the global administrator, and assigning suitable roles for Surface Portals.

abstract: |
  By the end of this module, you're able to:
  - Verify whether a Microsoft tenant exists for your organization to access Surface Portal.
  - Identify the global administrator of your Microsoft tenant who can grant access to Surface Portal.
  - Assign suitable roles for Surface Portals to ensure proper access and permissions.

