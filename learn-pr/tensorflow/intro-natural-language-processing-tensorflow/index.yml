title: Introduction to natural language processing with TensorFlow
summary: In this module, we explore different neural network architectures for processing natural language texts. Natural Language Processing (NLP) has experienced fast growth and advancement primarily because the performance of the language models depends on their overall ability to "understand" text and can be trained using an unsupervised technique on large text corpora. Additionally, pretrained text models have simplified many NLP tasks and have dramatically improved the performance. We learn more about these techniques and the basics of NLP in this learning module.
abstract: |
  In this module you will:
  - Understand how text is processed for natural language processing tasks
  - Get introduced to Recurrent Neural Networks (RNNs) and generative networks
  - Learn how to build text classification models
  - Learn how to generate text with recurrent networks
