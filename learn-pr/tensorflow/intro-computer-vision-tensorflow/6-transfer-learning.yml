quiz:
  title: Check your knowledge
  questions:
    - content: "For transfer learning, we're using a VGG-16 network pretrained on 1,000 classes. What is the number of classes we can have in our network?"
      choices:
        - content: "Any"
          isCorrect: true
          explanation: "Number of classes in pretrained network isn't important since we're training our own final classifier"
        - content: "1000"
          isCorrect: false
          explanation: "Number of classes in pretrained network isn't important since we're training our own final classifier"
        - content: "2"
          isCorrect: false
          explanation: "Number of classes in pretrained network isn't important since we're training our own final classifier"
        - content: "Less than 1000"
          isCorrect: false
          explanation: "Number of classes in pretrained network isn't important since we're training our own final classifier"


