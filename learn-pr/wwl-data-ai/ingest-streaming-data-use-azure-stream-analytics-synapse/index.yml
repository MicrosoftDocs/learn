title: Ingest streaming data using Azure Stream Analytics
summary: Azure Stream Analytics is a fully managed, real-time analytics service that you can use to process high-velocity streaming data and route the results to various output destinations for further analysis, storage, or visualization.
abstract: |
  After completing this module, you'll be able to:
  *   Describe common stream processing scenarios for Azure Stream Analytics.
  *   Configure inputs and outputs for an Azure Stream Analytics job.
  *   Define a query to process and route real-time data.
  *   Run a job to ingest real-time data and monitor its execution.
prerequisites: |
  Before starting this module, you should be familiar with real-time data concepts. Consider completing the following module first:
  - [Get started with Azure Stream Analytics](/training/modules/introduction-to-data-streaming)
