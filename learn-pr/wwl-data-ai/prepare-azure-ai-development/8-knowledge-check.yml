### YamlMime:ModuleUnit
uid: learn.wwl.prepare-azure-ai-development.knowledge-check
title: Module assessment
metadata:
  title: Module assessment
  description: Test your knowledge.
  author: wwlpublish
  ms.author: gmalc
  ms.date: 3/16/2026
  ms.topic: unit
  ms.collection:
    - wwl-ai-copilot
  module_assessment: true
durationInMinutes: 3
content: |
quiz:
  questions:
    - content: "Which web portal should you use to work with assets in a Microsoft Foundry project?"
      choices:
        - content: "The Azure portal"
          isCorrect: false
          explanation: "Incorrect. The Azure portal provides access to Azure services, but not specifically to Microsoft Foundry project assets."
        - content: "Microsoft Copilot"
          isCorrect: false
          explanation: "Incorrect. Microsoft Copilot provides AI-assisted development features, but not specifically for managing Foundry project assets."
        - content: "The Microsoft Foundry portal"
          isCorrect: true
          explanation: "Correct. The Microsoft Foundry portal is the web portal you should use to work with assets in a Microsoft Foundry project."
    - content: "Which component of Microsoft Foundry provides pre-built services for common AI tasks?"
      choices:
        - content: "Foundry Tools"
          isCorrect: true
          explanation: "Correct. Foundry Tools provides pre-built services for common AI tasks."
        - content: "Foundry Models"
          isCorrect: false
          explanation: "Incorrect. Foundry Models provides pre-trained models, not pre-built services for common AI tasks."
        - content: "Foundry IQ"
          isCorrect: false
          explanation: "Incorrect. Foundry IQ provides connectivity to knowledge stores, not pre-built services for common AI tasks."
    - content: "Which extension should you use in Visual Studio Code to work with Foundry projects?"
      choices:
        - content: "Python extension for Visual Studio Code"
          isCorrect: false
          explanation: "Incorrect. The Python extension for Visual Studio Code provides support for Python development, but not specifically for managing Foundry project assets."
        - content: "GitHub Copilot"
          isCorrect: false
          explanation: "Incorrect. GitHub Copilot provides AI-assisted development features, but not specifically for managing Foundry project assets."
        - content: "Microsoft Foundry extension for Visual Studio Code"
          isCorrect: true
          explanation: "Correct. The Microsoft Foundry extension for Visual Studio Code provides connectivity to assets in a Foundry project."
