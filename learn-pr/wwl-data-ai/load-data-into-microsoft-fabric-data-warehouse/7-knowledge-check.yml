### YamlMime:ModuleUnit
uid: learn-wwl.load-data-into-microsoft-fabric-data-warehouse.knowledge-check
title: Module assessment
metadata:
  title: Module assessment
  description: "Test your knowledge of loading data into a Microsoft Fabric warehouse."
  ms.date: 06/09/2026
  author: theresa-i
  ms.author: theresai
  ms.topic: unit
  module_assessment: true
durationInMinutes: 5
quiz:
  questions:
  - content: Which loading pattern preserves existing data and adds only new or changed rows to a warehouse table?
    choices:
    - content: Incremental load
      isCorrect: true
      explanation: Correct. An incremental load updates tables with only the changes since the last load, preserving existing data.
    - content: Full load
      isCorrect: false
      explanation: Incorrect. A full load truncates and replaces all data in the table.
    - content: Staging load
      isCorrect: false
      explanation: Incorrect. Staging is a preparation step, not a loading pattern.
  - content: What data sources does the COPY (Transact-SQL) statement support for loading files into a Fabric warehouse?
    choices:
    - content: Azure Data Lake Storage Gen2, Azure Blob Storage, and OneLake lakehouse folders.
      isCorrect: true
      explanation: Correct. The COPY statement supports files from ADLS Gen2, Azure Blob Storage, and OneLake lakehouse folders.
    - content: Azure Data Lake Storage Gen2 and Azure Blob Storage only.
      isCorrect: false
      explanation: Incorrect. The COPY statement also supports OneLake lakehouse folders as a data source.
    - content: OneLake lakehouse folders and Azure Data Lake Storage Gen1.
      isCorrect: false
      explanation: Incorrect. The COPY statement supports ADLS Gen2, not Gen1.
  - content: In a type 2 slowly changing dimension, what happens when a dimension attribute changes?
    choices:
    - content: A new row is added for the updated value, and the previous row is marked as expired.
      isCorrect: true
      explanation: Correct. Type 2 SCD adds a new version of the record and marks the old version as inactive, preserving full history.
    - content: The existing row is updated with the new value, and the old value is lost.
      isCorrect: false
      explanation: Incorrect. That describes a type 1 SCD, which overwrites existing data without keeping history.
    - content: The previous value is stored in a separate column on the same row.
      isCorrect: false
      explanation: Incorrect. That describes a type 3 SCD, which tracks limited history in additional columns.
  - content: What T-SQL pattern creates a new table from the results of a query across multiple warehouses in the same workspace?
    choices:
    - content: CREATE TABLE AS SELECT (CTAS)
      isCorrect: true
      explanation: Correct. CTAS creates a new table from a query result, and you can use three-part naming to query across warehouses in the same workspace.
    - content: COPY INTO
      isCorrect: false
      explanation: Incorrect. The COPY statement loads data from external files, not from other warehouses.
    - content: INSERT...SELECT
      isCorrect: false
      explanation: Incorrect. INSERT...SELECT inserts rows into an existing table, it does not create a new table.
  - content: When you select Fabric Warehouse as a destination in Dataflow Gen2, which two update methods are available?
    choices:
    - content: Append and Replace
      isCorrect: true
      explanation: Correct. Append adds new rows to the existing table, and Replace replaces the entire table contents.
    - content: Append and Upsert
      isCorrect: false
      explanation: Incorrect. Upsert is not an available update method for Fabric Warehouse destinations in Dataflow Gen2.
    - content: Merge and Replace
      isCorrect: false
      explanation: Incorrect. The two methods are Append and Replace, not Merge and Replace.