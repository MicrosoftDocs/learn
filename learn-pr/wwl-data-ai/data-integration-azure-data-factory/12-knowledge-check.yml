quiz:
  questions:
  - content: "Which Azure Data Factory component orchestrates a transformation job or runs a data movement command?"
    choices:
    - content: "Linked Services"
      isCorrect: false
      explanation: "Incorrect. Linked Services is objects that are used to define the connection to data stores or compute resources in Azure."
    - content: "Datasets"
      isCorrect: false
      explanation: "Incorrect. Datasets represent data structures within the data store that's being referenced by the Linked Service object."
    - content: "Activities"
      isCorrect: true
      explanation: "Correct. Activities contain the transformation logic or the analysis commands of the Azure Data Factory’s work."
  - content: "You're copying data from an Azure Data Lake Storage Gen2 account to an Azure SQL Database. Which Azure Data Factory integration runtime would be used in this data copy activity?"
    choices:
    - content: "Azure-SSIS"
      isCorrect: false
      explanation: "Incorrect. Azure-SSIS IR is used when lifting and shifting existing SSIS packages to execute in Azure."
    - content: "Azure"
      isCorrect: true
      explanation: "Correct. When copying data between two Azure cloud data stores, the Azure Integration Runtime is used. It automatically determines the appropriate region for the copy."
    - content: "Self-hosted"
      isCorrect: false
      explanation: "Incorrect. Self-hosted IR is used when copying data between private network resources and the cloud, not between two Azure cloud data stores."
