title: Govern the enterprise agent lifecycle in Microsoft Foundry
summary: "Govern the enterprise agent lifecycle in Microsoft Foundry. Design agent versioning strategies and approval workflows for controlled production updates, implement usage quotas and cost allocation models for agent operations, establish change management and behavioral risk assessment processes, and design agent retirement workflows that minimize disruption to downstream consumers."
abstract: |
  By the end of this module, you'll be able to:
  - Design agent versioning strategies and approval workflows for controlled production updates
  - Implement usage quotas, rate limiting, and cost allocation models for enterprise agent operations
  - Establish change management and behavioral risk assessment processes for agent updates
  - Design agent retirement and deprecation workflows that minimize disruption to downstream consumers
prerequisites: |
  Before starting this module, you should have:
  - Experience deploying agents to Microsoft Foundry across multiple environments
  - Familiarity with Azure Cost Management and Azure Policy
  - Understanding of CI/CD pipeline design for AI applications
  - Experience with GenAIOps practices or equivalent
