### YamlMime:ModuleUnit
uid: learn.wwl.design-evaluation-frameworks-multi-agent-azure.knowledge-check
title: Module assessment
metadata:
  title: Module assessment
  description: "Module assessment."
  ms.date: 06/08/2026
  author: chrishowd
  ms.author: cahowd
  ms.topic: unit
  ai-usage: ai-assisted
durationInMinutes: 3
content: |
quiz:
  questions:
  - content: "Adventure Works' individual evaluation shows the returns agent scores 9.2/10 on coherence and the order management agent scores 9.1/10. But when customers try to return one item while upgrading another in the same order, 35% report that the combined resolution is confusing or contradictory. Which metric is the individual evaluation failing to capture?"
    choices:
    - content: "Each agent's latency—a high latency in either agent would cause the poor customer experience."
      isCorrect: false
      explanation: "Latency measures performance speed but not the quality of the interaction outcome. A fast confusing response is still confusing. The problem described is logical inconsistency between two agents' responses in the same customer journey."
    - content: "Journey coherence score—whether the multiple agent responses across the interaction form a logically consistent and non-contradictory experience for the customer."
      isCorrect: true
      explanation: "Each agent can be individually coherent while their combined outputs create contradictions—the returns agent confirms a return while the order agent issues a conflicting policy statement for the same order. Journey coherence measures whether the multi-step interaction forms a unified, consistent customer experience, which individual component evaluation misses."
    - content: "Task completion rate for each individual step—the system should measure whether each agent completed its specific subtask independently."
      isCorrect: false
      explanation: "Individual task completion measures whether each step succeeded in isolation, not whether the combined outcome is coherent. Two individually successful steps can still produce a confused customer experience if their outputs contradict each other. System-level journey coherence captures this cross-agent quality."
  - content: "You run an LLM judge on 50 human-labeled examples. Human evaluators scored task completion 8/10 on average for the labeled set; your judge scores the same examples 6.1/10 on average with a Pearson correlation of 0.41. What does this indicate, and what should you do?"
    choices:
    - content: "A correlation of 0.41 is acceptable for LLM evaluation. Proceed with the judge as configured, accepting the systematic 2-point underestimation."
      isCorrect: false
      explanation: "A 0.41 correlation indicates weak agreement with human judgment. The judge is not reliably capturing what human evaluators consider task completion. Deploying an uncalibrated judge produces systematically misleading evaluation scores, potentially blocking good agent versions or approving poor ones."
    - content: "The judge is not well-aligned with human judgment. Revise the scoring rubric by reviewing cases where the judge and humans diverged most, clarifying the criteria for mid-range scores, and re-calibrating against the labeled set."
      isCorrect: true
      explanation: "Low correlation between judge and human scores signals that the rubric doesn't sufficiently encode what humans consider successful task completion. Analyzing the highest-divergence cases reveals where the rubric is ambiguous or missing important criteria. Rubric revision and re-calibration against human labels is the correct improvement path."
    - content: "The human reviewers were inconsistent. Run the labeling again with a different group of humans to get more reliable ground truth for calibration."
      isCorrect: false
      explanation: "Before attributing low correlation to human inconsistency, review the divergence cases. If human scores cluster consistently and the judge scores differ systematically (not randomly), the issue is likely the judge prompt, not human inconsistency. Investigating the divergence patterns is the first diagnostic step."
  - content: "After deploying a new version of Adventure Works' product search agent, the regression test suite shows overall quality scores are at or above baseline. But the test suite was last updated six months ago. The product catalog has since added 3,000 new SKUs including a new product category. What risk does this situation present?"
    choices:
    - content: "No significant risk—the regression suite passed, confirming the agent performs correctly on all relevant scenarios."
      isCorrect: false
      explanation: "A regression suite that passed doesn't guarantee correctness for scenarios it doesn't cover. If no test cases involve the new product category, passing the regression suite says nothing about the agent's capability on those new scenarios."
    - content: "The test suite doesn't cover the new product category, so passing regression tests doesn't validate agent quality on these scenarios. The synthetic dataset needs quarterly review to add coverage for catalog changes."
      isCorrect: true
      explanation: "Synthetic datasets must be maintained to reflect the current state of the system. When product catalogs, policies, or capabilities change significantly, the dataset becomes a stale representation of reality. Quarterly review and targeted expansion for material changes prevents false confidence from passing outdated test cases."
    - content: "The test suite is likely fine since product search uses general retrieval patterns that generalize to new product categories without specific test cases."
      isCorrect: false
      explanation: "New product categories may have different attribute structures, new jargon that conflicts with existing search terms, or different customer query patterns. Assuming generalization without validation is a common source of production quality gaps. Coverage for material catalog changes is essential."
