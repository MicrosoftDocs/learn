summary: "AI agents are transforming how we interact with technology. In this
  module, you'll learn how to develop your first AI agent using Microsoft
  Foundry, a powerful platform for building and deploying AI solutions."
abstract: |
  By the end of this module, you'll be able to:
    - Describe what an AI agent is and its potential applications.
    - Understand the capabilities of Microsoft Foundry for AI agent development.
    - Develop an agent in the Microsoft Foundry portal.
    - Extend your agent's capabilities using developer tools and SDKs.
prerequisites: |
  - A conceptual understanding of AI and its applications.
  - Software development experience - preferably with Python.
