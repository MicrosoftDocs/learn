title: Implement advanced multi-agent orchestration patterns in Microsoft Foundry
summary: "Implement advanced multi-agent orchestration patterns in Microsoft Foundry. Design hub-and-spoke architectures, implement parallel agent spawning with synchronization and partial failure recovery, configure hierarchical supervisor patterns, and evaluate trade-offs across Semantic Kernel, LangGraph, AutoGen, and CrewAI."
abstract: |
  By the end of this module, you'll be able to:
  - Differentiate agentic AI from multi-agent AI and decide when multi-agent architectures earn their coordination cost
  - Design hub-and-spoke multi-agent architectures with a central orchestrator agent
  - Implement parallel agent spawning and synchronization patterns for concurrent execution
  - Configure supervisor and coordinator patterns for hierarchical multi-level task delegation
  - Evaluate orchestration framework trade-offs to select the right approach for a given scenario
prerequisites: |
  Before starting this module, you should have:
  - Experience building multi-agent solutions with Microsoft Foundry Agent Service and Microsoft Agent Framework
  - Familiarity with concurrent, sequential, group chat, and handoff orchestration patterns
  - Proficiency in Python
  - 4+ years of AI/ML development experience
