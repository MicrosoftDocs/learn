title: Secure a Microsoft Fabric data warehouse
summary: Learn how to protect sensitive data in a Microsoft Fabric warehouse using dynamic data masking, row-level security, column-level security, and SQL granular permissions.
abstract: |
  In this module, you'll:
  - Identify the security layers available in a Microsoft Fabric warehouse.
  - Describe how dynamic data masking obscures sensitive column values.
  - Explain how row-level security restricts row access by user.
  - Describe how column-level security controls access to specific columns.
  - Explain how SQL granular permissions control access to warehouse objects.
prerequisites: |
  Before starting this module, you should be familiar with the Microsoft Fabric interface and core concepts.
