summary: Learn how to convert your code to a script, run it as a command job, and track model training with MLflow in Azure Machine Learning.
abstract: |
  In this module, you'll learn how to:
  - Convert a notebook to a script.
  - Test scripts in a terminal.
  - Run a script as a command job.
  - Use parameters in a command job.
  - Use MLflow when you run a script as a job.
  - Review metrics, parameters, artifacts, and models from a run.
