summary: Explore the core features, architecture, and use cases for Azure DocumentDB, a fully managed MongoDB-compatible database service.
abstract: |
  After completing this module, you'll be able to:
  - Describe what Azure DocumentDB is and how it relates to the open-source DocumentDB project.
  - Explain the vCore-based architecture, compute tiers, and scaling options.
  - Identify scenarios and workloads where Azure DocumentDB is the right choice.
prerequisites: |
  - Familiarity with database concepts such as queries, indexes, and data models.
  - Basic understanding of MongoDB or document-oriented databases.
