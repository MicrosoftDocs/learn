  title: Fine-tune a language model with Microsoft Foundry
  description: Learn how to fine-tune language models using supervised fine-tuning, reinforcement fine-tuning, or direct preference optimization. Discover how to prepare training data manually or generate synthetic data to maximize consistency in your model's responses.
