title: Extract data with Azure Document Intelligence
summary: Azure Document Intelligence uses OCR and deep learning models to extract text, key-value pairs, tables, and structured data from forms and documents. Learn how to use prebuilt and custom models to automate document processing.
abstract: |
  By the end of this module, you'll be able to:
  - Describe the capabilities and components of Azure Document Intelligence.
  - Use the Document Intelligence Studio to explore and test models.
  - Use prebuilt models to extract data from common document types.
  - Train and use custom models for industry-specific forms.
prerequisites: |
  - Familiarity with Azure and the Azure portal.
  - Programming experience with C# or Python.
