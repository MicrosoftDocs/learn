summary: Learn how to provision an Azure DocumentDB cluster, connect with MongoDB tools, and configure compute, storage, and security settings.
abstract: |
  After completing this module, you'll be able to:
  - Create an Azure DocumentDB cluster in the Azure portal.
  - Connect to the cluster using MongoDB Shell and connection strings.
  - Configure cluster settings including compute tiers, storage, and network security.
prerequisites: |
  - Familiarity with database concepts such as queries, indexes, and data models.
  - Basic understanding of MongoDB or document-oriented databases.
  - An Azure subscription.
