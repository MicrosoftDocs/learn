      choices:
        - content: "gpt-4o-mini"
          isCorrect: false
          explanation: "Incorrect."
        - content: "gpt-4o-mini-tts"
          isCorrect: true
          explanation: "Correct."
        - content: "gpt-4o-mini-transcribe"
          isCorrect: false
          explanation: "Incorrect."
