title: Visualize and query ontology data with Microsoft Fabric IQ
summary: After building and binding your ontology in Fabric IQ, explore entity instances, visualize business concept connections in the relationship graph, and query across multiple data sources using the Query builder—without writing SQL joins.
abstract: |
  By the end of this module, you'll be able to:
  - Explore entity instances to see how bound data populates your ontology
  - Expand the relationship graph to visualize entity connections
  - Query ontology data using the Query builder with filters and components
  - Refresh the graph model when upstream data sources change
prerequisites: |
  Before starting this module, you should have:
  - Completed the "Create an ontology (preview) with Fabric IQ" module or have equivalent knowledge of creating and binding ontologies in Fabric IQ
  - Familiarity with Microsoft Fabric workspaces and navigation
