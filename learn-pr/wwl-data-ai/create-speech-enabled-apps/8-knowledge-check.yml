### YamlMime:ModuleUnit
uid: learn.wwl.create-speech-enabled-apps.knowledge-check
title: Module assessment
metadata:
  title: Module assessment
  description: Knowledge check
  author: ivorb
  ms.author: berryivor
  ms.date: 03/10/2026
  ms.topic: unit
  ms.collection:
    - wwl-ai-copilot
  module_assessment: true
azureSandbox: false
labModal: false
durationInMinutes: 3
quiz:
  questions:
    - content: "What information do you need from your Microsoft Foundry resource to consume it using the Azure Speech SDK?"
      choices:
        - content: "The endpoint and key"
          isCorrect: true
          explanation: "Correct. The Azure Speech SDK requires the endpoint and a key to connect to the Azure Speech service."
        - content: "The primary and secondary keys"
          isCorrect: false
          explanation: "Incorrect. The Azure Speech SDK requires the endpoint and a key to connect to the Azure Speech service."
        - content: "The Azure subscription ID and resource group name"
          isCorrect: false
          explanation: "Incorrect. The Azure Speech SDK requires the endpoint and a key to connect to the Azure Speech service."
    - content: "Which object should you use to specify that the speech input to be transcribed to text is in an audio file?"
      choices:
        - content: "SpeechConfig"
          isCorrect: false
          explanation: "Incorrect. Use an AudioConfig to specify the input source for speech."
        - content: "AudioConfig"
          isCorrect: true
          explanation: "Correct. Use an AudioConfig to specify the input source for speech."
        - content: "SpeechRecognizer"
          isCorrect: false
          explanation: "Incorrect. Use an AudioConfig to specify the input source for speech."
    - content: "How can you change the voice used in speech synthesis?"
      choices:
        - content: "Specify a SpeechSynthesisOutputFormat enumeration in the SpeechConfig object."
          isCorrect: false
          explanation: 'Incorrect. To set a voice, set the speech_synthesis_voice_name property of the SpeechConfig to a voice name, such as "en-GB-George".'
        - content: "Set the speech_synthesis_voice_name property of the SpeechConfig object to the desired voice name."
          isCorrect: true
          explanation: 'Correct. To set a voice, set the speech_synthesis_voice_name property of the SpeechConfig to a voice name, such as "en-GB-George".'
        - content: "Specify a filename in the AudioConfig object."
          isCorrect: false
          explanation: 'Incorrect. To set a voice, set the speech_synthesis_voice_name property of the SpeechConfig to a voice name, such as "en-GB-George".'
