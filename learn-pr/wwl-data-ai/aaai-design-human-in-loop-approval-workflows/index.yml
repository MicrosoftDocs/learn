title: Design human-in-the-loop approval workflows with Power Automate and Microsoft Teams
summary: "Design human-in-the-loop systems for production multi-agent workflows using Power Automate and Microsoft Teams. Implement confidence-threshold escalation architectures, design asynchronous approval workflows for high-stakes agent actions, build human feedback collection and active learning pipelines, and configure audit workflows that provide complete human oversight records for regulated environments."
abstract: |
  By the end of this module, you're able to:
  - Design confidence-threshold escalation architectures that route uncertain agent decisions to appropriate reviewers
  - Implement asynchronous approval workflows for high-stakes agent actions using Power Automate and Microsoft Teams
  - Build human feedback collection and active learning pipelines that continuously improve agent quality
  - Configure audit workflows that provide complete human oversight records for regulated environments
prerequisites: |
  Before starting this module, you should have:
  - Experience building multi-agent systems with Microsoft Foundry Agent Service
  - Familiarity with Power Automate and Microsoft Teams bot development
  - Understanding of confidence scoring and uncertainty in language model outputs
  - Basic understanding of compliance and audit requirements in regulated industries
  - Proficiency in Python
