### YamlMime:ModuleUnit
uid: learn.wwl.design-agentic-loops-microsoft-foundry-agent-service.knowledge-check
title: Module assessment
metadata:
  title: Module assessment
  description: "Knowledge check"
  ms.date: 05/20/2026
  author: chrishowd
  ms.author: cahowd
  ms.topic: unit
durationInMinutes: 5
content: |
quiz:
  questions:
  - content: "A production agent run returns with status `requires_action`. What does `requires_action` indicate and what should the loop do next?"
    choices:
    - content: "The agent encountered an error and needs to be restarted with a new thread."
      isCorrect: false
      explanation: "Incorrect. A `requires_action` status isn't an error—it means the agent identified one or more tool calls that it wants to execute. You retrieve the required tool call details, execute the functions in your own code, and submit the results back using `submit_tool_outputs`."
    - content: "The agent paused to wait for tool call results; retrieve the required tool calls, execute them, and submit results back to continue the run."
      isCorrect: true
      explanation: "Correct. When a run reaches `requires_action`, tool call requests have been generated by the agent. You must retrieve those requests from `run.required_action.submit_tool_outputs.tool_calls`, execute your functions, and call `submit_tool_outputs` on the run to resume it."
    - content: "The agent needs a new user message before it can proceed; add a follow-up message to the thread and create a new run."
      isCorrect: false
      explanation: "Incorrect. `requires_action` doesn't mean the agent needs more user input—it means the agent needs tool execution results. Creating a new run without submitting tool outputs would restart the loop from scratch."
  - content: "Your production agent processes 20-30 turns in a long research session, and you observe that token costs are scaling linearly with session length. Which context management strategy best addresses this observation while preserving essential research context?"
    choices:
    - content: "Delete the thread and start a new one when message count exceeds 20."
      isCorrect: false
      explanation: "Incorrect. Deleting the thread discards all accumulated research context, forcing the agent to restart without any knowledge of prior findings—exactly the opposite of what a long research session requires."
    - content: "Set `max_prompt_tokens` on every run to cap the input regardless of thread length."
      isCorrect: false
      explanation: "Incorrect. Setting `max_prompt_tokens` truncates context without any intelligence—the service drops recent or important messages arbitrarily. Dropping messages can cause the agent to lose critical research findings mid-session."
    - content: "Periodically summarize older messages and inject the summary as a high-priority system message, then prune the raw messages it replaced."
      isCorrect: true
      explanation: "Correct. Selective retention with summarization preserves the semantic content of past findings in compressed form while freeing context window space. The agent retains the knowledge from earlier turns without the full token cost of every raw message."
  - content: "An analyst wants to explore two investment hypotheses simultaneously from the same research starting point. Which pattern best supports this analysis while minimizing redundant computation?"
    choices:
    - content: "Create two separate agents with identical system prompts and run them independently from the start."
      isCorrect: false
      explanation: "Incorrect. Starting independent agents from scratch duplicates the initial research work that led to the fork point. Duplicating work is wasteful and doesn't use the shared context the analyst built."
    - content: "Serialize the thread state at the divergence point as a checkpoint, restore it into two new threads, then run each with its diverging hypothesis instruction."
      isCorrect: true
      explanation: "Correct. The fork-based session pattern creates a checkpoint at the point where the analysis diverges, then restores that checkpoint into two independent threads—one per hypothesis. Both forks begin with full research context and diverge only from that point forward."
    - content: "Add both hypothesis instructions as separate user messages in the same thread and run the agent once."
      isCorrect: false
      explanation: "Incorrect. Running both hypotheses in the same thread produces a single interleaved response that conflates both. The agent can't maintain distinct research paths in one continuous conversation—context from one hypothesis contaminates the other."
  - content: "You call `responses.create()` in Agents v2 and the response contains one message item and two tool call items. What is the correct next step?"
    choices:
    - content: "Check `response.status` for `requires_action`, retrieve the tool calls, and call `submit_tool_outputs_and_poll()` to resume the run."
      isCorrect: false
      explanation: "Incorrect. The `requires_action` status and `submit_tool_outputs_and_poll()` are Agents v1 constructs. Agents v2 responses don't have a `requires_action` status—tool calls are returned as typed items in `response.output` and don't block a run."
    - content: "Iterate `response.output` to find tool call items, execute the functions locally, and call `responses.create()` again passing the results as input items."
      isCorrect: true
      explanation: "Correct. In Agents v2, tool calls appear as items in `response.output`. You execute them locally, package the results as tool_result input items, and submit them in a new `responses.create()` call. There's no polling loop or status check."
    - content: "Display the message item to the user—tool calls in v2 execute server-side automatically without any client action."
      isCorrect: false
      explanation: "Incorrect. Function tool calls in v2 aren't executed server-side. The agent generates tool call output items that indicate the functions that need to be called. Your code must execute the functions and return the results."
  - content: "Which two changes are most significant when migrating from Agents v1 to Agents v2?"
    choices:
    - content: "Replace single `AgentsClient` with a split client (`AIProjectClient` + OpenAI client), and replace the run-polling loop with a synchronous `responses.create()` call that returns output items directly."
      isCorrect: true
      explanation: "Correct. The split client architecture is the first code change, and eliminating the polling loop is the largest structural change. Every v1 agent has a polling loop with `AgentRunStatus` checks—in v2, `responses.create()` is synchronous, there's no status enum, and tool calls are output items rather than a blocking status."
    - content: "Rename `threads.create()` to `conversations.create()` and rename `runs.create()` to `responses.create()`—all other code remains identical."
      isCorrect: false
      explanation: "Incorrect. The API surface changes are more significant than naming. The client architecture splits into two clients, agents move from GUID-based IDs to named versioned assets, the polling loop is eliminated, and tool handling changes from requires_action to output item iteration."
    - content: "Update the import path from `azure.ai.agents` to `azure.ai.projects`—the rest of the API is backward compatible."
      isCorrect: false
      explanation: "Incorrect. `azure-ai-projects` 2.x isn't backward compatible with v1. The client architecture, agent creation pattern, run execution model, and tool handling all change. A simple import rename won't produce working code."
