title: Design stateful agentic loops with Azure AI Agent Service
summary: "Design stateful agentic loops for production AI systems. Implement run-status handling and context accumulation, configure agent reflection and planning cycles, architect session state persistence, and build fork-based session patterns for multi-turn workflow branching."
abstract: |
  By the end of this module, you'll be able to:
  - Design agentic loop patterns that handle run-status signals and accumulate context across iterations
  - Implement agent reflection and planning cycles for multi-step reasoning
  - Architect session state management strategies for persistent multi-turn agent interactions
  - Build fork-based session patterns to support conversation branching and resumption
prerequisites: |
  Before starting this module, you should have:
  - Experience building and deploying AI agents with Azure AI Foundry Agent Service
  - Familiarity with agent runs, threads, and message management in the Azure AI Agent Service SDK
  - Proficiency in Python
  - 4+ years of AI/ML development experience
