### YamlMime:ModuleUnit
uid: learn.wwl.design-agentic-loops-microsoft-foundry-agent-service.knowledge-check
title: Module assessment
metadata:
  title: Module assessment
  description: "Knowledge check"
  ms.date: 05/20/2026
  author: chrishowd
  ms.author: cahowd
  ms.topic: unit
durationInMinutes: 3
content: |
quiz:
  questions:
  - content: "A production agent run returns with status `requires_action`. What does this indicate and what should the loop do next?"
    choices:
    - content: "The agent encountered an error and needs to be restarted with a new thread."
      isCorrect: false
      explanation: "Incorrect. A `requires_action` status is not an error — it means the agent has identified one or more tool calls it wants to execute. You retrieve the required tool call details, execute the functions in your own code, and submit the results back using `submit_tool_outputs`."
    - content: "The agent paused to wait for tool call results; retrieve the required tool calls, execute them, and submit results back to continue the run."
      isCorrect: true
      explanation: "Correct. When a run reaches `requires_action`, the agent has generated tool call requests. You must retrieve those requests from `run.required_action.submit_tool_outputs.tool_calls`, execute your functions, and call `submit_tool_outputs` on the run to resume it."
    - content: "The agent needs a new user message before it can proceed; add a follow-up message to the thread and create a new run."
      isCorrect: false
      explanation: "Incorrect. `requires_action` does not mean the agent needs more user input — it means the agent needs tool execution results. Creating a new run without submitting tool outputs would restart the loop from scratch."
  - content: "Your production agent processes 20-30 turns in a long research session, and you observe that token costs are scaling linearly with session length. Which context management strategy best addresses this while preserving essential research context?"
    choices:
    - content: "Delete the thread and start a new one when message count exceeds 20."
      isCorrect: false
      explanation: "Incorrect. Deleting the thread discards all accumulated research context, forcing the agent to restart without any knowledge of prior findings — exactly the opposite of what a long research session requires."
    - content: "Set `max_prompt_tokens` on every run to cap the input regardless of thread length."
      isCorrect: false
      explanation: "Incorrect. Setting `max_prompt_tokens` truncates context without any intelligence — the service drops recent or important messages arbitrarily. This can cause the agent to lose critical research findings mid-session."
    - content: "Periodically summarize older messages and inject the summary as a high-priority system message, then prune the raw messages it replaced."
      isCorrect: true
      explanation: "Correct. Selective retention with summarization preserves the semantic content of past findings in compressed form while freeing context window space. The agent retains the knowledge from earlier turns without the full token cost of every raw message."
  - content: "A Contoso Capital analyst wants to explore two investment hypotheses simultaneously from the same research starting point. Which pattern best supports this while minimizing redundant computation?"
    choices:
    - content: "Create two separate agents with identical system prompts and run them independently from the start."
      isCorrect: false
      explanation: "Incorrect. Starting independent agents from scratch duplicates all the initial research work that led to the fork point. This is wasteful and doesn't leverage the shared context the analyst has already built."
    - content: "Serialize the thread state at the divergence point as a checkpoint, restore it into two new threads, then run each with its diverging hypothesis instruction."
      isCorrect: true
      explanation: "Correct. The fork-based session pattern creates a checkpoint at the point where the analysis diverges, then restores that checkpoint into two independent threads — one per hypothesis. Both forks begin with full research context and diverge only from that point forward."
    - content: "Add both hypothesis instructions as separate user messages in the same thread and run the agent once."
      isCorrect: false
      explanation: "Incorrect. Running both hypotheses in the same thread produces a single interleaved response that conflates both. The agent cannot maintain distinct research paths in one continuous conversation — context from one hypothesis contaminates the other."
