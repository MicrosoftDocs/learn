title: Query a data warehouse in Microsoft Fabric
summary: In this module, you'll learn how to query a data warehouse in Microsoft Fabric using the built-in SQL and visual query editors, and external client tools like SQL Server Management Studio.
abstract: |
  In this module, you'll:
  - Use the SQL query editor to write and run T-SQL queries against a data warehouse.
  - Build queries using the no-code visual query editor.
  - Connect to a data warehouse from SQL Server Management Studio using Microsoft Entra ID authentication.
prerequisites: |
  Before starting this module, you should be familiar with the basic principles of data warehousing.
