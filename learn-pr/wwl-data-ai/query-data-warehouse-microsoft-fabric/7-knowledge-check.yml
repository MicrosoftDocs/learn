quiz:
  questions:
  - content: Which of the following best describes the visual query editor in Microsoft Fabric?
    choices:
    - content: It requires you to write T-SQL code to build queries.
      isCorrect: false
      explanation: Incorrect. The visual query editor is a no-code interface — you build queries by dragging and connecting tables on a canvas without writing T-SQL.
    - content: It provides a no-code interface that automatically generates a T-SQL query based on your canvas operations.
      isCorrect: true
      explanation: Correct. The visual query editor lets you build queries graphically by dragging tables and defining joins, and automatically generates the corresponding T-SQL.
    - content: It replaces the SQL query editor and supports all the same features.
      isCorrect: false
      explanation: Incorrect. The visual query editor is a separate tool designed for no-code query building. It doesn't replace the SQL query editor.
  - content: What type of authentication is required to connect to a Microsoft Fabric data warehouse from SQL Server Management Studio (SSMS)?
    choices:
    - content: SQL Server authentication
      isCorrect: false
      explanation: Incorrect. Microsoft Fabric doesn't support SQL authentication — only Microsoft Entra ID authentication is supported.
    - content: Windows authentication
      isCorrect: false
      explanation: Incorrect. Windows authentication isn't supported for Fabric data warehouse connections. Microsoft Entra ID authentication is required.
    - content: Microsoft Entra ID authentication
      isCorrect: true
      explanation: Correct. Microsoft Fabric supports only Microsoft Entra ID authentication. SQL authentication and Windows authentication aren't supported.
  - content: Which of the following features does the SQL query editor in Microsoft Fabric provide?
    choices:
    - content: Automatic scheduling of query execution
      isCorrect: false
      explanation: Incorrect. The SQL query editor is used for interactive querying — it doesn't schedule query execution.
    - content: IntelliSense, code completion, and syntax highlighting
      isCorrect: true
      explanation: Correct. The SQL query editor provides IntelliSense, code completion, syntax highlighting, and client-side parsing and validation.
    - content: Built-in support for Python and R scripts
      isCorrect: false
      explanation: Incorrect. The SQL query editor supports T-SQL only, not Python or R.

