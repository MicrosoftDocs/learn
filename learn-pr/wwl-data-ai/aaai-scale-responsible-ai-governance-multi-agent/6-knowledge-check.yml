uid: learn.wwl.scale-responsible-ai-governance-multi-agent.knowledge-check
title: Module assessment
metadata:
  title: Module assessment
  description: "Module assessment."
  ms.date: 06/02/2026
  author: petender
  ms.author: petender
  ms.topic: unit
  ai-usage: ai-assisted
durationInMinutes: 3
content: |
quiz:
  questions:
  - content: "Fabrikam's code review system shows that code submissions associated with junior developer identifiers receive 23% more security findings than equivalent code submitted by senior developers. Which technique best identifies which agent in the pipeline is introducing this disparity?"
    choices:
    - content: "Retrain all agents using a deduplicated dataset that removes developer seniority signals from the training data."
      isCorrect: false
      explanation: "Retraining addresses bias at the source but doesn't identify which agent is currently producing the disparity. Before you can fix the problem, you need to locate it. Pipeline replay injection is the isolation technique."
    - content: "Replay the code submission through the pipeline starting at each agent step with the same input, compare outputs between senior and junior developer metadata contexts, and identify the step where the disparity first appears."
      isCorrect: true
      explanation: "Replay injection is a causality isolation technique: by inserting the same input at each agent stage and observing where the output distributions diverge, you precisely identify the responsible agent. This is more efficient than retraining all agents blindly."
    - content: "Strip all developer identity metadata from inputs before any agent processes them, which prevents bias from entering the pipeline."
      isCorrect: false
      explanation: "Stripping metadata is a valid mitigation strategy—but it doesn't identify which agent was responsible. The question asks for identification first. Additionally, stripping metadata doesn't address bias that has been embedded in agent weights or system prompts through historical training patterns."
  - content: "A developer receives a code review recommending they redesign their database schema. They ask which agent made this recommendation and what evidence supports it. What does a properly designed multi-agent transparency system provide?"
    choices:
    - content: "The full conversation history of all agent interactions so the developer can trace each step themselves."
      isCorrect: false
      explanation: "Full conversation history exposes internal system architecture, may include confidential system prompts, and places the burden of interpretation on the developer. The transparency system should surface structured attribution—not raw internals."
    - content: "A structured attribution report with: the source agent ID, the specific evidence that supported the finding (rule reference or pattern match), the confidence level, and a link to the relevant architectural guideline."
      isCorrect: true
      explanation: "Structured attribution is actionable and auditable. It answers 'who said what and why' without exposing system internals. The confidence level helps the developer assess whether to prioritize the finding, and the guideline link provides verifiable justification."
    - content: "A confidence percentage for the entire code review and the model temperature setting used during generation."
      isCorrect: false
      explanation: "Model temperature is an implementation detail that's meaningless to developers and should never be in user-facing explanations. A single overall confidence score doesn't provide the per-finding attribution developers need to evaluate specific recommendations."
  - content: "Fabrikam wants to use code submitted through their review system to fine-tune future models. Under EU data privacy law, what is required before using this data for this purpose?"
    choices:
    - content: "Anonymizing the code by removing developer names from comments is sufficient to allow use for model training without extra consent."
      isCorrect: false
      explanation: "Anonymization alone doesn't satisfy EU data privacy requirements for repurposing data. The original data was collected for code review (specific purpose); using it for model training is a different purpose. The purpose limitation principle requires either the new use is compatible with the original purpose or separate consent is obtained."
    - content: "Separate, specific consent from the enterprise customer is required, as using code review data for model training goes beyond the stated purpose of the original data collection."
      isCorrect: true
      explanation: "EU data privacy law prohibits processing personal data for purposes incompatible with the original collection purpose without additional justification. Code review data collected under an SaaS contract can't be repurposed for model training without the data controller's (enterprise customer's) explicit consent for that specific use."
    - content: "Since the code is owned by the enterprise customer, not by individuals, EU data privacy law doesn't apply and no consent is needed for model training."
      isCorrect: false
      explanation: "EU data privacy law applies to personal data—code repositories frequently contain personal data (developer identities in commit history, email addresses in configuration, personal data in test fixtures). The enterprise's ownership of the code doesn't eliminate data privacy obligations for the personal data within it."
  - content: "Fabrikam's legal team discovers that a financial services customer requires WORM-compliant audit storage for their code review records, citing SEC Rule 17a-4(f). The existing Log Analytics workspace alone doesn't satisfy this requirement. What other infrastructure should Fabrikam configure?"
    choices:
    - content: "Increase the Log Analytics workspace retention period to 12 years, which satisfies tamper-evidence requirements for financial services regulations."
      isCorrect: false
      explanation: "Extending Log Analytics retention increases how long logs are kept, but doesn't make them tamper-evident—records in the workspace can still be modified. WORM compliance requires a separate storage tier with a locked retention policy that physically prevents modification and deletion."
    - content: "Export audit logs from Log Analytics to Azure Blob Storage and apply a locked time-based retention policy, creating write-once, read-many storage that prevents modification or deletion until the retention period expires."
      isCorrect: true
      explanation: "A locked time-based retention policy on Azure Blob Storage satisfies WORM requirements for SEC Rule 17a-4(f) and FINRA Rule 4511. Once locked, blobs can be read and queried but can't be modified or deleted until the policy expires. A Diagnostic Settings export rule keeps the pipeline automated and auditable."
    - content: "Enable geo-redundant replication for the Log Analytics workspace so that audit records survive a regional outage."
      isCorrect: false
      explanation: "Geo-redundant replication addresses availability and disaster recovery, not tamper-evidence. A replicated log can still be modified in the primary region and the change propagates to the replica. WORM compliance requires immutability controls, not redundancy controls."

