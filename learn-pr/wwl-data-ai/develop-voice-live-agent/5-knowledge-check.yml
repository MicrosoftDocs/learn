### YamlMime:ModuleUnit
uid: learn.wwl.develop-voice-live-agent.knowledge-check

title: Module assessment
metadata:
  title: Module Assessment
  description: Module assessment
  ms.date: 03/12/2026
  author: jeffkoms
  ms.author: jeffko
  ms.topic: unit
azureSandbox: false
durationInMinutes: 5
content: |
quiz:
  questions:
    - content: "What are the two authentication methods supported by the Voice Live API?"
      choices:
        - content: "OAuth 2.0 and JWT (JSON Web Tokens)"
          isCorrect: false
          explanation: "OAuth 2.0 and JWT tokens aren't supported authentication methods for the Voice Live API."
        - content: "Basic authentication and API keys"
          isCorrect: false
          explanation: "API keys are supported, but basic authentication isn't a supported authentication method for the Voice Live API."
        - content: "Microsoft Entra (keyless) and API key"
          isCorrect: true
          explanation: "Microsoft Entra (keyless) and API key are both supported authentication methods for the Voice Live API."
    - content: "Which protocol is used for avatar streaming integration in Voice Live API?"
      choices:
        - content: "HTTP/2"
          isCorrect: false
          explanation: "HTTP/2 is used for standard web communication."
        - content: "WebRTC"
          isCorrect: true
          explanation: "The Voice live API supports WebRTC-based avatar streaming for interactive applications"
        - content: "gRPC"
          isCorrect: false
          explanation: "gRPC is used to enable communication between microservices by using HTTP/2."
    - content: "How do you configure and test Voice Live agent integration in the Foundry Portal?"
      choices:
        - content: "You can't - Voice Live is only accessible through the REST API or Python SDK."
          isCorrect: false
          explanation: "You can configure and test Voice Live agent integration in the Foundry Portal."
        - content: "In the Azure Speech in Foundry Tools Voice Live playground"
          isCorrect: true
          explanation: "You can use Voice Live playground to test the Voice live API; but not to integrate it with an agent."
        - content: "Enable Voice mode in the agent playground"
          isCorrect: true
          explanation: "Enabling Voice mode in the agent playground enables you to configure and test Voice Live agent integration."
    - content: "How can you stop audio playback when a user interrupts the voice agent?"
      choices:
        - content: "You can't - the user must wait for the agent to finish."
          isCorrect: false
          explanation: "This event is for receiving audio chunks to play, not for stopping playback"
        - content: "Handle the ServerEventType.INPUT_AUDIO_BUFFER_SPEECH_STARTED event"
          isCorrect: true
          explanation: "This event can be used to stop audio playback, and cancel any current response."
        - content: "Reset the Voice Live session and clear the conversation history"
          isCorrect: false
          explanation: "It isn't necessary to reset the session or clear conversation history to stop audio playback when a user interrupts the voice agent."
