  ms.collection:
    - wwl-ai-copilot
  module_assessment: true
durationInMinutes: 3
content: |
quiz:
  questions:
  - content: "The Adventure Works team writes an agent specification before building. In it, they state that the agent must never invent discounts or give safety advice it can't ground in real data. Which part of the specification captures these rules?"
    choices:
    - content: "The restrictions within the agent's capabilities."
      isCorrect: true
      explanation: "Correct. Restrictions are part of the capabilities section, defining what the agent must not do alongside its primary functions and data access."
    - content: "The display prompt within the suggested prompts."
      isCorrect: false
      explanation: "Incorrect. The display prompt is the example question a user sees and clicks; it doesn't define behavioral limits."
    - content: "The coverage mix within the test data."
      isCorrect: false
      explanation: "Incorrect. The coverage mix ensures the test dataset includes common and edge cases; it doesn't define what the agent is forbidden to do."
  - content: "The Adventure Works product catalog changes constantly as items come and go, and the agent must always recommend products that are currently in stock. Which approach best fits this requirement?"
    choices:
    - content: "Retrieval Augmented Generation (RAG), so the agent searches the latest catalog data when answering."
      isCorrect: true
      explanation: "Correct. RAG retrieves up-to-date data at request time, which suits data that changes frequently."
    - content: "Fine-tuning the model on the current catalog."
      isCorrect: false
      explanation: "Incorrect. A fine-tuned model would need retraining every time inventory changes, making it a poor fit for constantly changing data."
    - content: "Using a larger reasoning model instead of a chat completion model."
      isCorrect: false
      explanation: "Incorrect. Model size and type don't solve the problem of grounding the agent in current, changing data."
  - content: "In the GenAIOps lifecycle, which loop is where the Adventure Works team defines the business need and designs the agent's architecture, including prompts and models?"
    choices:
    - content: "The Explore loop."
      isCorrect: true
      explanation: "Correct. The Explore loop is where you define the use case and design the architecture, including prompts and models."
    - content: "The Operationalize loop."
      isCorrect: false
      explanation: "Incorrect. The Operationalize loop is where you deploy the application for real-world use and deliver reliable service."
    - content: "The Manage loop."
      isCorrect: false
      explanation: "Incorrect. The Manage loop is the overarching loop focused on governance, security, and compliance, not initial design."