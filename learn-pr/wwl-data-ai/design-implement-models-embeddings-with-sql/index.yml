title: Design and implement models and embeddings with SQL
summary: Integrate AI models with Azure SQL Database using external models and built-in AI functions. Design effective embedding strategies and implement maintenance patterns to keep embeddings aligned with source data.
abstract: |
  By the end of this module, you'll be able to:
  *   Evaluate AI models for SQL database workloads based on capabilities and performance requirements.
  *   Create and manage external models to reference AI endpoints from Transact-SQL.
  *   Design embeddings with appropriate chunking strategies.
  *   Generate and store embeddings using built-in SQL AI functions.
  *   Choose maintenance approaches to keep embeddings aligned with source data.
prerequisites: |
  *   Basic understanding of SQL and Transact-SQL.
  *   Familiarity with Azure SQL Database or Fabric SQL database.
  *   Azure subscription with access to Azure OpenAI.
