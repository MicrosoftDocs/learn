quiz:
  title: ""
  questions:
  - content: What is the order of evaluation for access in Fabric?
    choices:
    - content: Data security, Fabric access, Microsoft Entra ID authentication
      isCorrect: false
      explanation: Incorrect. The order starts with Microsoft Entra ID authentication, not data security.
    - content: Microsoft Entra ID authentication, Fabric access, Data security
      isCorrect: true
      explanation: Correct. Fabric evaluates access in three sequential levels — Microsoft Entra ID authentication first, then Fabric access, and finally data security.
    - content: Fabric access, Microsoft Entra ID authentication, Data security
      isCorrect: false
      explanation: Incorrect. Microsoft Entra ID authentication is evaluated first, before Fabric access.
  - content: A data engineer needs to create Fabric items and read data in an existing lakehouse. Which workspace role should you assign?
    choices:
    - content: Viewer
      isCorrect: false
      explanation: Incorrect. The Viewer role lets users view content but doesn't allow creating or modifying Fabric items.
    - content: Contributor
      isCorrect: true
      explanation: Correct. The Contributor role lets users create, view, and modify all content and data in the workspace — without granting share or permission management capabilities.
    - content: Admin
      isCorrect: false
      explanation: Incorrect. The Admin role grants more permissions than necessary, including managing permissions and sharing content.
  - content: A user with the Viewer workspace role needs read access to only specific tables in a lakehouse. What should you use?
    choices:
    - content: OneLake security roles
      isCorrect: true
      explanation: Correct. OneLake security roles let you create custom roles that grant read access to specific tables or folders within a lakehouse. They're the right tool for limiting data access for Viewers.
    - content: Data Manipulation Language (DML)
      isCorrect: false
      explanation: Incorrect. DML is used to manipulate data (INSERT, UPDATE, DELETE). Data Control Language (DCL) commands like GRANT and DENY are used for T-SQL permissions.
    - content: Item permissions
      isCorrect: false
      explanation: Incorrect. Item permissions control access to an entire item, not to specific tables within it. OneLake security roles provide the table-level granularity needed here.
